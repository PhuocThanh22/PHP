<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - 3 CHÚ CÚN CON</title>
    <style>
        :root {
            --bg-overlay-top: rgba(3, 15, 8, 0.38);
            --bg-overlay-bottom: rgba(0, 0, 0, 0.8);
            --form-bg: rgba(0, 0, 0, 0.74);
            --form-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --muted: #b7b7b7;
            --field-bg: rgba(22, 22, 22, 0.82);
            --field-border: #454545;
            --field-focus: #ffffff;
            --red: #22c55e;
            --red-hover: #16a34a;
            --line: rgba(255, 255, 255, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.52) 0%, rgba(0, 0, 0, 0.44) 46%, rgba(0, 0, 0, 0.76) 100%),
                linear-gradient(to bottom, var(--bg-overlay-top) 0%, rgba(0, 0, 0, 0.48) 42%, var(--bg-overlay-bottom) 100%),
                url('../anhdata/products/anhnen.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        body::after {
            content: "";
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 150px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0));
            pointer-events: none;
        }

        .theme-toggle {
            display: none;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .topbar {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4vw;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-title {
            margin: 0;
            font-size: clamp(27px, 2vw, 34px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0.8px;
            color: #3ddc84;
            text-transform: uppercase;
        }

        .auth-shell {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr minmax(420px, 560px);
            align-items: center;
            gap: 28px;
            padding: 22px 5vw 42px;
        }

        .hero-copy {
            max-width: 620px;
            color: #f3f8f4;
        }

        .hero-copy h2 {
            margin: 0 0 12px;
            font-size: clamp(30px, 4vw, 58px);
            line-height: 1.08;
            letter-spacing: -0.8px;
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        }

        .hero-copy p {
            margin: 0;
            max-width: 560px;
            font-size: clamp(15px, 1.35vw, 20px);
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .form-wrap {
            width: 100%;
            display: grid;
            justify-content: end;
        }

        .form-card {
            width: min(560px, 100%);
            background: var(--form-bg);
            border: 1px solid var(--form-border);
            border-radius: 10px;
            padding: 60px 64px 52px;
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.62);
            backdrop-filter: blur(2px);
        }

        .card-title {
            margin: 0 0 28px;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .subtitle {
            margin: 0 0 24px;
            font-size: 18px;
            color: var(--muted);
        }

        .field {
            margin-bottom: 18px;
        }

        .input-shell {
            position: relative;
            height: 68px;
        }

        .input-shell > label {
            position: absolute;
            left: 16px;
            top: 9px;
            margin: 0;
            font-size: 13px;
            color: #adadad;
            pointer-events: none;
        }

        .input {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            border: 1px solid var(--field-border);
            background: var(--field-bg);
            color: #ffffff;
            outline: none;
            padding: 28px 16px 10px;
            font-size: 22px;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .input::placeholder {
            color: transparent;
        }

        .input-shell:focus-within .input {
            border-color: var(--field-focus);
            background: rgba(33, 33, 33, 0.95);
        }

        .row {
            margin: 6px 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 16px;
            color: var(--muted);
        }

        .row label {
            margin: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 16px;
        }

        .row label input {
            width: 18px;
            height: 18px;
            accent-color: #737373;
        }

        .row a {
            color: var(--muted);
            text-decoration: none;
        }

        .row a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            background: var(--red);
            font-size: 26px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background: var(--red-hover);
        }

        .btn:disabled {
            opacity: 0.75;
            cursor: not-allowed;
        }

        .status {
            min-height: 18px;
            margin-top: 12px;
            color: #f87171;
            font-size: 16px;
            text-align: center;
        }

        .status.ok {
            color: #4ade80;
        }

        .signup {
            margin: 18px 0 6px;
            color: #8c8c8c;
            font-size: 16px;
            text-align: left;
        }

        .signup a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
        }

        .signup a:hover {
            text-decoration: underline;
        }

        .hint {
            margin: 0;
            font-size: 13px;
            color: #8c8c8c;
            line-height: 1.5;
        }

        @media (max-width: 760px) {
            .topbar {
                height: 72px;
                padding: 0 18px;
            }

            .brand-title {
                font-size: 24px;
            }

            .auth-shell {
                grid-template-columns: 1fr;
                align-items: start;
                padding: 0;
                gap: 0;
            }

            .hero-copy {
                padding: 14px 24px 12px;
            }

            .hero-copy h2 {
                font-size: 30px;
            }

            .hero-copy p {
                font-size: 14px;
            }

            .form-card {
                width: 100%;
                min-height: calc(100vh - 72px);
                border-radius: 0;
                border-left: none;
                border-right: none;
                border-bottom: none;
                padding: 36px 24px 32px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="topbar">
            <div class="brand">
                <h1 class="brand-title">3 CHÚ CÚN CON</h1>
            </div>
        </header>

        <main class="auth-shell">
            <button id="themeToggle" class="theme-toggle" type="button">Theme</button>
            <section class="hero-copy" aria-hidden="true">
                <h2>Chăm sóc thú cưng bằng cả yêu thương và chuyên nghiệp.</h2>
                <p>Không gian dành cho những người yêu thú cưng, nơi mỗi lần đăng nhập là một bước gần hơn đến dịch vụ tốt nhất cho bé cưng của bạn.</p>
            </section>
            <section class="form-wrap">
                <form class="form-card" id="loginForm" novalidate>
                    <h2 class="card-title">Đăng nhập</h2>
                    <p class="subtitle">Đăng nhập để tiếp tục với khu vực quản trị.</p>

                    <div class="field">
                        <div class="input-shell">
                            <label for="identifier">Email hoặc Username</label>
                            <input id="identifier" class="input" type="text" autocomplete="username" required placeholder=" ">
                        </div>
                    </div>

                    <div class="field">
                        <div class="input-shell">
                            <label for="password">Mật khẩu</label>
                            <input id="password" class="input" type="password" autocomplete="current-password" required placeholder=" ">
                        </div>
                    </div>

                    <div class="row">
                        <label><input id="remember" type="checkbox"> Ghi nhớ đăng nhập</label>
                        <a href="javascript:void(0)">Bạn cần trợ giúp?</a>
                    </div>

                    <button class="btn" id="submitBtn" type="submit">Đăng nhập</button>
                    <div class="status" id="statusText"></div>

                </form>
            </section>
        </main>
    </div>

    <script>
        (function () {
            const form = document.getElementById('loginForm');
            const identifierInput = document.getElementById('identifier');
            const passwordInput = document.getElementById('password');
            const rememberInput = document.getElementById('remember');
            const statusText = document.getElementById('statusText');
            const submitBtn = document.getElementById('submitBtn');
            const themeToggle = document.getElementById('themeToggle');
            const socialButtons = document.querySelectorAll('.social-btn');

            const STORAGE_KEY = 'userSession';
            const REMEMBER_KEY = 'userRemember';
            const THEME_KEY = 'loginThemeMode';

            // Login page is always the source of truth: clear previous session to avoid auto-login.
            sessionStorage.removeItem('authUser');
            sessionStorage.removeItem(STORAGE_KEY);
            sessionStorage.removeItem('isLoggedIn');
            localStorage.removeItem('authUser');
            localStorage.removeItem(STORAGE_KEY);
            localStorage.setItem('isLoggedIn', JSON.stringify(false));

            const normalizeRole = (value) => {
                const role = String(value || '').trim().toLowerCase();
                if (['admin', 'administrator', 'quantri', 'quan tri', 'quan_tri'].includes(role)) {
                    return 'admin';
                }

                if (['staff', 'nhanvien', 'nhan vien', 'nhan_vien'].includes(role)) {
                    return 'staff';
                }

                return 'user';
            };

            const applyTheme = (theme) => {
                const isDark = theme === 'dark';
                document.body.classList.toggle('dark', isDark);
                if (themeToggle) {
                    themeToggle.textContent = isDark ? '☀️ Light mode' : '🌙 Dark mode';
                }
            };

            applyTheme(localStorage.getItem(THEME_KEY) || 'light');

            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const nextTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
                    localStorage.setItem(THEME_KEY, nextTheme);
                    applyTheme(nextTheme);
                });
            }

            identifierInput.value = '';
            passwordInput.value = '';
            rememberInput.checked = false;

            const setStatus = (message, ok = false) => {
                statusText.textContent = message || '';
                statusText.classList.toggle('ok', !!ok);
            };

            const getApiCandidates = () => {
                const base = window.location.href;
                return [
                    new URL('../index.php?api=login_admin_staff&portal=admin_staff', base).toString(),
                    new URL('user/home_api.php?api=login_admin_staff&portal=admin_staff', base).toString()
                ];
            };

            const resolveRoleRoute = (role) => {
                const normalized = normalizeRole(role);
                const routes = {
                    admin: './admin/admin.html',
                    staff: './staff/admin.html'
                };

                return routes[normalized] || './dang-nhap.html';
            };

            // Keep users on the login page so they can switch accounts manually.
            // Redirect to role pages only after a successful submit.

            socialButtons.forEach((btn) => {
                btn.addEventListener('click', () => {
                    setStatus('Tinh nang dang nhap mang xa hoi dang duoc cap nhat.');
                });
            });

            const submitLogin = async (identifier, password) => {
                const payload = { identifier, password, portal: 'admin_staff' };

                for (const url of getApiCandidates()) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                            body: JSON.stringify(payload),
                            cache: 'no-store'
                        });

                        const data = await response.json().catch(() => ({}));
                        if (!response.ok || !data.ok) {
                            if (response.status === 401 || data.message) {
                                return { ok: false, message: data.message || 'Sai tài khoản hoặc mật khẩu' };
                            }
                            continue;
                        }

                        return { ok: true, data };
                    } catch (error) {
                        // thử endpoint kế tiếp
                    }
                }

                return { ok: false, message: 'Không thể kết nối API đăng nhập.' };
            };

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                setStatus('');

                const identifier = identifierInput.value.trim();
                const password = passwordInput.value;

                if (!identifier || !password) {
                    setStatus('Vui lòng nhập tài khoản và mật khẩu.');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Đang đăng nhập...';

                const result = await submitLogin(identifier, password);

                submitBtn.disabled = false;
                submitBtn.textContent = 'Đăng nhập';

                if (!result.ok) {
                    setStatus(result.message || 'Đăng nhập thất bại.');
                    return;
                }

                const backendUser = result.data.data || {};
                const user = result.data.user || {};
                const role = normalizeRole(user.role || backendUser.vaitronguoidung || 'user');

                if (role === 'user') {
                    setStatus('Tài khoản user không được phép đăng nhập tại trang này.');
                    return;
                }

                const sessionUser = {
                    id: Number(user.id || backendUser.id || 0),
                    name: String(user.name || backendUser.tennguoidung || identifier),
                    identifier: String(user.identifier || backendUser.emailnguoidung || identifier),
                    role: role
                };

                sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
                    loggedIn: true,
                    token: result.data.token || '',
                    user: sessionUser,
                    loggedAt: new Date().toISOString()
                }));

                sessionStorage.setItem('authUser', JSON.stringify({
                    id: sessionUser.id,
                    tennguoidung: sessionUser.name,
                    emailnguoidung: sessionUser.identifier,
                    role: role,
                    vaitronguoidung: role,
                    identifier: sessionUser.identifier,
                    loggedAt: new Date().toISOString()
                }));
                sessionStorage.setItem('isLoggedIn', JSON.stringify(true));
                localStorage.setItem('isLoggedIn', JSON.stringify(true));

                localStorage.setItem('userProfile', JSON.stringify({
                    name: sessionUser.name,
                    email: sessionUser.identifier,
                    role: role
                }));

                if (rememberInput.checked) {
                    localStorage.setItem(REMEMBER_KEY, identifier);
                } else {
                    localStorage.removeItem(REMEMBER_KEY);
                }

                setStatus('Đăng nhập thành công. Đang chuyển trang...', true);
                const nextPage = resolveRoleRoute(role);
                window.location.replace(nextPage);
            });
        })();
    </script>
</body>
</html>
