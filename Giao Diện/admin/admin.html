<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Dashboard - Catchy Pet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="admin-style.css?v=20260401-1">
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Mở menu"><i class="bi bi-list"></i></button>
    <button class="floating-menu-btn" id="desktopMenuBtn" onclick="toggleSidebar()" aria-label="Mở menu"><i class="bi bi-list"></i></button>

    <div class="shell">
        <aside class="sidebar" id="sidebar">
            <img src="images/logo.png" alt="Catchy Pet Logo" class="sidebar-logo">
            <button class="menu-toggle" id="menuToggleBtn" onclick="toggleSidebar()" aria-label="Đóng menu"><i class="bi bi-list"></i></button>

            <ul class="sidebar-menu">
                <li><a href="#" data-page="trangchu.html" class="active"><i class="bi bi-house-door-fill"></i><span>Trang Chủ</span></a></li>
                <li><a href="#" data-page="dichvu.html"><i class="bi bi-ui-radios-grid"></i><span>Dịch Vụ</span></a></li>
                <li><a href="#" data-page="sanpham.html"><i class="bi bi-box-seam"></i><span>Sản Phẩm</span></a></li>
                <li><a href="#" data-page="khachhang.html"><i class="bi bi-person-badge"></i><span>Khách Hàng</span></a></li>
                <li><a href="#" data-page="doanhthu.html"><i class="bi bi-graph-up"></i><span>Doanh Thu</span></a></li>
                <li><a href="#" data-page="thucung.html"><i class="bi bi-heart-fill"></i><span>Thú Cưng</span></a></li>
                <li><a href="#" data-page="donhang.html"><i class="bi bi-cart-fill"></i><span>Đơn Hàng</span></a></li>
                <li><a href="#" data-app-action="logout"><i class="bi bi-box-arrow-right"></i><span>Đăng Xuất</span></a></li>
            </ul>
        </aside>

        <main class="main-content">
            <iframe id="contentFrame" title="Nội dung admin" src="trangchu.html"></iframe>
        </main>
    </div>

    <script src="../common/app-session-realtime.js"></script>
    <script>
        if (window.AppSessionRealtime) {
            window.AppSessionRealtime.requireRole(['admin']);
            window.AppSessionRealtime.bindDefaultActions(document);
        }

        const sidebar = document.getElementById('sidebar');
        const desktopMenuBtn = document.getElementById('desktopMenuBtn');
        const menuToggleBtn = document.getElementById('menuToggleBtn');

        function syncMenuButtons() {
            if (!sidebar || !desktopMenuBtn || !menuToggleBtn) return;
            const isMobile = window.innerWidth <= 768;
            const isCollapsed = sidebar.classList.contains('collapsed');
            const isShownMobile = sidebar.classList.contains('show');

            if (isMobile) {
                desktopMenuBtn.classList.remove('show');
                menuToggleBtn.setAttribute('aria-label', isShownMobile ? 'Đóng menu' : 'Mở menu');
                return;
            }

            desktopMenuBtn.classList.toggle('show', isCollapsed);
            menuToggleBtn.setAttribute('aria-label', isCollapsed ? 'Mở menu' : 'Đóng menu');
        }

        function toggleSidebar() {
            if (!sidebar) return;

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('show');
            } else {
                sidebar.classList.toggle('collapsed');
            }

            syncMenuButtons();
        }

        const links = document.querySelectorAll('.sidebar-menu a');
        const frame = document.getElementById('contentFrame');
        const PAGE_VERSION = '20260321-4';
        const CACHE_BUSTER = Date.now().toString();

        function buildFrameUrl(page) {
            const separator = page.includes('?') ? '&' : '?';
            return `${page}${separator}v=${PAGE_VERSION}&_=${CACHE_BUSTER}`;
        }

        function refreshActiveFrame() {
            if (!frame) return;
            const activeLink = document.querySelector('.sidebar-menu a.active[data-page]');
            const activePage = activeLink ? activeLink.dataset.page : 'trangchu.html';
            frame.src = buildFrameUrl(activePage);
        }

        function bindFrameRealtimeBridge() {
            if (!frame || !frame.contentWindow || !window.AppSessionRealtime) return;

            const frameWin = frame.contentWindow;
            if (frameWin.__realtimeFetchPatched === true) return;

            const nativeFetch = frameWin.fetch ? frameWin.fetch.bind(frameWin) : null;
            if (!nativeFetch) return;

            frameWin.fetch = async (...args) => {
                const response = await nativeFetch(...args);

                try {
                    const requestUrl = String(args[0] || '');
                    const watchApi =
                        requestUrl.includes('api=manage_entity') ||
                        requestUrl.includes('api=update_online_order_status') ||
                        requestUrl.includes('api=create_online_order');

                    if (watchApi) {
                        const cloned = response.clone();
                        const payload = await cloned.json().catch(() => null);
                        if (payload && payload.ok) {
                            const eventType = requestUrl.includes('update_online_order_status')
                                ? 'order_status_changed'
                                : 'entity_changed';
                            window.AppSessionRealtime.publish(eventType, {
                                url: requestUrl,
                                at: Date.now()
                            });
                        }
                    }
                } catch (e) {
                    // ignore bridge errors to keep UI stable
                }

                return response;
            };

            frameWin.__realtimeFetchPatched = true;
        }

        links.forEach((link) => {
            link.addEventListener('click', (event) => {
                event.preventDefault();
                const page = link.dataset.page;
                if (!page || !frame) return;

                frame.src = buildFrameUrl(page);
                links.forEach((item) => item.classList.remove('active'));
                link.classList.add('active');

                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('show');
                    syncMenuButtons();
                }
            });
        });

        window.addEventListener('resize', syncMenuButtons);
        if (frame) {
            frame.src = buildFrameUrl('trangchu.html');
            frame.addEventListener('load', bindFrameRealtimeBridge);
        }

        if (window.AppSessionRealtime) {
            window.AppSessionRealtime.subscribe((event) => {
                if (!event || !event.type) return;

                if (event.type === 'auth_logout') {
                    window.location.href = '../dang-nhap.html';
                    return;
                }

                if (
                    event.type === 'entity_changed' ||
                    event.type === 'order_status_changed' ||
                    event.type === 'manual_refresh'
                ) {
                    refreshActiveFrame();
                }
            });
        }

        syncMenuButtons();
    </script>
</body>
</html>
