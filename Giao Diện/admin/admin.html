<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Dashboard - Catchy Pet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="admin-style.css?v=20260412-3">
</head>
<body>
    <style>
        .sidebar-menu .submenu a {
            font-size: 13px;
            padding: 8px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: inherit;
            text-decoration: none;
        }
        .host-popup-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.42);
            z-index: 5000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 14px;
        }
        .host-popup-backdrop.show {
            display: flex;
        }
        .host-popup {
            width: min(520px, 96vw);
            background: #fff;
            border: 1px solid #dbe2ea;
            border-radius: 14px;
            box-shadow: 0 24px 56px rgba(15, 23, 42, 0.26);
            overflow: hidden;
        }
        .host-popup-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        .host-popup-title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }
        .host-popup-close {
            border: 0;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: #e2e8f0;
            font-size: 20px;
            line-height: 1;
        }
        .host-popup-body {
            padding: 14px;
            color: #334155;
            font-size: 14px;
            line-height: 1.55;
            white-space: pre-line;
        }
        .host-popup-footer {
            padding: 10px 14px 14px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: flex-end;
        }

        .host-confirm-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .logout-confirm-card {
            width: min(480px, 96vw);
            border-radius: 16px;
            border: 1px solid #d9eee1;
            background: #ffffff;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.28);
        }

        .logout-confirm-body {
            margin: 0;
            padding: 16px;
            color: #334155;
            font-size: 14px;
            line-height: 1.6;
        }

        .host-confirm-actions {
            padding: 0 16px 16px;
            border-top: 0;
        }

        .host-confirm-btn {
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 14px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .host-confirm-btn.cancel {
            background: #ffffff;
            border-color: #cbd5e1;
            color: #475569;
        }

        .host-confirm-btn.danger {
            background: #dc2626;
            border-color: #dc2626;
            color: #ffffff;
        }
    </style>
    <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Mở menu"><i class="bi bi-list"></i></button>
    <button class="floating-menu-btn" id="desktopMenuBtn" onclick="toggleSidebar()" aria-label="Mở menu"><i class="bi bi-list"></i></button>

    <div class="shell">
        <aside class="sidebar" id="sidebar">
            <img src="images/logo.png" alt="Catchy Pet Logo" class="sidebar-logo">
            <button class="menu-toggle" id="menuToggleBtn" onclick="toggleSidebar()" aria-label="Đóng menu"><i class="bi bi-list"></i></button>

            <ul class="sidebar-menu">
                <li><a href="#" data-page="trangchu.html" class="active"><i class="bi bi-house-door-fill"></i><span>Trang Chủ</span></a></li>
                <li><a href="#" data-page="dichvu.html"><i class="bi bi-ui-radios-grid"></i><span>Dịch Vụ</span></a></li>
                <li><a href="#" data-page="sanpham.html"><i class="bi bi-box-seam"></i><span>Sản Phẩm</span></a></li>
                <li><a href="#" data-page="khachhang.html"><i class="bi bi-person-badge"></i><span>Khách Hàng</span></a></li>
                <li><a href="#" data-page="doanhthu.html"><i class="bi bi-graph-up"></i><span>Doanh Thu</span></a></li>
                <li><a href="#" data-page="thucung.html"><i class="bi bi-heart-fill"></i><span>Thú Cưng</span></a></li>
                <li><a href="#" data-page="donhang.html"><i class="bi bi-cart-fill"></i><span>Đơn Hàng</span></a></li>
                <li><a href="#" data-page="voucher.html"><i class="bi bi-gift-fill"></i><span>Voucher</span></a></li>
                <li><a href="#" data-local-action="logout"><i class="bi bi-box-arrow-right"></i><span>Đăng Xuất</span></a></li>
            </ul>
        </aside>

        <main class="main-content">
            <iframe id="contentFrame" title="Nội dung admin" src="trangchu.html"></iframe>
        </main>
    </div>

    <div id="hostPopupBackdrop" class="host-popup-backdrop" hidden>
        <div class="host-popup" role="alertdialog" aria-modal="true" aria-labelledby="hostPopupTitle">
            <div class="host-popup-head">
                <h5 id="hostPopupTitle" class="host-popup-title">Thông báo</h5>
                <button id="hostPopupCloseBtn" type="button" class="host-popup-close" aria-label="Đóng">&times;</button>
            </div>
            <div id="hostPopupMessage" class="host-popup-body">-</div>
            <div class="host-popup-footer">
                <button id="hostPopupOkBtn" type="button" class="btn btn-primary btn-sm">Đã hiểu</button>
            </div>
        </div>
    </div>

    <div id="logoutConfirmBackdrop" class="host-popup-backdrop" hidden>
        <div class="host-popup logout-confirm-card" role="dialog" aria-modal="true" aria-labelledby="logoutConfirmTitle">
            <div class="host-popup-head">
                <h5 id="logoutConfirmTitle" class="host-popup-title">Xác nhận đăng xuất</h5>
                <button id="logoutConfirmCloseBtn" type="button" class="host-popup-close" aria-label="Đóng">&times;</button>
            </div>
            <p class="logout-confirm-body">Bạn có chắc chắn muốn đăng xuất khỏi hệ thống quản trị không?</p>
            <div class="host-popup-footer host-confirm-actions">
                <button id="logoutConfirmCancelBtn" type="button" class="host-confirm-btn cancel">Hủy</button>
                <button id="logoutConfirmOkBtn" type="button" class="host-confirm-btn danger">Đăng xuất</button>
            </div>
        </div>
    </div>

    <script src="../common/app-popup-policy.js"></script>
    <script src="../common/app-form-validation.js"></script>
    <script src="../common/app-session-realtime.js"></script>
    <script>
        if (window.AppSessionRealtime) {
            window.AppSessionRealtime.requireRole(['admin']);
            window.AppSessionRealtime.bindDefaultActions(document);
        }

        const sidebar = document.getElementById('sidebar');
        const desktopMenuBtn = document.getElementById('desktopMenuBtn');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const hostPopupBackdrop = document.getElementById('hostPopupBackdrop');
        const hostPopupTitle = document.getElementById('hostPopupTitle');
        const hostPopupMessage = document.getElementById('hostPopupMessage');
        const hostPopupCloseBtn = document.getElementById('hostPopupCloseBtn');
        const hostPopupOkBtn = document.getElementById('hostPopupOkBtn');
        const logoutConfirmBackdrop = document.getElementById('logoutConfirmBackdrop');
        const logoutConfirmCloseBtn = document.getElementById('logoutConfirmCloseBtn');
        const logoutConfirmCancelBtn = document.getElementById('logoutConfirmCancelBtn');
        const logoutConfirmOkBtn = document.getElementById('logoutConfirmOkBtn');
        const logoutLink = document.querySelector('[data-local-action="logout"]');

        function showHostPopup(title, message) {
            if (hostPopupTitle) hostPopupTitle.textContent = title || 'Thông báo';
            if (hostPopupMessage) hostPopupMessage.textContent = message || '';
            if (hostPopupBackdrop) {
                hostPopupBackdrop.hidden = false;
                hostPopupBackdrop.classList.add('show');
            }
        }

        function closeHostPopup() {
            if (!hostPopupBackdrop) return;
            hostPopupBackdrop.classList.remove('show');
            hostPopupBackdrop.hidden = true;
        }

        hostPopupCloseBtn?.addEventListener('click', closeHostPopup);
        hostPopupOkBtn?.addEventListener('click', closeHostPopup);
        hostPopupBackdrop?.addEventListener('click', (event) => {
            if (event.target === hostPopupBackdrop) {
                closeHostPopup();
            }
        });

        function showLogoutConfirm() {
            if (!logoutConfirmBackdrop) return;
            logoutConfirmBackdrop.hidden = false;
            logoutConfirmBackdrop.classList.add('show');
        }

        function closeLogoutConfirm() {
            if (!logoutConfirmBackdrop) return;
            logoutConfirmBackdrop.classList.remove('show');
            logoutConfirmBackdrop.hidden = true;
        }

        function performLogout() {
            closeLogoutConfirm();
            if (window.AppSessionRealtime && typeof window.AppSessionRealtime.logout === 'function') {
                window.AppSessionRealtime.logout();
                return;
            }
            window.location.href = '../dang-nhap.html';
        }

        logoutLink?.addEventListener('click', (event) => {
            event.preventDefault();
            showLogoutConfirm();
        });

        logoutConfirmCloseBtn?.addEventListener('click', closeLogoutConfirm);
        logoutConfirmCancelBtn?.addEventListener('click', closeLogoutConfirm);
        logoutConfirmOkBtn?.addEventListener('click', performLogout);
        logoutConfirmBackdrop?.addEventListener('click', (event) => {
            if (event.target === logoutConfirmBackdrop) {
                closeLogoutConfirm();
            }
        });

        function syncMenuButtons() {
            if (!sidebar || !desktopMenuBtn || !menuToggleBtn) return;
            const isMobile = window.innerWidth <= 768;
            const isCollapsed = sidebar.classList.contains('collapsed');
            const isShownMobile = sidebar.classList.contains('show');

            if (isMobile) {
                desktopMenuBtn.classList.remove('show');
                menuToggleBtn.setAttribute('aria-label', isShownMobile ? 'Đóng menu' : 'Mở menu');
                return;
            }

            desktopMenuBtn.classList.toggle('show', isCollapsed);
            menuToggleBtn.setAttribute('aria-label', isCollapsed ? 'Mở menu' : 'Đóng menu');
        }
        function toggleSidebar() {
            if (!sidebar) return;

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('show');
            } else {
                sidebar.classList.toggle('collapsed');
            }

            syncMenuButtons();
        }

        const links = document.querySelectorAll('.sidebar-menu a');
        const frame = document.getElementById('contentFrame');
        const PAGE_VERSION = '20260321-4';
        const CACHE_BUSTER = Date.now().toString();

        function buildFrameUrl(page) {
            const separator = page.includes('?') ? '&' : '?';
            return `${page}${separator}v=${PAGE_VERSION}&_=${CACHE_BUSTER}`;
        }

        function refreshActiveFrame() {
            if (!frame) return;
            const activeLink = document.querySelector('.sidebar-menu a.active[data-page]');
            const activePage = activeLink ? activeLink.dataset.page : 'trangchu.html';
            frame.src = buildFrameUrl(activePage);
        }

        function dispatchRealtimeToFrame(event) {
            if (!frame || !frame.contentWindow || !event || !event.type) {
                return false;
            }

            const frameWin = frame.contentWindow;
            let handled = false;

            try {
                frameWin.postMessage({ type: 'app_realtime_event', payload: event }, '*');
            } catch (e) {
                // ignore postMessage bridge errors
            }

            try {
                const customEvent = new frameWin.CustomEvent('app-realtime:event', { detail: event });
                frameWin.dispatchEvent(customEvent);
                handled = true;
            } catch (e) {
                // ignore custom event errors
            }

            const refreshHooks = [
                'handleRealtimeEvent',
                'onRealtimeEvent',
                'refreshRealtimeData',
                'refreshData',
                'loadData',
                'loadOrders',
                'loadProducts',
                'loadCustomers',
                'loadServices',
                'loadBookings',
                'loadAppointments',
                'refreshDashboard'
            ];

            refreshHooks.forEach((hookName) => {
                try {
                    if (typeof frameWin[hookName] === 'function') {
                        frameWin[hookName](event);
                        handled = true;
                    }
                } catch (e) {
                    // ignore hook errors to keep host stable
                }
            });

            return handled;
        }

        function bindFrameRealtimeBridge() {
            if (!frame || !frame.contentWindow || !window.AppSessionRealtime) return;

            const frameWin = frame.contentWindow;
            if (frameWin.__realtimeFetchPatched === true) return;

            const nativeFetch = frameWin.fetch ? frameWin.fetch.bind(frameWin) : null;
            if (!nativeFetch) return;

            frameWin.fetch = async (...args) => {
                const response = await nativeFetch(...args);

                try {
                    const requestUrl = String(args[0] || '');
                    const watchApi =
                        requestUrl.includes('api=manage_entity') ||
                        requestUrl.includes('api=update_online_order_status') ||
                        requestUrl.includes('api=create_online_order');

                    if (watchApi) {
                        const cloned = response.clone();
                        const payload = await cloned.json().catch(() => null);
                        if (payload && payload.ok) {
                            const eventType = requestUrl.includes('update_online_order_status')
                                ? 'order_status_changed'
                                : 'entity_changed';
                            window.AppSessionRealtime.publish(eventType, {
                                url: requestUrl,
                                at: Date.now()
                            });
                        }
                    }
                } catch (e) {
                    // ignore bridge errors to keep UI stable
                }

                return response;
            };

            frameWin.__realtimeFetchPatched = true;

            try {
                frameWin.alert = (msg) => {
                    showHostPopup('Thông báo hệ thống', String(msg || ''));
                };
            } catch (e) {
                // ignore alert patch failures
            }

            try {
                if (window.AppPopupPolicy && frameWin.document) {
                    window.AppPopupPolicy.attachToDocument(frameWin.document);
                }
            } catch (e) {
                // ignore popup policy bridge errors
            }

            try {
                if (window.AppFormValidator && frameWin.document) {
                    window.AppFormValidator.attachToDocument(frameWin.document);
                }
            } catch (e) {
                // ignore validator bridge errors
            }
        }

        links.forEach((link) => {
            link.addEventListener('click', (event) => {
                event.preventDefault();
                const page = link.dataset.page;
                if (!page || !frame) return;

                frame.src = buildFrameUrl(page);
                links.forEach((item) => item.classList.remove('active'));
                link.classList.add('active');

                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('show');
                    syncMenuButtons();
                }
            });
        });

        window.addEventListener('resize', syncMenuButtons);
        if (frame) {
            frame.src = buildFrameUrl('trangchu.html');
            frame.addEventListener('load', bindFrameRealtimeBridge);
        }

        if (window.AppSessionRealtime) {
            window.AppSessionRealtime.subscribe((event) => {
                if (!event || !event.type) return;

                if (event.type === 'auth_logout') {
                    window.location.href = '../dang-nhap.html';
                    return;
                }

                if (
                    event.type === 'entity_changed' ||
                    event.type === 'order_status_changed' ||
                    event.type === 'manual_refresh'
                ) {
                    dispatchRealtimeToFrame(event);
                }
            });
        }

        syncMenuButtons();
    </script>
</body>
</html>
