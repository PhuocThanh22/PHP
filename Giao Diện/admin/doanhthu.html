<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doanh Thu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
<div class="page-wrap">
    <div class="top-header"><h2>Báo Cáo Doanh Thu</h2></div>
    <div class="module-grid">
        <div class="module-card"><div class="module-title"><i class="bi bi-cash-coin"></i><span>Doanh Thu Tháng</span></div><div class="module-value">156.5M</div><div class="module-desc">Tăng 12.5% so với tháng trước</div></div>
        <div class="module-card"><div class="module-title"><i class="bi bi-graph-up-arrow"></i><span>Lợi Nhuận</span></div><div class="module-value">48.2M</div><div class="module-desc">Biên lợi nhuận ổn định</div></div>
        <div class="module-card"><div class="module-title"><i class="bi bi-receipt"></i><span>Số Đơn Hàng</span></div><div class="module-value">325</div><div class="module-desc">Đơn hoàn tất trong tháng</div></div>
    </div>

    <div class="chart-card revenue-chart-card">
        <h3>Biểu Đồ Doanh Thu Chi Tiết</h3>
        <div class="revenue-chart-wrap">
            <canvas id="revenueDetailChart"></canvas>
        </div>
    </div>
</div>

<script>
Chart.defaults.font.family = 'Poppins, sans-serif';
const ctx = document.getElementById('revenueDetailChart');
if (ctx) {
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['T1', 'T2', 'T3', 'T4', 'T5', 'T6'],
            datasets: [
                { label: 'Doanh thu dịch vụ', data: [28, 32, 35, 30, 41, 45], backgroundColor: 'rgba(248,117,55,0.8)', borderRadius: 8, maxBarThickness: 42 },
                { label: 'Doanh thu sản phẩm', data: [52, 58, 61, 56, 64, 71], backgroundColor: 'rgba(59,130,246,0.8)', borderRadius: 8, maxBarThickness: 42 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'top',
                    labels: { boxWidth: 20, font: { size: 13 } }
                }
            },
            scales: {
                y: { beginAtZero: true, ticks: { font: { size: 12 } } },
                x: { ticks: { font: { size: 12 } } }
            }
        }
    });
}
</script>
</body>
</html>
