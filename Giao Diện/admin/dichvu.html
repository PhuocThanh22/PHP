<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="admin-style.css?v=20260412-3">
    <style>
        #serviceEditModal .service-modal-body {
            align-items: start;
        }

        #serviceEditModal .service-form-group.image-side {
            justify-self: center;
            width: 100%;
            max-width: 140px;
        }

        #serviceEditModal .service-form-group.image-side > label {
            text-align: center;
            font-size: 12px;
            margin-bottom: 4px;
        }

        #serviceEditModal .upload-square-field {
            display: flex;
            justify-content: center;
        }

        #serviceEditModal .upload-square-box {
            width: 120px !important;
            max-width: 120px !important;
            height: 120px !important;
            min-height: 120px !important;
            margin: 0 auto !important;
            padding: 8px !important;
            gap: 4px !important;
        }

        #serviceEditModal .upload-square-plus {
            font-size: 18px !important;
        }

        #serviceEditModal .upload-square-title {
            font-size: 11px !important;
            max-width: 96px !important;
            line-height: 1.2 !important;
            font-weight: 600 !important;
        }

        #serviceEditModal .upload-square-btn {
            display: none !important;
        }

        #serviceEditModal .upload-square-types {
            display: none !important;
        }

        .module-card.is-clickable {
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .module-card.is-clickable:hover {
            transform: translateY(-2px);
        }

        .module-card.is-active {
            box-shadow: 0 0 0 2px rgba(14, 116, 144, 0.24), 0 10px 18px rgba(2, 6, 23, 0.08);
        }

        .service-category-meta {
            color: #64748b;
            font-size: 13px;
            margin-top: 6px;
        }

        .service-grid.is-category-list {
            display: block;
        }

        .service-category-table {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
        }

        .service-category-table table {
            margin-bottom: 0;
        }

        .service-category-table tbody tr:hover {
            background: #f8fafc;
        }

        .service-category-name {
            font-weight: 600;
            color: #0f172a;
        }

        .service-category-count {
            font-weight: 600;
            color: #1e293b;
        }

        .service-category-empty {
            text-align: center;
            color: #64748b;
            padding: 18px 12px;
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="top-header d-flex justify-content-between align-items-center">
            <h2>Quản Lý Dịch Vụ</h2>
            <div class="service-toolbar">
                <div class="service-search">
                    <i class="bi bi-search"></i>
                    <input id="serviceSearchInput" type="text" placeholder="Tìm theo tên hoặc mã dịch vụ..." aria-label="Tìm dịch vụ">
                </div>
                <div class="service-toolbar-actions">
                    <button class="btn btn-success" type="button" id="toolbarAddBtn"><i class="bi bi-plus-lg me-1"></i>Thêm</button>
                    <button class="btn btn-danger" type="button" id="toolbarDeleteBtn"><i class="bi bi-trash me-1"></i>Xóa</button>
                    <button class="btn btn-outline-primary" type="button" id="toolbarExportBtn"><i class="bi bi-download me-1"></i>Xuất danh sách</button>
                </div>
            </div>
        </div>

        <div class="module-grid mb-3">
            <div class="module-card is-clickable is-active" data-mode="services">
                <div class="module-title"><i class="bi bi-tools"></i><span>Tất Cả Dịch Vụ</span></div>
                <div class="module-value" id="serviceTotalCount">0</div>
                <div class="module-desc">Danh sách dịch vụ hiện có</div>
            </div>
            <div class="module-card is-clickable" data-mode="categories">
                <div class="module-title"><i class="bi bi-tags"></i><span>Danh Mục</span></div>
                <div class="module-value" id="serviceCategoryCount">0</div>
                <div class="module-desc">Nhóm danh mục dịch vụ</div>
            </div>
        </div>

        <div class="content-section">
            <div class="section-header"><h3 id="serviceSectionTitle"><i class="bi bi-tools text-warning me-2"></i>Danh Sách Dịch Vụ</h3></div>
            <div class="service-grid" id="serviceGrid">
                <div class="service-card"><div class="service-title">Đang tải dữ liệu dịch vụ...</div></div>
            </div>
        </div>
    </div>

    <div class="service-modal" id="serviceEditModal" aria-hidden="true">
        <div class="service-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="serviceEditTitle">
            <div class="service-modal-header">
                <h3 class="service-modal-title" id="serviceEditTitle">Chỉnh sửa dịch vụ</h3>
                <button type="button" class="service-modal-close" id="closeServiceModal" aria-label="Đóng">&times;</button>
            </div>

            <form id="serviceEditForm">
                <div class="service-modal-body">
                    <input type="hidden" id="editServiceId">
                    <input type="hidden" id="editServiceImagePath">

                    <div class="service-form-group full">
                        <label for="editServiceImage">Link ảnh dịch vụ</label>
                        <input class="service-form-control" id="editServiceImage" type="text" placeholder="Ví dụ: https://example.com/image.jpg hoặc anhdata/services/abc.jpg">
                    </div>

                    <div class="service-form-group full">
                        <label for="editServiceImageFile">Tải ảnh dịch vụ</label>
                        <div class="upload-square-field">
                            <input class="upload-square-input" id="editServiceImageFile" type="file" accept="image/*">
                            <label for="editServiceImageFile" class="upload-square-box" aria-label="Tải ảnh dịch vụ">
                                <i class="bi bi-plus-lg upload-square-plus"></i>
                                <span class="upload-square-title">Kéo thả ảnh hoặc tệp vào đây để tải lên</span>
                                <span class="upload-square-btn"><i class="bi bi-cloud-upload"></i> Tải lên</span>
                                <small class="upload-square-types">Hỗ trợ: JPG, PNG, JPEG, BMP, WEBP</small>
                            </label>
                        </div>
                        <small id="editServiceImageFileHint" class="text-muted"></small>
                    </div>

                    <div class="service-form-group full">
                        <label for="editServiceName">Tên dịch vụ</label>
                        <input class="service-form-control" id="editServiceName" type="text" required>
                    </div>

                    <div class="service-form-group full">
                        <label for="editServiceCategory">Danh mục dịch vụ</label>
                        <select class="service-form-control" id="editServiceCategory">
                            <option value="">Chưa phân loại</option>
                        </select>
                    </div>

                    <div class="service-form-group">
                        <label for="editServicePrice">Giá dịch vụ (VND)</label>
                        <input class="service-form-control" id="editServicePrice" type="number" min="0" step="1000" required>
                    </div>

                    <div class="service-form-group">
                        <label for="editServiceDuration">Thời gian (phút)</label>
                        <input class="service-form-control" id="editServiceDuration" type="number" min="1" required>
                    </div>

                    <div class="service-form-group">
                        <label for="editServiceStatus">Trạng thái</label>
                        <select class="service-form-control" id="editServiceStatus" required>
                            <option value="hoatdong">Hoạt động</option>
                            <option value="khonghoatdong">Ngừng hoạt động</option>
                        </select>
                    </div>

                    <div class="service-form-group full">
                        <label for="editServiceInfo">Thông tin dịch vụ</label>
                        <textarea class="service-form-control" id="editServiceInfo" rows="3" placeholder="Nhập thông tin/mô tả dịch vụ..."></textarea>
                    </div>
                </div>

                <div class="service-modal-footer">
                    <button type="button" class="btn btn-outline-secondary" id="cancelServiceModal">Hủy</button>
                    <button type="submit" class="btn btn-warning text-white" id="saveServiceBtn">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </div>

    <div class="service-modal" id="serviceCategoryModal" aria-hidden="true">
        <div class="service-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="serviceCategoryModalTitle">
            <div class="service-modal-header">
                <h3 class="service-modal-title" id="serviceCategoryModalTitle">Thêm danh mục dịch vụ</h3>
                <button type="button" class="service-modal-close" id="closeServiceCategoryModal" aria-label="Đóng">&times;</button>
            </div>

            <form id="serviceCategoryForm">
                <div class="service-modal-body">
                    <div class="service-form-group full">
                        <label for="newServiceCategoryName">Tên danh mục dịch vụ</label>
                        <input class="service-form-control" id="newServiceCategoryName" type="text" maxlength="120" placeholder="Ví dụ: Chăm sóc lông" required>
                    </div>
                </div>

                <div class="service-modal-footer">
                    <button type="button" class="btn btn-outline-secondary" id="cancelServiceCategoryModal">Hủy</button>
                    <button type="submit" class="btn btn-warning text-white" id="saveServiceCategoryBtn">Thêm danh mục</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const serviceStore = new Map();
        let allServices = [];
        let allServiceCategories = [];
        let currentFilter = '';
        let currentListMode = 'services';
        let editMode = 'update';
        const selectedServiceIds = new Set();
        const selectedCategoryIds = new Set();
        const SERVICE_RT_EVENT_KEY = 'app_services_realtime_event';

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatCurrencyVND(value) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND', maximumFractionDigits: 0 }).format(Number(value || 0));
        }

        function askExportFormat() {
            return new Promise((resolve) => {
                const backdrop = document.createElement('div');
                backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:12px;';

                const dialog = document.createElement('div');
                dialog.style.cssText = 'width:min(420px,96vw);background:#fff;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 20px 40px rgba(15,23,42,.25);padding:14px;';
                dialog.innerHTML = `
                    <h4 style="margin:0 0 8px;font-size:18px;font-weight:700;color:#0f172a;">Chọn định dạng xuất</h4>
                    <p style="margin:0 0 12px;font-size:14px;color:#475569;">Bạn muốn xuất danh sách dưới dạng nào?</p>
                    <div style="display:flex;gap:8px;justify-content:flex-end;">
                        <button type="button" data-format="cancel" class="btn btn-outline-secondary">Hủy</button>
                        <button type="button" data-format="pdf" class="btn btn-outline-primary">PDF</button>
                        <button type="button" data-format="excel" class="btn btn-success">Excel</button>
                    </div>
                `;

                function close(value) {
                    backdrop.remove();
                    resolve(value || '');
                }

                dialog.querySelectorAll('button[data-format]').forEach((btn) => {
                    btn.addEventListener('click', () => {
                        const value = String(btn.getAttribute('data-format') || 'cancel');
                        close(value === 'cancel' ? '' : value);
                    });
                });

                backdrop.addEventListener('click', (event) => {
                    if (event.target === backdrop) close('');
                });

                backdrop.appendChild(dialog);
                document.body.appendChild(backdrop);
            });
        }

        function downloadExcelFile(fileName, title, headers, rows) {
            const thead = `<tr>${headers.map((h) => `<th>${escapeHtml(h)}</th>`).join('')}</tr>`;
            const tbody = rows.map((row) => `<tr>${row.map((cell) => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('');
            const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>table{border-collapse:collapse;width:100%;}th,td{border:1px solid #999;padding:6px;font-size:13px;}th{background:#f2f2f2;}h3{margin:0 0 10px;}</style></head><body><h3>${escapeHtml(title)}</h3><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></body></html>`;
            const blob = new Blob(['\uFEFF' + html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        }

        function openPdfPrint(title, headers, rows) {
            const win = window.open('', '_blank', 'width=1000,height=700');
            if (!win) {
                showNotice('Không mở được cửa sổ in. Vui lòng tắt chặn popup.', 'warning');
                return;
            }
            const thead = `<tr>${headers.map((h) => `<th>${escapeHtml(h)}</th>`).join('')}</tr>`;
            const tbody = rows.map((row) => `<tr>${row.map((cell) => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('');
            win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHtml(title)}</title><style>body{font-family:Arial,sans-serif;padding:20px;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #ccc;padding:8px;font-size:13px;}th{background:#f5f5f5;}h3{margin:0 0 12px;}</style></head><body><h3>${escapeHtml(title)}</h3><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></body></html>`);
            win.document.close();
            win.focus();
            win.print();
        }

        async function exportServicesList() {
            const format = await askExportFormat();
            if (!format) return;

            if (currentListMode === 'categories') {
                const rows = getFilteredCategories(allServiceCategories, currentFilter);
                if (!rows.length) {
                    showNotice('Không có dữ liệu danh mục dịch vụ để xuất.', 'warning');
                    return;
                }

                const dataRows = rows.map((item) => ([
                    item.id || '',
                    item.tendanhmucdichvu || '',
                    Number(item.so_dich_vu || 0),
                ]));

                const headers = ['Mã danh mục', 'Tên danh mục', 'Số dịch vụ'];
                if (format === 'excel') {
                    downloadExcelFile(`danh-muc-dich-vu-${new Date().toISOString().slice(0, 10)}.xls`, 'Danh mục dịch vụ', headers, dataRows);
                } else {
                    openPdfPrint('Danh mục dịch vụ', headers, dataRows);
                }
                showNotice(`Đã xuất ${rows.length} danh mục dịch vụ.`, 'success');
                return;
            }

            const rows = getFilteredServices(allServices, currentFilter);
            if (!rows.length) {
                showNotice('Không có dữ liệu dịch vụ để xuất.', 'warning');
                return;
            }

            const dataRows = rows.map((item) => ([
                item.id || '',
                item.tendichvu || '',
                Number(item.giadichvu || 0),
                Number(item.thoigiandichvu || 0),
                String(item.trangthaidichvu || '').toLowerCase() === 'hoatdong' ? 'Hoạt động' : 'Ngừng hoạt động',
            ]));

            const headers = ['Mã dịch vụ', 'Tên dịch vụ', 'Giá', 'Thời gian (phút)', 'Trạng thái'];
            if (format === 'excel') {
                downloadExcelFile(`dich-vu-${new Date().toISOString().slice(0, 10)}.xls`, 'Danh sách dịch vụ', headers, dataRows);
            } else {
                openPdfPrint('Danh sách dịch vụ', headers, dataRows);
            }
            showNotice(`Đã xuất ${rows.length} dịch vụ.`, 'success');
        }

        function publishServiceRealtimeChange(action = 'changed') {
            const payload = {
                module: 'services',
                action: String(action || 'changed'),
                at: Date.now(),
            };

            try {
                localStorage.setItem(SERVICE_RT_EVENT_KEY, JSON.stringify(payload));
            } catch (_) {
                // Ignore storage failures.
            }

            const sessionApi = window.AppSessionRealtime || (window.parent && window.parent.AppSessionRealtime);
            if (sessionApi && typeof sessionApi.publish === 'function') {
                try {
                    sessionApi.publish('services_changed', payload);
                } catch (_) {
                    // Ignore cross-frame publish failures.
                }
            }
        }

        function getErrorMessage(error) {
            if (!error) return 'Lỗi không xác định';
            if (typeof error === 'string') return error;
            if (error.message) return error.message;
            return 'Lỗi không xác định';
        }

        function normalizeImage(src) {
            const value = String(src || '').trim();
            if (!value) return '';
            if (value.startsWith('http://') || value.startsWith('https://') || value.startsWith('/')) return value;
            if (/^[A-Za-z]:[\\/]/.test(value)) return value.replace(/\\/g, '/');
            return '../../' + value.replace(/^\/+/, '');
        }

        function setServiceImageFileHint(text) {
            const hintEl = document.getElementById('editServiceImageFileHint');
            if (hintEl) hintEl.textContent = String(text || '');
        }

        let noticeTimer = null;

        function getNoticeTitle(type) {
            if (type === 'error') return 'Thông báo lỗi';
            if (type === 'warning') return 'Thông báo';
            return 'Chúc mừng';
        }

        function getNoticeRestoreModalId() {
            return '';
        }

        function ensureNoticeModal() {
            let modal = document.getElementById('globalNoticeModal');
            if (modal) return modal;

            modal = document.createElement('div');
            modal.id = 'globalNoticeModal';
            modal.className = 'service-modal';
            modal.setAttribute('aria-hidden', 'true');
            modal.innerHTML = `
                <div class="service-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="noticeModalTitle">
                    <div class="service-modal-header">
                        <h3 class="service-modal-title" id="noticeModalTitle">Thông báo</h3>
                        <button type="button" class="service-modal-close" id="noticeModalCloseBtn" aria-label="Dong">&times;</button>
                    </div>
                    <div class="service-modal-body">
                        <div id="noticeModalMessage" style="text-align:center; font-size:16px; font-weight:500;"></div>
                    </div>
                    <div class="service-modal-footer">
                        <button type="button" class="btn btn-warning text-white" id="noticeModalOkBtn">Đóng</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            modal.addEventListener('click', (event) => {
                if (event.target.id === 'globalNoticeModal') closeNotice();
            });
            modal.querySelector('#noticeModalCloseBtn')?.addEventListener('click', closeNotice);
            modal.querySelector('#noticeModalOkBtn')?.addEventListener('click', closeNotice);

            return modal;
        }

        function isNoticeVisible() {
            const modal = document.getElementById('globalNoticeModal');
            return Boolean(modal && modal.classList.contains('show'));
        }

        function closeNotice() {
            const modal = document.getElementById('globalNoticeModal');
            if (!modal) return;

            if (noticeTimer) {
                window.clearTimeout(noticeTimer);
                noticeTimer = null;
            }

            modal.classList.remove('show');
            modal.setAttribute('aria-hidden', 'true');

            const restoreId = modal.dataset.restoreModalId || '';
            if (restoreId) {
                const restoreModal = document.getElementById(restoreId);
                if (restoreModal && !restoreModal.classList.contains('show')) {
                    restoreModal.classList.add('show');
                    restoreModal.setAttribute('aria-hidden', 'false');
                }
            }
            modal.dataset.restoreModalId = '';
        }

        function showNotice(message, type = 'success') {
            const modal = ensureNoticeModal();
            const titleEl = modal.querySelector('#noticeModalTitle');
            const messageEl = modal.querySelector('#noticeModalMessage');

            const restoreId = getNoticeRestoreModalId();
            if (restoreId) {
                const restoreModal = document.getElementById(restoreId);
                restoreModal?.classList.remove('show');
                restoreModal?.setAttribute('aria-hidden', 'true');
            }
            modal.dataset.restoreModalId = restoreId;

            if (titleEl) titleEl.textContent = getNoticeTitle(type);
            if (messageEl) messageEl.textContent = String(message || '');

            modal.classList.add('show');
            modal.setAttribute('aria-hidden', 'false');

            if (noticeTimer) window.clearTimeout(noticeTimer);
            noticeTimer = window.setTimeout(closeNotice, 2500);
        }

        async function parseFailedResponse(response, fallbackMessage) {
            let errorMessage = fallbackMessage || ('HTTP ' + response.status);
            try {
                const contentType = response.headers.get('content-type') || '';
                if (contentType.includes('application/json')) {
                    const body = await response.json();
                    errorMessage = body.message || body.error || errorMessage;
                } else {
                    const raw = (await response.text() || '').trim();
                    if (raw) errorMessage = raw;
                }
            } catch (_) {
                // Keep fallback message when body parsing fails.
            }
            return new Error(errorMessage);
        }

        async function uploadImageFile(file, type = 'services') {
            if (!(file instanceof File)) return '';

            const candidates = [
                'get_services.php?api=upload_image',
                new URL('get_services.php?api=upload_image', window.location.href).toString(),
            ];
            let lastError = new Error('Khong the tai anh len');

            for (const candidate of candidates) {
                const separator = candidate.includes('?') ? '&' : '?';
                const url = `${candidate}${separator}_t=${Date.now()}`;

                const formData = new FormData();
                formData.append('image', file);
                formData.append('type', type);

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        body: formData,
                    });

                    if (!response.ok) {
                        lastError = await parseFailedResponse(response, 'HTTP ' + response.status);
                        continue;
                    }

                    const payload = await response.json();
                    if (!payload.ok) {
                        lastError = new Error(payload.message || 'Upload that bai');
                        continue;
                    }

                    return String(payload.data?.path || '');
                } catch (error) {
                    lastError = error;
                }
            }

            throw lastError;
        }

        function getServiceVisual(serviceName) {
            const name = String(serviceName || '').toLowerCase();
            if (name.includes('cắt') || name.includes('tỉa') || name.includes('groom')) return { typeClass: 'type-grooming', icon: 'bi-scissors' };
            if (name.includes('khám') || name.includes('tiêm') || name.includes('xét nghiệm') || name.includes('cấp cứu')) return { typeClass: 'type-health', icon: 'bi-heart-pulse' };
            if (name.includes('tắm') || name.includes('vệ sinh') || name.includes('khử mùi')) return { typeClass: 'type-cleaning', icon: 'bi-droplet-half' };
            if (name.includes('huấn luyện')) return { typeClass: 'type-training', icon: 'bi-mortarboard' };
            if (name.includes('lưu chuồng') || name.includes('trông giữ') || name.includes('vận chuyển')) return { typeClass: 'type-boarding', icon: 'bi-house-heart' };
            return { typeClass: 'type-other', icon: 'bi-stars' };
        }

        function getFilteredServices(list, keyword) {
            const key = String(keyword || '').trim().toLowerCase();
            if (!key) return list;
            return list.filter((row) => {
                const name = String(row.tendichvu || '').toLowerCase();
                const idText = String(row.id || '').toLowerCase();
                const info = String(row.thongtin || '').toLowerCase();
                return name.includes(key) || idText.includes(key) || info.includes(key);
            });
        }

        function summarizeServiceInfo(value) {

        function getServiceApiCandidates() {
            const candidates = [];

            // Most stable in iframe context: same-folder endpoint.
            candidates.push('get_services.php?api=get_services');

            // Most reliable candidate: resolve from the current iframe URL.
            candidates.push(new URL('../../index.php?api=get_services', window.location.href).toString());

            const marker = '/admin/';
            const pathname = window.location.pathname || '';
            const markerIndex = pathname.lastIndexOf(marker);
            if (markerIndex >= 0) {
                const beforeAdmin = pathname.slice(0, markerIndex);
                const giaoDienIndex = beforeAdmin.lastIndexOf('/Giao');
                const detectedBase = giaoDienIndex >= 0 ? beforeAdmin.slice(0, giaoDienIndex) : beforeAdmin;
                if (detectedBase) candidates.push(`${detectedBase}/index.php?api=get_services`);
            }

            candidates.push('/phuocthanh/PHPCHINH/index.php?api=get_services');
            candidates.push('/PHPCHINH/index.php?api=get_services');
            candidates.push('/index.php?api=get_services');

            return Array.from(new Set(candidates));
        }

        async function fetchServicesPayload() {
            const candidates = getServiceApiCandidates();
            const cacheBuster = `_t=${Date.now()}`;
            let lastError = new Error('Khong lay duoc du lieu dich vu');
            const attempts = [];

            for (const candidate of candidates) {
                const separator = candidate.includes('?') ? '&' : '?';
                const url = `${candidate}${separator}${cacheBuster}`;

                try {
                    const response = await fetch(url, { cache: 'no-store' });
                    if (!response.ok) {
                        lastError = new Error('HTTP ' + response.status);
                        attempts.push(`${url} -> HTTP ${response.status}`);
                        continue;
                    }

                    const payload = await response.json();
                    if (!payload.ok) {
                        lastError = new Error(payload.message || 'Khong lay duoc du lieu dich vu');
                        attempts.push(`${url} -> API ${payload.message || 'ok=false'}`);
                        continue;
                    }

                    payload.__debugApiUrl = url;
                    return payload;
                } catch (error) {
                    lastError = error;
                    attempts.push(`${url} -> ${error.message}`);
                }
            }

            const detail = attempts.length ? attempts.join(' | ') : 'Khong co attempt';
            throw new Error(`${lastError.message} | Attempts: ${detail}`);
        }

        async function mutateService(action, payload = {}) {
            const candidates = getServiceApiCandidates();
            let lastError = new Error('Khong the xu ly dich vu');

            for (const candidate of candidates) {
                const separator = candidate.includes('?') ? '&' : '?';
                const url = `${candidate}${separator}_t=${Date.now()}`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ entity: 'services', action, ...payload }),
                    });

                    if (!response.ok) {
                        lastError = await parseFailedResponse(response, 'HTTP ' + response.status);
                        continue;
                    }

                    const data = await response.json();
                    if (!data.ok) {
                        lastError = new Error(data.message || 'API ok=false');
                        continue;
                    }

                    return data;
                } catch (error) {
                    lastError = error;
                }
            }

            throw lastError;
        }

        async function loadServices(forceReload = false) {
            const grid = document.getElementById('serviceGrid');
            if (!grid) return;
            if (grid.dataset.loaded === '1' && !forceReload) return;

            serviceStore.clear();

            grid.innerHTML = '<div class="service-card"><div class="service-title">Đang tải dữ liệu dịch vụ...</div></div>';

            try {
                const payload = await fetchServicesPayload();

                const rows = Array.isArray(payload.data) ? payload.data : [];
                allServiceCategories = Array.isArray(payload.categories)
                    ? payload.categories.map((row) => ({
                        id: Number(row.id || 0),
                        tendanhmucdichvu: String(row.tendanhmucdichvu || ''),
                        so_dich_vu: Number(row.so_dich_vu || 0),
                    })).filter((row) => row.id > 0)
                    : [];

                allServices = rows.map((row) => ({ ...row }));
                allServices.forEach((row) => serviceStore.set(String(row.id), row));
                updateServiceSummary();
                renderServiceCategoryOptions('');
                renderByCurrentFilter();

                grid.dataset.loaded = '1';
            } catch (error) {
                grid.innerHTML = `<div class="service-card"><div class="service-title text-danger">Không tải được dữ liệu dịch vụ</div><div class="service-meta"><div>${escapeHtml(error.message)}</div></div></div>`;
            }
        }

        async function deleteServiceBySearch() {
            const selectedIds = Array.from(selectedServiceIds).filter((id) => serviceStore.has(String(id)));
            if (!selectedIds.length) {
                showNotice('Vui lòng chọn ít nhất 1 dịch vụ cần xóa.', 'warning');
                return;
            }

            const ok = confirm(`Bạn có chắc muốn xóa ${selectedIds.length} dịch vụ đã chọn?`);
            if (!ok) return;

            let deletedCount = 0;
            try {
                for (const id of selectedIds) {
                    const target = serviceStore.get(String(id));
                    if (!target) continue;
                    await mutateService('delete', { id: target.id });
                    allServices = allServices.filter((item) => String(item.id) !== String(target.id));
                    serviceStore.delete(String(target.id));
                    selectedServiceIds.delete(String(target.id));
                    deletedCount += 1;
                }

                renderByCurrentFilter();
                if (deletedCount > 0) publishServiceRealtimeChange('delete_service');
                showNotice(`Đã xóa ${deletedCount} dịch vụ đã chọn.`, 'success');
            } catch (error) {
                showNotice('Xóa dịch vụ thất bại: ' + getErrorMessage(error), 'error');
            }
        }

                        trangthaidichvu: status,
                        thongtin: info,
                        hinhanhdichvu: uploadedImagePath,
                    });

                    const created = res.data || {};
                    allServices.unshift(created);
                    serviceStore.set(String(created.id), created);
                    renderByCurrentFilter();
                    publishServiceRealtimeChange('create_service');
                    showNotice(`Thêm dịch vụ "${created.tendichvu || name}" thành công.`, 'success');
                } else {
                    const id = String(rawId);
                    const res = await mutateService('update', {
                        id: Number(rawId),
                        tendichvu: name,
                        giadichvu: price,
                        thoigiandichvu: duration,
                        danhmucdichvu_id: serviceCategoryId,
                        trangthaidichvu: status,
                        thongtin: info,
                        hinhanhdichvu: uploadedImagePath,
                    });

                    const updated = res.data || {};
                    serviceStore.set(id, updated);
                    allServices = allServices.map((item) => String(item.id) === id ? updated : item);
                    applyServiceToCard(updated);
                    publishServiceRealtimeChange('update_service');
                    showNotice(`Cập nhật dịch vụ "${updated.tendichvu || name}" thành công.`, 'success');
                }

                closeServiceModal();
            } catch (error) {
                showNotice('Lưu dịch vụ thất bại: ' + getErrorMessage(error), 'error');
            }
        });

        document.getElementById('serviceSearchInput').addEventListener('input', (event) => {
            currentFilter = event.target.value || '';
            renderByCurrentFilter();
        });

        document.querySelectorAll('.module-card[data-mode]').forEach((card) => {
            card.addEventListener('click', () => {
                setListMode(card.getAttribute('data-mode') || 'services');
            });
        });

        document.getElementById('toolbarAddBtn').addEventListener('click', async () => {
            if (currentListMode === 'categories') {
                openServiceCategoryModal();
                return;
            }

            openAddServiceModal();
        });

        document.getElementById('toolbarDeleteBtn').addEventListener('click', async () => {
            if (currentListMode === 'categories') {
                const ids = Array.from(selectedCategoryIds);
                if (!ids.length) {
                    showNotice('Vui lòng chọn ít nhất 1 danh mục dịch vụ cần xóa.', 'warning');
                    return;
                }

                const ok = confirm(`Bạn có chắc muốn xóa ${ids.length} danh mục dịch vụ đã chọn?`);
                if (!ok) return;

                try {
                    for (const id of ids) {
                        await mutateServiceCategory('delete', { id: Number(id) });
                        selectedCategoryIds.delete(String(id));
                    }
                    await loadServices(true);
                    setListMode('categories');
                    publishServiceRealtimeChange('delete_service_category');
                    showNotice(`Đã xóa ${ids.length} danh mục dịch vụ.`, 'success');
                } catch (error) {
                    showNotice('Xóa danh mục dịch vụ thất bại: ' + getErrorMessage(error), 'error');
                }
                return;
            }

            deleteServiceBySearch();
        });

        document.getElementById('editServiceImageFile').addEventListener('change', (event) => {
            const file = event.target.files?.[0] || null;
            if (!file) {
                setServiceImageFileHint('Chưa chọn tệp ảnh. Có thể tải lên trực tiếp từ máy tính.');
                return;
            }
            setServiceImageFileHint(`Đã chọn: ${file.name}`);
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                if (isNoticeVisible()) {
                    closeNotice();
                    return;
                }
                closeServiceCategoryModal();
                closeServiceModal();
            }
        });

        document.documentElement.classList.add('hide-scrollbar');
        document.body.classList.add('hide-scrollbar');

        updateModeCardsUI();
        updateServiceSectionTitle();
        updateToolbarByMode();

        loadServices();
    </script>
</body>
</html>
