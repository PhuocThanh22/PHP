<script>
(function () {
    const styles = [
        { key: "bootstrap.min.css", href: "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" },
        { key: "giao-dien-nguoi-dung.css", href: "../giao-dien-nguoi-dung.css" }
    ];

    styles.forEach((style) => {
        if (!document.querySelector(`link[href*="${style.key}"]`)) {
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = style.href;
            document.head.appendChild(link);
        }
    });

    const renderIcons = () => {
        if (typeof window.feather !== "undefined") {
            window.feather.replace();
        }
    };

    if (typeof window.feather !== "undefined") {
        renderIcons();
    } else if (!document.querySelector('script[src*="feather-icons"]')) {
        const script = document.createElement("script");
        script.src = "https://unpkg.com/feather-icons";
        script.defer = true;
        script.onload = renderIcons;
        document.head.appendChild(script);
    }
})();
</script>

    const SHOP_CATEGORY_STORAGE_KEY = 'shopSelectedCategory';
    let currentDogBreedView = '';
    let currentCatBreedView = '';
    let keepMainSidebarOnDogBreedView = false;
    let currentSubcategoryFilter = '';

    const normalizeTextKey = (value) => {
        return String(value || '')
            .trim()
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '');
    };

    const detectProductSubcategory = ({ category, name, code, subcategory }) => {
        const explicit = String(subcategory || '').trim();
        if (explicit) return explicit;

        const normalizedCategory = normalizeTextKey(category);
        const normalizedName = `${normalizeTextKey(name)} ${normalizeTextKey(code)}`;

        const pick = (rules, fallbackLabel = 'Khác') => {
            const found = rules.find((rule) => rule.keys.some((keyword) => normalizedName.includes(keyword)));
            return found ? found.label : fallbackLabel;
        };

        if (normalizedCategory === 'thuc an') {
            return pick([
                { label: 'Cho chó', keys: ['cho', 'dog', 'canine', 'puppy'] },
                { label: 'Cho mèo', keys: ['meo', 'cat', 'feline', 'kitten'] },
                { label: 'Snack & thưởng', keys: ['snack', 'thuong', 'treat', 'banh'] },
                { label: 'Pate & đồ hộp', keys: ['pate', 'hop', 'can'] },
            ]);
        }

        if (normalizedCategory === 'phu kien') {
            return pick([
                { label: 'Dây dắt & vòng cổ', keys: ['day', 'vong co', 'xich', 'leash', 'collar', 'harness'] },
                { label: 'Đồ chơi', keys: ['do choi', 'toy', 'ball'] },
                { label: 'Bát ăn', keys: ['bat', 'bowl', 'an'] },
                { label: 'Vệ sinh', keys: ['ve sinh', 'shampoo', 'tam', 'cat litter', 'litter'] },
            ]);
        }

        if (normalizedCategory === 'noi that') {
            return pick([
                { label: 'Nệm & giường', keys: ['nem', 'giuong', 'bed', 'cushion'] },
                { label: 'Nhà & chuồng', keys: ['nha', 'chuong', 'kennel', 'crate', 'tent'] },
                { label: 'Ghế & ổ nằm', keys: ['ghe', 'o nam', 'sofa'] },
            ]);
        }

        if (normalizedCategory === 'tui xach') {
            return pick([
                { label: 'Túi đeo', keys: ['deo', 'shoulder', 'sling'] },
                { label: 'Ba lô', keys: ['ba lo', 'backpack'] },
                { label: 'Vali vận chuyển', keys: ['vali', 'carrier', 'transport'] },
            ]);
        }

        if (normalizedCategory === 'giong cho') {
            return pick([
                { label: 'Poodle', keys: ['poodle'] },
                { label: 'Golden', keys: ['golden'] },
                { label: 'Husky', keys: ['husky'] },
                { label: 'Beagle', keys: ['beagle'] },
                { label: 'Samoyed', keys: ['samoyed'] },
            ], 'Giống khác');
        }

        if (normalizedCategory === 'giong meo') {
            return pick([
                { label: 'Mèo Anh', keys: ['anh long ngan', 'british'] },
                { label: 'Ba Tư', keys: ['ba tu', 'persian'] },
                { label: 'Scottish Fold', keys: ['scottish'] },
                { label: 'Maine Coon', keys: ['maine coon'] },
                { label: 'Ragdoll', keys: ['ragdoll'] },
            ], 'Giống khác');
        }

        return 'Khác';
    };

    const DEFAULT_CATEGORY_SUBCATEGORIES = {
        'Thức ăn': ['Cho chó', 'Cho mèo', 'Snack & thưởng', 'Pate & đồ hộp'],
        'Phụ kiện': ['Dây dắt & vòng cổ', 'Đồ chơi', 'Bát ăn', 'Vệ sinh'],
        'Nội thất': ['Nệm & giường', 'Nhà & chuồng', 'Ghế & ổ nằm'],
        'Túi xách': ['Túi đeo', 'Ba lô', 'Vali vận chuyển'],
        'Giống chó': ['Poodle', 'Golden', 'Husky', 'Beagle', 'Samoyed', 'Giống khác'],
        'Giống mèo': ['Mèo Anh', 'Ba Tư', 'Scottish Fold', 'Maine Coon', 'Ragdoll', 'Giống khác'],
    };

    const resolveProductImageUrl = (rawPath) => {
        const fallbackImage = 'https://images.unsplash.com/photo-1589924691995-400dc9ecc119?w=400&h=400&fit=crop';
        const path = String(rawPath || '').trim().replace(/\\/g, '/');

        if (!path) return fallbackImage;
        if (/^(?:https?:)?\/\//i.test(path) || path.startsWith('data:')) return path;

        const pathname = String(window.location.pathname || '');
        const markerIndexRaw = pathname.indexOf('/Giao Diện/');
        const markerIndexEncoded = pathname.indexOf('/Giao%20Diện/');
        const markerIndex = markerIndexRaw >= 0 ? markerIndexRaw : markerIndexEncoded;
        const projectBase = markerIndex > 0 ? pathname.slice(0, markerIndex) : '';

        let normalizedPath = path.replace(/^\.\//, '');
        normalizedPath = normalizedPath.replace(/^Giao Diện\/user\//i, '');
        normalizedPath = normalizedPath.replace(/^Giao%20Diện\/user\//i, '');
        normalizedPath = normalizedPath.replace(/^Giao Diện\//i, '');
        normalizedPath = normalizedPath.replace(/^Giao%20Diện\//i, '');
        normalizedPath = normalizedPath.replace(/^user\//i, '');

        if (normalizedPath.startsWith('/')) {
            return normalizedPath.replace(/ /g, '%20');
        }

        if (/^anhdata\//i.test(normalizedPath)) {
            return `${window.location.origin}${projectBase}/${normalizedPath}`.replace(/ /g, '%20');
        }

        try {
            if (projectBase) {
                return new URL(`${projectBase}/${normalizedPath}`.replace(/ /g, '%20'), window.location.origin).toString();
            }
            return new URL(normalizedPath, window.location.href).toString();
        } catch (error) {
            return fallbackImage;
        }
    };

    const buildImageFallbackCandidates = (src) => {
        const source = String(src || '').trim();
        if (!source) return [];

        const candidates = [];
        const pushUnique = (value) => {
            const normalized = String(value || '').trim();
            if (normalized && !candidates.includes(normalized)) {
                candidates.push(normalized);
            }
        };

        pushUnique(source);

        try {
            const parsed = new URL(source, window.location.href);
            const pathname = parsed.pathname || '';

            if (pathname.includes('/phuocthanh/PHPCHINH/')) {
                const rest = pathname.split('/phuocthanh/PHPCHINH/')[1] || '';
                if (rest) {
                    pushUnique(`/PHPCHINH/${rest}`);
                    pushUnique(`/${rest}`);
                }
            }

            if (pathname.includes('/PHPCHINH/')) {
                const rest = pathname.split('/PHPCHINH/')[1] || '';
                if (rest) {
                    pushUnique(`/${rest}`);
                }
            }

            if (pathname.includes('/anhdata/')) {
                const rest = pathname.split('/anhdata/')[1] || '';
                if (rest) {
                    pushUnique(`/anhdata/${rest}`);
                    pushUnique(`/PHPCHINH/anhdata/${rest}`);
                    pushUnique(`/phuocthanh/PHPCHINH/anhdata/${rest}`);
                }
            }

            if (/\.jpg(\?|$)/i.test(source)) {
                pushUnique(source.replace(/\.jpg(\?|$)/i, '.png$1'));
            }
            if (/\.png(\?|$)/i.test(source)) {
                pushUnique(source.replace(/\.png(\?|$)/i, '.jpg$1'));
            }
        } catch (error) {
            if (/\.jpg(\?|$)/i.test(source)) {
                pushUnique(source.replace(/\.jpg(\?|$)/i, '.png$1'));
            }
            if (/\.png(\?|$)/i.test(source)) {
                pushUnique(source.replace(/\.png(\?|$)/i, '.jpg$1'));
            }
        }

        return candidates;
    };

    window.handleShopImageFallback = (imageElement) => {
        if (!imageElement) return;

        const fallbackImage = 'https://images.unsplash.com/photo-1589924691995-400dc9ecc119?w=400&h=400&fit=crop';
        const originalSrc = String(imageElement.getAttribute('src') || '').trim();
        if (!originalSrc) {
            imageElement.src = fallbackImage;
            return;
        }

        if (!imageElement.dataset.fallbackQueueBuilt) {
            const queue = buildImageFallbackCandidates(originalSrc).filter((candidate) => candidate !== originalSrc);
            imageElement.dataset.fallbackQueue = JSON.stringify(queue);
            imageElement.dataset.fallbackQueueBuilt = '1';
            imageElement.dataset.fallbackIndex = '0';
        }

        let queue = [];
        try {
            queue = JSON.parse(imageElement.dataset.fallbackQueue || '[]');
        } catch (error) {
            queue = [];
        }

        const nextIndex = parseInt(imageElement.dataset.fallbackIndex || '0', 10);
        if (Number.isFinite(nextIndex) && nextIndex < queue.length) {
            imageElement.dataset.fallbackIndex = String(nextIndex + 1);
            imageElement.src = queue[nextIndex];
            return;
        }

        imageElement.src = fallbackImage;
    };

    const mapApiProductToUiProduct = (item) => {
        const id = parseInt(item?.id, 10) || 0;
        const name = String(item?.tensanpham || '').trim() || `Sản phẩm #${id}`;
        const category = String(item?.tendanhmuc || '').trim() || 'Chưa phân loại';
        const subcategory = detectProductSubcategory({
            category,
            name,
            code: String(item?.masanpham || '').trim(),
            subcategory: String(item?.danhmuccon || '').trim(),
        });
        const dbImageRaw = String(item?.hinhanhsanpham || '').trim();
        const priceNumber = Number(item?.giasanpham || 0);
        const price = Number.isFinite(priceNumber) && priceNumber > 0
            ? new Intl.NumberFormat('vi-VN').format(Math.round(priceNumber))
            : '0';

        const quantity = parseInt(item?.soluongsanpham, 10) || 0;
        const badge = quantity > 0 && quantity <= 10 ? 'sale' : null;

        return {
            id,
            name,
            category,
            subcategory,
            price,
            image: resolveProductImageUrl(dbImageRaw || item?.hinhanhsanpham),
            description: String(item?.masanpham || '').trim() || `Sản phẩm thuộc danh mục ${category}`,
            badge,
        };
    };

    const normalizeFallbackProductsSubcategory = () => {
        products = products.map((product) => ({
            ...product,
            subcategory: detectProductSubcategory({
                category: product.category,
                name: product.name,
                code: '',
                subcategory: product.subcategory,
            }),
        }));
    };

    const getProductsApiCandidates = () => {
        const base = window.location.href;
        const candidates = [];

        const safePush = (builder) => {
            try {
                const value = builder();
                if (value && !candidates.includes(value)) {
                    candidates.push(value);
                }
            } catch (error) {
                // bỏ qua endpoint lỗi
            }
        };

        safePush(() => new URL('home_api.php?api=get_products', base).toString());
        safePush(() => new URL('../../index.php?api=get_products', base).toString());
        safePush(() => new URL('/PHPCHINH/index.php?api=get_products', base).toString());
        safePush(() => new URL('/index.php?api=get_products', base).toString());

        const pathname = String(window.location.pathname || '');
        const markerIndexRaw = pathname.indexOf('/Giao Diện/');
        const markerIndexEncoded = pathname.indexOf('/Giao%20Diện/');
        const markerIndex = markerIndexRaw >= 0 ? markerIndexRaw : markerIndexEncoded;

        if (markerIndex > 0) {
            const projectBase = pathname.slice(0, markerIndex);
            safePush(() => `${window.location.origin}${projectBase}/index.php?api=get_products`);
        }

        return candidates;
    };

    const loadProductsFromApi = async () => {
        const candidates = getProductsApiCandidates();

        for (const endpoint of candidates) {
            try {
                const response = await fetch(endpoint, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' },
                    cache: 'no-store'
                });

                if (!response.ok) continue;

                const payload = await response.json();
                if (!payload?.ok || !Array.isArray(payload.data)) continue;

                const mappedProducts = payload.data
                    .map(mapApiProductToUiProduct)
                    .filter((item) => item.id > 0);

                if (mappedProducts.length > 0) {
                    products = mappedProducts;
                    return true;
                }
            } catch (error) {
                // thử endpoint kế tiếp
            }
        }

        return false;
    };

    const buildDogBreedSubmenu = () => {

    const buildCatBreedSubmenu = () => {
        const submenu = document.getElementById('catBreedSubmenu');
        if (!submenu) return;

        const uniqueBreeds = Array.from(
            new Set(
                catKittens
                    .map((item) => String(item.breed || '').trim())
                    .filter(Boolean)
            )
        ).sort((a, b) => a.localeCompare(b, 'vi'));

        submenu.innerHTML = uniqueBreeds
            .map((breed) => `
                <button type="button" class="shop-subcategory-btn" data-breed="${breed.replace(/"/g, '&quot;')}">
                    <span>${breed}</span>

    const clearGenericCategorySubmenus = () => {
        document.querySelectorAll('#shopCategorySidebar .shop-subcategory-list[data-generated="1"]').forEach((node) => node.remove());
        document.querySelectorAll('#shopCategorySidebar .shop-category-btn[data-has-generic-submenu="1"]').forEach((button) => {
            button.classList.remove('has-children', 'expanded');
            delete button.dataset.hasGenericSubmenu;
        });
    };

    const buildCategorySubmenuMap = () => {
        const map = new Map();

        Object.entries(DEFAULT_CATEGORY_SUBCATEGORIES).forEach(([categoryName, values]) => {
            if (!map.has(categoryName)) {
                map.set(categoryName, new Set());
            }
            values.forEach((value) => {
                if (String(value || '').trim()) {
                    map.get(categoryName).add(String(value).trim());
                }
            });
        });

        products.forEach((product) => {
            const categoryName = String(product?.category || '').trim();
            const subcategoryName = detectProductSubcategory({
                category: categoryName,
                name: String(product?.name || '').trim(),
                code: String(product?.description || '').trim(),
                subcategory: String(product?.subcategory || '').trim(),
            });

            if (!categoryName || !subcategoryName) return;
            if (!map.has(categoryName)) {
                map.set(categoryName, new Set());
            }
            map.get(categoryName).add(subcategoryName);
        });

        return map;
    };

    const buildGenericCategorySubmenus = () => {
        const sidebar = document.getElementById('shopCategorySidebar');
        if (!sidebar) return;

        clearGenericCategorySubmenus();
        const submenuMap = buildCategorySubmenuMap();

        sidebar.querySelectorAll('.shop-category-btn').forEach((button) => {
            const categoryName = String(button.dataset.category || '').trim();
            const normalizedCategory = normalizeTextKey(categoryName);
            if (!categoryName) return;
            if (normalizedCategory === 'giong cho' || normalizedCategory === 'giong meo') return;

            const values = Array.from(submenuMap.get(categoryName) || []).sort((a, b) => a.localeCompare(b, 'vi'));
            if (values.length <= 1) return;

            const submenu = document.createElement('div');
            submenu.className = 'shop-subcategory-list';
            submenu.dataset.generated = '1';
            submenu.dataset.parentCategory = categoryName;
            submenu.setAttribute('aria-label', `Danh mục con ${categoryName}`);

            submenu.innerHTML = values
                .map((sub) => {
                    const safeText = sub.replace(/"/g, '&quot;');
                    return `<button type="button" class="shop-subcategory-btn" data-category="${categoryName.replace(/"/g, '&quot;')}" data-subcategory="${safeText}"><span>${sub}</span></button>`;
                })
                .join('');

            button.insertAdjacentElement('afterend', submenu);
            button.classList.add('has-children');
            button.dataset.hasGenericSubmenu = '1';
        });
    };

    const syncCategorySidebarState = () => {

        const catSubmenuButtons = document.querySelectorAll('#catBreedSubmenu .shop-subcategory-btn');

        genericSubmenuButtons.forEach((button) => {

    const getBreedPriceLabel = (breedType, breedName) => {
        const source = breedType === 'cat' ? catKittens : dogPuppies;
        const normalizedBreed = String(breedName || '').trim().toLowerCase();

        const matched = source.filter((item) => {
            const itemBreed = String(item.breed || '').trim().toLowerCase();
            return itemBreed.includes(normalizedBreed) || normalizedBreed.includes(itemBreed);
        });

        if (matched.length === 0) {
            return 'Liên hệ';
        }

        const prices = matched
            .map((item) => parseInt(String(item.price || '').replace(/[^0-9]/g, ''), 10))
            .filter((price) => Number.isFinite(price));

        if (prices.length === 0) {
            return 'Liên hệ';
        }

        const minPrice = Math.min(...prices);
        return `Từ ${new Intl.NumberFormat('vi-VN').format(minPrice)}đ`;
    };

    const setupCustomSelectEvents = () => {
        document.querySelectorAll('.shop-custom-select').forEach((customSelect) => {
            if (customSelect.dataset.bound === '1') {
                syncCustomSelectFromNative(customSelect);
                return;
            }

            const trigger = customSelect.querySelector('.shop-custom-trigger');

            if (trigger) {
                trigger.addEventListener('click', (event) => {
                    event.stopPropagation();
                    const willOpen = !customSelect.classList.contains('open');
                    closeAllCustomSelects();
                    customSelect.classList.toggle('open', willOpen);
                    trigger.setAttribute('aria-expanded', willOpen ? 'true' : 'false');

                filteredBreeds = filteredBreeds.filter((breed) => breed.name.toLowerCase().includes(normalizedBreed));
            }

            renderCatBreedCards(filteredBreeds);
            updateActiveFilters();
            syncCategorySidebarState();
            return;
        }

        console.log('Filter values:', {
            search: searchTerm,
            category: categoryValue,
            price: priceRange,
            sort: sort
        });

        let filtered = products.filter(product => {
            // Search filter
            if (searchTerm && !product.name.toLowerCase().includes(searchTerm)) {
                return false;
            }

            // Category filter - case insensitive
            if (categoryValue) {
                const productCategoryLower = normalizeTextKey(product.category);
                if (productCategoryLower !== normalizeTextKey(categoryValue)) {
                    console.log('Filter out:', product.name, '- product category:', productCategoryLower, '!== filter:', categoryValue);
                    return false;
                }
            }

            if (currentSubcategoryFilter) {
                const productSubcategory = normalizeTextKey(
                    detectProductSubcategory({
                        category: product.category,
                        name: product.name,
                        code: product.description,
                        subcategory: product.subcategory,
                    })
                );
                if (productSubcategory !== normalizeTextKey(currentSubcategoryFilter)) {
                    return false;
                }
            }

            // Price filter
            if (priceRange) {
                const price = parseInt(product.price.replace(/[^0-9]/g, ''));
                const [min, max] = priceRange.split('-').map(p => parseInt(p) * 1000 || Infinity);
                if (price < min || price > max) return false;
            }

            return true;
        });

        // Sort
        if (sort === 'price-asc') {
            filtered.sort((a, b) => parseInt(a.price.replace(/[^0-9]/g, '')) - parseInt(b.price.replace(/[^0-9]/g, '')));
        } else if (sort === 'price-desc') {
            filtered.sort((a, b) => parseInt(b.price.replace(/[^0-9]/g, '')) - parseInt(a.price.replace(/[^0-9]/g, '')));
        } else if (sort === 'newest') {
            filtered.sort((a, b) => b.id - a.id);
        }

        console.log('Filtered result:', filtered.length, 'products');
        renderProducts(filtered);
        updateActiveFilters();
        syncCategorySidebarState();
    };

    // Update active filters display
    const updateActiveFilters = () => {
        const container = document.getElementById('activeFilters');
        const filters = [];

        const search = document.getElementById('searchInput').value;
        const category = document.getElementById('categoryFilter').value;
        const price = document.getElementById('priceFilter').value;
        const sort = document.getElementById('sortFilter').value;

        if (search) filters.push(`Tìm: "${search}"`);
        if (category) filters.push(`Danh mục: ${category}`);
        if (currentCatBreedView) filters.push(`Giống mèo: ${currentCatBreedView}`);
        if (currentDogBreedView) filters.push(`Giống chó: ${currentDogBreedView}`);
        if (currentSubcategoryFilter) filters.push(`Chi tiết: ${currentSubcategoryFilter}`);
        if (price) filters.push(`Giá: ${price}`);
        if (sort) filters.push(`Sắp xếp: ${sort}`);

        if (filters.length > 0) {
            container.style.display = 'flex';
            container.innerHTML = filters.map(f => `<span style="background: #1F8F4D; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px;">${f}</span>`).join('');
        } else {
            container.style.display = 'none';
        }
    };

    // Clear filters
    const clearFilters = () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('categoryFilter').value = '';
        document.getElementById('priceFilter').value = '';
        document.getElementById('sortFilter').value = '';
        currentDogBreedView = '';
        currentCatBreedView = '';
        keepMainSidebarOnDogBreedView = false;
        currentSubcategoryFilter = '';
        document.querySelectorAll('.shop-custom-select').forEach(syncCustomSelectFromNative);
        filterAndRenderProducts();
        syncCategorySidebarState();
    };

    const applyPendingCategoryFilter = () => {
        const pendingCategory = (localStorage.getItem(SHOP_CATEGORY_STORAGE_KEY) || '').trim();
        const categorySelect = document.getElementById('categoryFilter');

        if (!categorySelect) {
            return false;
        }

        if (!pendingCategory) {
            return false;
        }

        const matchedOption = Array.from(categorySelect.options || []).find(
            option => option.value.trim().toLowerCase() === pendingCategory.toLowerCase()
        );

        localStorage.removeItem(SHOP_CATEGORY_STORAGE_KEY);

        if (!matchedOption) {
            return false;
        }

        categorySelect.value = matchedOption.value;
        filterAndRenderProducts();
        syncCategorySidebarState();
        return true;
    };

    // Quick view
    const openQuickView = (productId) => {
        const product = products.find(p => p.id === productId);
        if (product) {
            openQuickViewWithData({
                ...product,
                price: `${product.price}₫`
            });
        }
    };

    const closeQuickView = () => {
        document.getElementById('quickViewModal').style.display = 'none';
    };

    const openCheckoutQuickModal = (item) => {
        if (!item || !item.name) return;

        currentCheckoutQuickItem = item;

        const modal = document.getElementById('checkoutQuickModal');
        const image = document.getElementById('checkoutQuickImage');
        const name = document.getElementById('checkoutQuickName');
        const price = document.getElementById('checkoutQuickPrice');
        const qty = document.getElementById('checkoutQuickQty');

        if (!modal || !image || !name || !price || !qty) return;

        image.src = item.image || '';
        name.textContent = item.name || '';
        price.textContent = `${item.price || 'Liên hệ'}${String(item.price || '').includes('₫') || String(item.price || '').includes('đ') ? '' : '₫'}`;
        qty.value = '1';

        modal.style.display = 'flex';
    };

    const closeCheckoutQuickModal = () => {
        const modal = document.getElementById('checkoutQuickModal');
        if (modal) modal.style.display = 'none';
    };

    window.closeCheckoutQuickModal = closeCheckoutQuickModal;

    const getCurrentAuthUser = () => {
        try {
            const raw = sessionStorage.getItem('authUser') || localStorage.getItem('authUser') || localStorage.getItem('userSession');
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== 'object') return null;
            return parsed;
        } catch (e) {
            return null;
        }
    };

    const requireLoginBeforePurchase = (postLoginAction = null) => {
        const authUser = getCurrentAuthUser();
        if (authUser && Number(authUser.id || 0) > 0) {
            return true;
        }

        alert('Hãy đăng nhập trước khi mua hàng.');
        if (typeof window.openAuthModal === 'function') {
            window.openAuthModal('login', {
                reason: 'Hãy đăng nhập trước khi mua hàng.',
                postLoginAction: typeof postLoginAction === 'function' ? postLoginAction : null
            });
        }
        return false;
    };

    const addToCartFromQV = () => {
        if (currentQVProduct) {
            addToCart(currentQVProduct.name, currentQVProduct.price, currentQVProduct.image);
            closeQuickView();
        }
    };

    // Add to cart
    const addToCart = (name, price, image, quantity = 1) => {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const existing = cart.find(p => p.name === name);
        const safeQuantity = Math.max(1, parseInt(quantity, 10) || 1);
        const normalizedImage = resolveProductImageUrl(image || '');

        if (existing) {
            existing.quantity += safeQuantity;
            existing.image = resolveProductImageUrl(existing.image || normalizedImage);
        } else {
            cart.push({ name, price, image: normalizedImage, quantity: safeQuantity });
        }

        localStorage.setItem('cart', JSON.stringify(cart));
        if (typeof updateCartBadge === 'function') updateCartBadge();
        alert(`Đã thêm ${safeQuantity} "${name}" vào giỏ hàng!`);
    };

    // Add to wishlist
    const toggleWishlist = (name, image, price) => {
        const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        const index = wishlist.findIndex(p => p.name === name);
        let isLiked = false;
        const normalizedImage = resolveProductImageUrl(image || '');

        if (index > -1) {
            wishlist.splice(index, 1);
            alert(`Đã xóa "${name}" khỏi yêu thích`);
        } else {
            wishlist.push({ name, image: normalizedImage, price });
            isLiked = true;
            alert(`Đã thêm "${name}" vào yêu thích!`);
        }

        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        if (typeof updateWishlistIcons === 'function') updateWishlistIcons();
        return isLiked;
    };

    // Close modal on outside click
    window.onclick = (event) => {
        const modal = document.getElementById('quickViewModal');
        const checkoutQuickModal = document.getElementById('checkoutQuickModal');
        if (event.target === modal) {
            closeQuickView();
        }
        if (event.target === checkoutQuickModal) {
            closeCheckoutQuickModal();
        }
    };

    const setupDelegatedEvents = () => {
        const toolbar = document.getElementById('shopToolbar');
        const productsGrid = document.getElementById('productsGrid');
        const clearBtn = document.getElementById('clearFiltersBtn');
        const categorySidebar = document.getElementById('shopCategorySidebar');

        if (toolbar && !toolbar.dataset.bound) {
            toolbar.addEventListener('input', (event) => {
                if (event.target.id === 'searchInput') {
                    filterAndRenderProducts();
                }
            });

            toolbar.addEventListener('change', (event) => {
                if (event.target.id === 'categoryFilter' || event.target.id === 'priceFilter' || event.target.id === 'sortFilter') {
                    if (event.target.id === 'categoryFilter') {
                        currentSubcategoryFilter = '';
                        currentDogBreedView = '';
                        currentCatBreedView = '';
                        keepMainSidebarOnDogBreedView = false;
                    }
                    filterAndRenderProducts();
                }
            });

            toolbar.dataset.bound = '1';
        }

        if (productsGrid && !productsGrid.dataset.bound) {
            productsGrid.addEventListener('click', (event) => {
                const actionButton = event.target.closest('[data-action]');
                if (!actionButton) return;

                const action = actionButton.dataset.action;

                if (action === 'breed-quick-view') {
                    const breedName = actionButton.dataset.breedName || '';
                    const breedType = actionButton.dataset.breedType === 'cat' ? 'cat' : 'dog';
                    const breedImage = actionButton.dataset.breedImage || '';
                    const breedPrice = actionButton.dataset.breedPrice || 'Liên hệ';
                    const breedDescription = actionButton.dataset.breedDescription || '';

                    openQuickViewWithData({
                        name: breedName,
                        category: breedType === 'dog' ? 'Giống chó' : 'Giống mèo',
                        image: breedImage,
                        price: breedPrice,
                        description: breedDescription || 'Thông tin chi tiết đang được cập nhật.'
                    });
                    return;
                }

                if (action === 'open-dog-detail') {
                    const puppyId = parseInt(actionButton.dataset.puppyId || '0', 10);
                    const selectedPuppy = dogPuppies.find(p => p.id === puppyId);
                    if (selectedPuppy) {
                        openQuickViewWithData({
                            name: selectedPuppy.name,
                            category: 'Giống chó',
                            image: selectedPuppy.image,
                            price: `${selectedPuppy.price} ₫`,
                            description: `Giống ${selectedPuppy.breed}. Thông tin chi tiết đang được cập nhật.`
                        });
                    }
                    return;
                }

                if (action === 'back-dog-list') {
                    closeQuickView();
                    return;
                }

                if (action === 'select-thumb') {
                    const selectedSrc = actionButton.dataset.src || '';
                    const detailPage = actionButton.closest('.poodle-detail-page');
                    const mainImage = detailPage?.querySelector('.poodle-main-image');
                    if (mainImage && selectedSrc) {
                        mainImage.src = selectedSrc;
                    }

                    const thumbs = detailPage?.querySelectorAll('.poodle-thumb') || [];
                    thumbs.forEach((thumb) => thumb.classList.remove('active'));
                    actionButton.classList.add('active');
                    return;
                }

                if (action === 'qty-decrease' || action === 'qty-increase') {
                    const detailContent = actionButton.closest('.poodle-detail-content');
                    const qtyInput = detailContent?.querySelector('.poodle-qty-input');
                    if (!qtyInput) return;

                    const current = Math.max(1, parseInt(qtyInput.value, 10) || 1);
                    qtyInput.value = action === 'qty-decrease' ? Math.max(1, current - 1) : current + 1;
                    return;
                }

                if (action === 'add-cart-detail') {
                    const detailContent = actionButton.closest('.poodle-detail-content');
                    const qtyInput = detailContent?.querySelector('.poodle-qty-input');
                    const quantity = qtyInput ? parseInt(qtyInput.value, 10) || 1 : 1;

                    addToCart(
                        actionButton.dataset.name || '',
                        actionButton.dataset.price || '',
                        actionButton.dataset.image || '',
                        quantity
                    );
                    return;
                }

                if (action === 'quick-view') {
                    const productId = parseInt(actionButton.dataset.productId || '0', 10);
                    if (productId) openQuickView(productId);
                    return;
                }

                if (action === 'add-cart') {
                    addToCart(
                        actionButton.dataset.name || '',
                        actionButton.dataset.price || '',
                        actionButton.dataset.image || '',
                        1
                    );
                    return;
                }

                if (action === 'buy-now') {
                    const item = {
                        name: actionButton.dataset.name || '',
                        price: actionButton.dataset.price || '',
                        image: actionButton.dataset.image || ''
                    };

                    const allowOpen = requireLoginBeforePurchase(() => openCheckoutQuickModal(item));
                    if (!allowOpen) {
                        return;
                    }

                    openCheckoutQuickModal({
                        name: item.name,
                        price: item.price,
                        image: item.image
                    });
                    return;
                }

                if (action === 'toggle-wishlist') {
                    const isLiked = toggleWishlist(actionButton.dataset.name || '', actionButton.dataset.image || '', actionButton.dataset.price || '');
                    actionButton.classList.toggle('liked', isLiked);
                }
            });

            productsGrid.dataset.bound = '1';
        }

        const checkoutQuickForm = document.getElementById('checkoutQuickForm');
        if (checkoutQuickForm && !checkoutQuickForm.dataset.bound) {
            checkoutQuickForm.addEventListener('submit', (event) => {
                event.preventDefault();

                if (!currentCheckoutQuickItem) return;

                if (!requireLoginBeforePurchase()) {
                    return;
                }

                const quantity = Math.max(1, parseInt(document.getElementById('checkoutQuickQty')?.value || '1', 10));

                addToCart(currentCheckoutQuickItem.name, currentCheckoutQuickItem.price, currentCheckoutQuickItem.image, quantity);

                closeCheckoutQuickModal();

                if (typeof window.routeToPage === 'function') {
                    window.routeToPage('checkout');
                } else if (typeof window.loadPage === 'function') {
                    window.loadPage('checkout');
                } else {
                    window.location.href = './thanh-toan.html';
                }
            });

            checkoutQuickForm.dataset.bound = '1';
        }

        if (clearBtn && !clearBtn.dataset.bound) {
            clearBtn.addEventListener('click', clearFilters);
            clearBtn.dataset.bound = '1';
        }

        if (categorySidebar && !categorySidebar.dataset.bound) {
            categorySidebar.addEventListener('mouseover', (event) => {
                const categoryBtn = event.target.closest('.shop-category-btn');
                if (!categoryBtn) return;
                openCategorySubmenu(categoryBtn);
            });

            categorySidebar.addEventListener('mouseleave', () => {
                closeAllCategorySubmenus();
            });

            categorySidebar.addEventListener('click', (event) => {
                const genericSubBtn = event.target.closest('.shop-subcategory-list[data-generated="1"] .shop-subcategory-btn');
                if (genericSubBtn) {
                    const categorySelect = document.getElementById('categoryFilter');
                    if (!categorySelect) return;

                    const parentCategory = String(genericSubBtn.dataset.category || '').trim();
                    const selectedSubcategory = String(genericSubBtn.dataset.subcategory || '').trim();
                    if (!parentCategory || !selectedSubcategory) return;

                    categorySelect.value = parentCategory;
                    currentSubcategoryFilter = selectedSubcategory;
                    currentDogBreedView = '';
                    keepMainSidebarOnDogBreedView = false;

                    filterAndRenderProducts();
                    syncCategorySidebarState();
                    return;
                }

                const breedBtn = event.target.closest('.shop-subcategory-btn');
                if (breedBtn && breedBtn.closest('#dogBreedSubmenu')) {
                    const categorySelect = document.getElementById('categoryFilter');
                    if (!categorySelect) return;

                    categorySelect.value = 'Giống chó';
                    currentDogBreedView = String(breedBtn.dataset.breed || '').trim();
                    currentCatBreedView = '';
                    keepMainSidebarOnDogBreedView = false;
                    currentSubcategoryFilter = '';
                    filterAndRenderProducts();
                    syncCategorySidebarState();
                    return;
                }

                if (breedBtn && breedBtn.closest('#catBreedSubmenu')) {
                    const categorySelect = document.getElementById('categoryFilter');
                    if (!categorySelect) return;

                    categorySelect.value = 'Giống mèo';
                    currentCatBreedView = String(breedBtn.dataset.breed || '').trim();
                    currentDogBreedView = '';
                    keepMainSidebarOnDogBreedView = false;
                    currentSubcategoryFilter = '';
                    filterAndRenderProducts();
                    syncCategorySidebarState();
                    return;
                }

                const categoryBtn = event.target.closest('.shop-category-btn');
                if (!categoryBtn) return;

                const categorySelect = document.getElementById('categoryFilter');
                if (!categorySelect) return;

                if (String(categoryBtn.dataset.category || '').trim().toLowerCase() !== 'giống chó') {
                    currentDogBreedView = '';
                    keepMainSidebarOnDogBreedView = false;
                } else {
                    currentDogBreedView = '';
                    keepMainSidebarOnDogBreedView = false;
                }

                if (String(categoryBtn.dataset.category || '').trim().toLowerCase() !== 'giống mèo') {
                    currentCatBreedView = '';
                } else {
                    currentCatBreedView = '';
                }

                currentSubcategoryFilter = '';
                categorySelect.value = categoryBtn.dataset.category || '';
                filterAndRenderProducts();
                syncCategorySidebarState();
            });

            categorySidebar.dataset.bound = '1';
        }
    };

    // Initialize - render products on page load
    const initShopPage = async () => {
        console.log('Shop page initialized');
        normalizeFallbackProductsSubcategory();
        buildDogBreedSubmenu();
        buildCatBreedSubmenu();
        setupDelegatedEvents();
        setupCustomSelectEvents();

        await loadProductsFromApi();
        buildGenericCategorySubmenus();

        const hasPendingCategory = applyPendingCategoryFilter();
        if (!hasPendingCategory) {
            renderProducts(products);
            updateShopHeroByCategory();
        }

        syncCategorySidebarState();
        document.querySelectorAll('.shop-custom-select').forEach(syncCustomSelectFromNative);

        if (typeof feather !== 'undefined') feather.replace();
    };

    // Run only when DOM is fully ready (works for direct open and dynamic inject)
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initShopPage, { once: true });
    } else {
        setTimeout(initShopPage, 0);
    }
</script>
