﻿<script>
(function () {
    const styles = [
        { key: "fonts.googleapis.com/css2?family=Be+Vietnam+Pro", href: "https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" },
        { key: "bootstrap.min.css", href: "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" },
        { key: "giao-dien-nguoi-dung.css", href: "../giao-dien-nguoi-dung.css" }
    ];

    styles.forEach((style) => {
        if (!document.querySelector(`link[href*="${style.key}"]`)) {
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = style.href;
            document.head.appendChild(link);
        }
    });

    const renderIcons = () => {
        if (typeof window.feather !== "undefined") {
            window.feather.replace();
        }
    };

    if (typeof window.feather !== "undefined") {
        renderIcons();
    } else if (!document.querySelector('script[src*="feather-icons"]')) {
        const script = document.createElement("script");
        script.src = "https://unpkg.com/feather-icons";
        script.defer = true;
        script.onload = renderIcons;
        document.head.appendChild(script);
    }
})();
</script>

<script>
(function () {
    let validCategories = [];
    const categoryLabelMap = { all: 'Tất cả dịch vụ' };
    const SERVICE_RT_EVENT_KEY = 'app_services_realtime_event';
    const UNCATEGORIZED_CATEGORY_KEY = 'category-uncategorized';
    let servicesRealtimeTimer = null;
    let stopServiceRealtimeSubscribe = null;
    let lastServiceDataSignature = '';
    let isRefreshingServices = false;
    const SERVICE_WISHLIST_KEY = 'wishlistServices';

    const getServiceWishlist = () => {
        try {
            const parsed = JSON.parse(localStorage.getItem(SERVICE_WISHLIST_KEY) || '[]');
            return Array.isArray(parsed) ? parsed : [];
        } catch (_) {
            return [];
        }
    };

    const setServiceWishlist = (items) => {
        localStorage.setItem(SERVICE_WISHLIST_KEY, JSON.stringify(Array.isArray(items) ? items : []));
    };

    const isServiceFavorite = (serviceName) => {
        const name = String(serviceName || '').trim();
        if (name === '') return false;
        return getServiceWishlist().some((item) => String(item?.name || '').trim() === name);
    };

    const toggleServiceFavorite = (serviceName, serviceImage, servicePrice, button) => {
        const name = String(serviceName || '').trim();
        if (name === '') return;

        const refreshFavoriteBadge = () => {
            if (typeof updateWishlistIcons === 'function') {
                updateWishlistIcons();
                return;
            }
            if (typeof window.updateWishlistIcons === 'function') {
                window.updateWishlistIcons();
            }
        };

        const favorites = getServiceWishlist();
        const index = favorites.findIndex((item) => String(item?.name || '').trim() === name);

        if (index >= 0) {
            favorites.splice(index, 1);
            setServiceWishlist(favorites);
            if (button) button.classList.remove('liked');
            refreshFavoriteBadge();
            alert('Đã xóa "' + name + '" khỏi danh sách yêu thích!');
            return;
        }

        const serviceItem = {
            type: 'service',
            name,
            image: String(serviceImage || '').trim(),
            price: String(servicePrice || 'Liên hệ').trim() || 'Liên hệ',
        };
        favorites.push(serviceItem);
        setServiceWishlist(favorites);
        if (button) button.classList.add('liked');
        refreshFavoriteBadge();
        alert('Đã thêm "' + name + '" vào danh sách yêu thích!');
    };

    const normalizeCategory = (category) => {
        if (!category || typeof category !== "string") return "all";
        if (category === 'all') return 'all';
        return validCategories.includes(category) ? category : "all";
    };

    const buildCategoryKey = (id) => `category-${Number(id || 0)}`;

    const rebuildDynamicCategoryLayout = (categoryRows, hasUncategorized = false) => {
        const page = document.querySelector('.unified-services-page');
        const filterWrap = page?.querySelector('.service-filter-wrap');
        const container = document.getElementById('serviceCategoryContainer');
        if (!page || !filterWrap || !container) return;

        const normalizedCategories = Array.isArray(categoryRows)
            ? categoryRows.map((row) => ({
                id: Number(row.id || 0),
                key: buildCategoryKey(row.id || 0),
                label: String(row.tendanhmucdichvu || '').trim(),
            })).filter((row) => row.id > 0 && row.label !== '')
            : [];

        if (hasUncategorized) {
            normalizedCategories.push({
                id: 0,
                key: UNCATEGORIZED_CATEGORY_KEY,
                label: 'Chưa phân loại'
            });
        }

        validCategories = normalizedCategories.map((row) => row.key);

        Object.keys(categoryLabelMap).forEach((key) => {
            if (key !== 'all') delete categoryLabelMap[key];
        });
        normalizedCategories.forEach((row) => {
            categoryLabelMap[row.key] = row.label;
        });

        filterWrap.innerHTML = [
            '<button type="button" class="service-filter-btn" data-category="all">Tất cả dịch vụ</button>',
            ...normalizedCategories.map((row) => `<button type="button" class="service-filter-btn" data-category="${row.key}">${row.label}</button>`)
        ].join('');

        container.innerHTML = normalizedCategories.map((row) => `
            <section class="service-category-block" data-category="${row.key}">
                <div class="row mb-4"><div class="col-12"><h2 class="fw-bold mb-2">${row.label}</h2><p class="text-muted mb-0">${row.key === UNCATEGORIZED_CATEGORY_KEY ? 'Danh sách dịch vụ chưa gán danh mục.' : 'Danh sách dịch vụ thuộc danh mục này.'}</p></div></div>
                <div class="row g-4 mb-4"></div>
            </section>
        `).join('');
    };

    const normalizeServiceName = (name) => {
        return String(name || '').replace(/^\s*\[[^\]]+\]\s*/u, '').trim();
    };

    const formatCurrencyVND = (value) => {
        const amount = Number(value || 0);
        if (!Number.isFinite(amount) || amount <= 0) return 'Liên hệ';
        return `${new Intl.NumberFormat('vi-VN').format(Math.round(amount))}₫`;
    };

    const resolveMediaUrl = (rawPath) => {
        const path = String(rawPath || '').trim().replace(/\\/g, '/');
        if (!path) return '';
        if (/^(?:https?:)?\/\//i.test(path) || path.startsWith('data:')) return path;

        let normalized = path;
        const anhdataIndex = normalized.toLowerCase().indexOf('anhdata/');
        if (anhdataIndex >= 0) {
            normalized = normalized.slice(anhdataIndex);
        }

        normalized = normalized.replace(/^\/+/, '');
        normalized = normalized.replace(/^phuocthanh\/phpchinh\//i, '');
        normalized = normalized.replace(/^phpchinh\//i, '');

        if (path.startsWith('/')) {
            return path.replace(/ /g, '%20');
        }

        const pathname = decodeURIComponent(window.location.pathname || '');
        const marker = '/Giao Diện/';
        const markerIndex = pathname.indexOf(marker);
        const projectBase = markerIndex > 0 ? pathname.slice(0, markerIndex) : '/phuocthanh/PHPCHINH';

        normalized = normalized.replace(/^\.\//, '');
        normalized = normalized.replace(/^Giao Diện\//i, '');
        normalized = normalized.replace(/^user\//i, '');

        if (/^anhdata\//i.test(normalized)) {
            return `${projectBase}/${normalized}`.replace(/ /g, '%20');
        }

        return `${projectBase}/${normalized}`.replace(/ /g, '%20');
    };

    const toSafeCssUrl = (value) => String(value || '').replace(/'/g, "\\'");
    const toSafeText = (value) => String(value || '').trim();
    const escapeHtml = (value) => String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    const extractSummaryFromInfo = (info, fallbackText) => {
        const fallback = toSafeText(fallbackText) || 'Dịch vụ chăm sóc thú cưng với quy trình an toàn và chuyên nghiệp.';
        const raw = toSafeText(info);
        if (!raw) return fallback;

        const normalized = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        const beforeProcess = normalized.split(/\n\s*\n\s*quy trình chi tiết\s*:/i)[0] || normalized;
        const withoutPrefix = beforeProcess
            .replace(/^mô tả cơ bản\s*:\s*/i, '')
            .replace(/^mo ta co ban\s*:\s*/i, '')
            .trim();

        const compact = withoutPrefix.replace(/\s+/g, ' ').trim();
        if (!compact) return fallback;

        return compact.length > 160 ? `${compact.slice(0, 157)}...` : compact;
    };

    const setServiceFilterButtonLabels = () => {
        document.querySelectorAll('.service-filter-btn').forEach((button) => {
            const category = button.getAttribute('data-category') || '';
            const label = categoryLabelMap[category] || button.textContent.trim();
            button.textContent = label;
        });
    };

    const buildServiceDataSignature = (rows, categories) => {
        const normalizedCategories = Array.isArray(categories)
            ? categories.map((row) => [Number(row?.id || 0), String(row?.tendanhmucdichvu || '').trim()])
            : [];

        const normalizedRows = Array.isArray(rows)
            ? rows.map((row) => [
                Number(row?.id || 0),
                Number(row?.danhmucdichvu_id || 0),
                String(row?.tendichvu || '').trim(),
                String(row?.trangthaidichvu || '').trim().toLowerCase(),
                Number(row?.giadichvu || 0),
                Number(row?.thoigiandichvu || 0),
                String(row?.thongtin || '').trim(),
                String(row?.hinhanh || row?.hinhanhdichvu || '').trim(),
            ])
            : [];

        return JSON.stringify({ c: normalizedCategories, s: normalizedRows });
    };

    const refreshServicesFromDatabase = async (force = false) => {
        if (isRefreshingServices && !force) return;
        isRefreshingServices = true;

        try {
            const payload = await fetchServiceData();
            const rows = Array.isArray(payload?.data) ? payload.data : [];
            const categories = Array.isArray(payload?.categories) ? payload.categories : [];
            const emptyState = document.getElementById('serviceEmptyState');

            const activeRows = rows.filter((row) => {
                const status = String(row?.trangthaidichvu || '').trim().toLowerCase();
                return status === '' || status === 'hoatdong';
            });

            const validCategoryIdSet = new Set(
                categories
                    .map((row) => Number(row?.id || 0))
                    .filter((id) => id > 0)
            );

            const hasUncategorized = activeRows.some((row) => {
                const dynamicCategoryId = Number(row?.danhmucdichvu_id || 0);
                return dynamicCategoryId <= 0 || !validCategoryIdSet.has(dynamicCategoryId);
            });

            const nextSignature = buildServiceDataSignature(rows, categories);
            if (!force && nextSignature === lastServiceDataSignature) {
                return;
            }
            lastServiceDataSignature = nextSignature;

            rebuildDynamicCategoryLayout(categories, hasUncategorized);
            setServiceFilterButtonLabels();

            if (!Array.isArray(rows) || rows.length === 0) {
                if (emptyState) emptyState.hidden = false;
                applyCategory('all');
                return;
            }

            if (activeRows.length === 0) {
                if (emptyState) emptyState.hidden = false;
                applyCategory('all');
                return;
            }

            const servicesByCategory = {};
            validCategories.forEach((key) => {
                servicesByCategory[key] = [];
            });

            activeRows.forEach((row) => {
                const dynamicCategoryId = Number(row?.danhmucdichvu_id || 0);
                const categoryKey = dynamicCategoryId > 0 ? buildCategoryKey(dynamicCategoryId) : '';
                const key = servicesByCategory[categoryKey]
                    ? categoryKey
                    : (servicesByCategory[UNCATEGORIZED_CATEGORY_KEY] ? UNCATEGORIZED_CATEGORY_KEY : '');
                if (!key) return;

                const normalized = {
                    ...row,
                    tendichvu: normalizeServiceName(row?.tendichvu || ''),
                    hinhanh: String(row?.hinhanh || row?.hinhanhdichvu || '').trim()
                };
                servicesByCategory[key].push(normalized);
            });

            const totalMapped = Object.values(servicesByCategory).reduce((sum, bucket) => sum + bucket.length, 0);
            if (totalMapped === 0) {
                if (emptyState) emptyState.hidden = false;
                bindServicesToCards(servicesByCategory);
                applyCategory('all');
                return;
            }

            bindServicesToCards(servicesByCategory);
            if (emptyState) emptyState.hidden = true;

            const selectedCategory = normalizeCategory(window.currentServiceCategory);
            if (selectedCategory !== 'all' && (servicesByCategory[selectedCategory] || []).length === 0) {
                applyCategory('all');
            } else {
                applyCategory(selectedCategory);
            }
        } finally {
            isRefreshingServices = false;
        }
    };

    const startServicesRealtime = () => {
        const sessionApi = window.AppSessionRealtime || (window.parent && window.parent.AppSessionRealtime);
        if (sessionApi && typeof sessionApi.subscribe === 'function') {
            stopServiceRealtimeSubscribe = sessionApi.subscribe((event) => {
                if (!event || !event.type) return;
                if (event.type === 'services_changed' || event.type === 'entity_changed') {
                    refreshServicesFromDatabase(true);
                }
            });
        }

        window.addEventListener('storage', (event) => {
            if (event.key === SERVICE_RT_EVENT_KEY && event.newValue) {
                refreshServicesFromDatabase(true);
            }
        });

        if (servicesRealtimeTimer) {
            window.clearInterval(servicesRealtimeTimer);
        }

        servicesRealtimeTimer = window.setInterval(() => {
            refreshServicesFromDatabase(false);
        }, 8000);
    };

    const stopServicesRealtime = () => {
        if (typeof stopServiceRealtimeSubscribe === 'function') {
            stopServiceRealtimeSubscribe();
            stopServiceRealtimeSubscribe = null;
        }
        if (servicesRealtimeTimer) {
            window.clearInterval(servicesRealtimeTimer);
            servicesRealtimeTimer = null;
        }
    };

    const bindServicesToCards = (servicesByCategory) => {
        validCategories.forEach((category) => {
            const section = document.querySelector(`.service-category-block[data-category="${category}"]`);
            const cardGrid = section?.querySelector('.row.g-4.mb-4');
            if (!cardGrid) return;

            const bucket = servicesByCategory[category] || [];
            if (bucket.length === 0) {
                cardGrid.innerHTML = '<div class="service-card-empty">Chưa có dịch vụ trong danh mục này.</div>';
                return;
            }

            cardGrid.innerHTML = bucket.map((service) => {
                const serviceName = normalizeServiceName(service.tendichvu);
                const servicePrice = formatCurrencyVND(service.giadichvu);
                const dbInfo = toSafeText(service.thongtin);
                const summary = extractSummaryFromInfo(dbInfo, '');
                const serviceCategory = toSafeText(service?.tendanhmucdichvu || categoryLabelMap[category] || 'Chưa phân loại');
                const bookingCount = Number(service?.soluotdatdichvu || 0);
                const bookingText = `${new Intl.NumberFormat('vi-VN').format(Math.max(0, Math.round(bookingCount)))} lượt đặt`;
                const duration = Number(service.thoigiandichvu || 0) > 0
                    ? `${Math.round(Number(service.thoigiandichvu || 0))} phút`
                    : 'Chưa cập nhật thời lượng';
                const imageUrl = resolveMediaUrl(service.hinhanh);
                const iconClass = imageUrl ? 'service-icon-bg has-photo' : 'service-icon-bg';
                const iconStyle = imageUrl ? ` style="background-image:url('${toSafeCssUrl(imageUrl)}')"` : '';
                const likedClass = isServiceFavorite(serviceName) ? 'liked' : '';

                return `
                    <div class="col-lg-4 col-md-6">
                        <div
                            class="card service-card h-100 shadow-sm"
                            data-service-name="${escapeHtml(serviceName)}"
                            data-service-price="${escapeHtml(servicePrice)}"
                            data-service-duration="${escapeHtml(duration)}"
                            data-service-category="${escapeHtml(serviceCategory)}"
                            data-service-bookings="${escapeHtml(bookingText)}"
                            data-service-info="${escapeHtml(dbInfo || summary || 'Thông tin chi tiết dịch vụ sẽ được cập nhật sớm.')}"
                            data-service-image="${escapeHtml(String(imageUrl || ''))}"
                        >
                            <button type="button" class="service-favorite-btn service-wishlist-btn ${likedClass}" data-service-name="${escapeHtml(serviceName)}" data-service-image="${escapeHtml(String(imageUrl || ''))}" data-service-price="${escapeHtml(servicePrice)}" aria-label="Thêm dịch vụ vào yêu thích">
                                <i data-feather="heart"></i>
                            </button>
                            <div class="${iconClass}"${iconStyle}><i data-feather="star"></i></div>
                            <div class="card-body p-4">
                                <h5 class="card-title fw-bold mb-3">${escapeHtml(serviceName)}</h5>
                                <p class="text-muted mb-3">${escapeHtml(summary)}</p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="service-price">${escapeHtml(servicePrice)}</span>
                                    <button class="btn btn-sm service-booking-btn" data-service-name="${escapeHtml(serviceName)}" data-service-price="${escapeHtml(servicePrice)}">Đặt ngay</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        });

        if (typeof window.feather !== 'undefined') {
            window.feather.replace();
        }
    };

    const getServiceApiCandidates = () => {
        const list = [];

        const pathname = decodeURIComponent(window.location.pathname || '');
        const marker = '/Giao Diện/';
        const markerIndex = pathname.indexOf(marker);
        const projectBase = markerIndex > 0 ? pathname.slice(0, markerIndex) : '';

        if (projectBase) {
            list.push(`${projectBase}/index.php?api=get_services`);
        }

        list.push('../../index.php?api=get_services');
        list.push('../../admin/get_services.php?api=get_services');
        list.push('../../staff/get_services.php?api=get_services');
        list.push('/PHPCHINH/index.php?api=get_services');
        list.push('/phuocthanh/PHPCHINH/index.php?api=get_services');
        list.push('/index.php?api=get_services');

        try {
            list.push(new URL('../../index.php?api=get_services', window.location.href).toString());
            list.push(new URL('../../admin/get_services.php?api=get_services', window.location.href).toString());
            list.push(new URL('../../staff/get_services.php?api=get_services', window.location.href).toString());
        } catch (err) {}

        return Array.from(new Set(list));
    };

    const fetchServiceData = async () => {
        const candidates = getServiceApiCandidates();

        for (const url of candidates) {
            try {
                const res = await fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } });
                if (!res.ok) continue;
                const payload = await res.json();
                if (!payload || payload.ok !== true || !Array.isArray(payload.data)) continue;
                return payload;
            } catch (error) {}
        }

        return { ok: false, data: [], categories: [] };
    };

    const applyCategory = (category) => {
        const current = normalizeCategory(category);

        document.querySelectorAll(".service-category-block").forEach((section) => {
            if (current === 'all') {
                section.style.display = "block";
            } else {
                section.style.display = section.getAttribute("data-category") === current ? "block" : "none";
            }
        });

        document.querySelectorAll(".service-filter-btn").forEach((button) => {
            button.classList.toggle("active", button.getAttribute("data-category") === current);
        });

        window.currentServiceCategory = current;
    };

    document.querySelector('.service-filter-wrap')?.addEventListener('click', (event) => {
        const button = event.target.closest('.service-filter-btn[data-category]');
        if (!button) return;
        applyCategory(button.getAttribute('data-category'));
    });

    const serviceDetailModal = document.getElementById('serviceDetailModal');
    const serviceDetailTitle = document.getElementById('serviceDetailTitle');
    const serviceDetailPrice = document.getElementById('serviceDetailPrice');
    const serviceDetailCategory = document.getElementById('serviceDetailCategory');
    const serviceDetailBookings = document.getElementById('serviceDetailBookings');
    const serviceDetailDuration = document.getElementById('serviceDetailDuration');
    const serviceDetailInfo = document.getElementById('serviceDetailInfo');
    const serviceDetailImage = document.getElementById('serviceDetailImage');
    const serviceDetailBookBtn = document.getElementById('serviceDetailBookBtn');
    let activeServiceDetail = { name: 'Dịch vụ thú cưng', price: 'Liên hệ', category: 'Chưa phân loại', duration: 'Chưa cập nhật thời lượng' };
    let lastBodyOverflow = '';
    let serviceDetailScrollLocked = false;

    const buildServiceSharePayload = () => {
        const name = String(activeServiceDetail?.name || 'Dịch vụ thú cưng').trim() || 'Dịch vụ thú cưng';
        const price = String(activeServiceDetail?.price || 'Liên hệ').trim() || 'Liên hệ';
        const category = String(activeServiceDetail?.category || 'Chưa phân loại').trim() || 'Chưa phân loại';
        const duration = String(activeServiceDetail?.duration || 'Chưa cập nhật').trim() || 'Chưa cập nhật';
        const pageUrl = new URL(window.location.href);
        pageUrl.searchParams.set('share_service', name);
        const url = pageUrl.toString();
        const title = `${name} - 3 Chú Cún Con`;
        const text = `${name} | Giá: ${price} | Danh mục: ${category} | Thời gian: ${duration}`;
        return { url, title, text };
    };

    const isLocalShareUrl = (url) => {
        try {
            const parsed = new URL(String(url || ''));
            const host = String(parsed.hostname || '').toLowerCase();
            return host === 'localhost' || host === '127.0.0.1' || host.endsWith('.local');
        } catch (error) {
            return false;
        }
    };

    const openSharePopup = (url) => {
        if (!url) return;
        window.open(url, '_blank', 'noopener,noreferrer,width=720,height=680');
    };

    const tryOpenNativeScheme = (schemeUrl, fallbackUrl) => {
        try {
            window.location.href = schemeUrl;
            window.setTimeout(() => {
                if (fallbackUrl) {
                    openSharePopup(fallbackUrl);
                }
            }, 520);
        } catch (error) {
            if (fallbackUrl) {
                openSharePopup(fallbackUrl);
            }
        }
    };

    const shareServiceDetail = async (platform) => {
        const payload = buildServiceSharePayload();
        const encodedUrl = encodeURIComponent(payload.url);
        const encodedText = encodeURIComponent(payload.text);

        if (platform === 'native') {
            if (navigator.share) {
                try {
                    await navigator.share({ title: payload.title, text: payload.text, url: payload.url });
                    return;
                } catch (error) {
                    // user cancelled share sheet
                }
            }
            await shareServiceDetail('copy');
            return;
        }

        if (platform === 'facebook') {
            openSharePopup(`https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}&quote=${encodedText}`);
            if (isLocalShareUrl(payload.url)) {
                alert('Link localhost không tạo được thẻ xem trước dịch vụ trên Facebook. Hãy dùng domain public để hiển thị ảnh/mô tả tự động.');
            }
            return;
        }

        if (platform === 'messenger') {
            const messengerUrl = `fb-messenger://share/?link=${encodedUrl}`;
            const fallbackUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}&quote=${encodedText}`;
            tryOpenNativeScheme(messengerUrl, fallbackUrl);
            return;
        }

        if (platform === 'zalo') {
            const zaloScheme = `zalo://share?url=${encodedUrl}`;
            const fallbackUrl = `https://zalo.me/share?url=${encodedUrl}`;
            tryOpenNativeScheme(zaloScheme, fallbackUrl);
            if (isLocalShareUrl(payload.url)) {
                alert('Zalo không thể xem trước đầy đủ với link localhost. Bạn cần domain public để chia sẻ có ảnh/mô tả tự động.');
            }
            return;
        }

        if (platform === 'copy') {
            try {
                await navigator.clipboard.writeText(payload.url);
                alert('Đã sao chép liên kết dịch vụ.');
            } catch (error) {
                window.prompt('Sao chép liên kết bên dưới:', payload.url);
            }
            return;
        }

        if (navigator.share) {
            try {
                await navigator.share({ title: payload.title, text: payload.text, url: payload.url });
            } catch (error) {
                // user cancelled share sheet
            }
        }
    };

    const lockServicesPageBackground = () => {
        if (serviceDetailScrollLocked) return;
        if (typeof window.__lockBackgroundScroll === 'function') {
            window.__lockBackgroundScroll();
            serviceDetailScrollLocked = true;
            return;
        }

        lastBodyOverflow = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        document.body.classList.add('app-popup-open');
        serviceDetailScrollLocked = true;
    };

    const unlockServicesPageBackground = () => {
        if (!serviceDetailScrollLocked) return;
        if (typeof window.__unlockBackgroundScroll === 'function') {
            window.__unlockBackgroundScroll();
            serviceDetailScrollLocked = false;
            return;
        }

        document.body.style.overflow = lastBodyOverflow;
        document.body.classList.remove('app-popup-open');
        serviceDetailScrollLocked = false;
    };

    const closeServiceDetailModal = () => {
        if (!serviceDetailModal) return;
        serviceDetailModal.classList.remove('open');
        serviceDetailModal.setAttribute('aria-hidden', 'true');
        unlockServicesPageBackground();
        if (typeof window.__syncBackgroundScrollAfterPopupClose === 'function') {
            window.__syncBackgroundScrollAfterPopupClose();
        }
    };

    const openServiceDetailModal = (serviceCard) => {
        if (!serviceDetailModal || !serviceCard) return;

        const serviceName = toSafeText(serviceCard.dataset.serviceName) || 'Chi tiết dịch vụ';
        const servicePrice = toSafeText(serviceCard.dataset.servicePrice) || 'Liên hệ';
        const serviceDuration = toSafeText(serviceCard.dataset.serviceDuration) || 'Chưa cập nhật thời lượng';
        const serviceInfoText = toSafeText(serviceCard.dataset.serviceInfo) || 'Thông tin chi tiết dịch vụ sẽ được cập nhật sớm.';
        const serviceCategory = toSafeText(serviceCard.dataset.serviceCategory) || 'Chưa phân loại';
        const serviceBookings = toSafeText(serviceCard.dataset.serviceBookings) || '0 lượt đặt';

        serviceDetailTitle.textContent = serviceName;
        serviceDetailPrice.textContent = servicePrice;
        serviceDetailDuration.textContent = serviceDuration;
        serviceDetailInfo.textContent = serviceInfoText;
        if (serviceDetailCategory) serviceDetailCategory.textContent = serviceCategory;
        if (serviceDetailBookings) serviceDetailBookings.textContent = serviceBookings;
        activeServiceDetail = { name: serviceName, price: servicePrice, category: serviceCategory, duration: serviceDuration };

        const imageUrl = toSafeText(serviceCard.dataset.serviceImage);
        serviceDetailImage.style.backgroundImage = imageUrl
            ? `url('${toSafeCssUrl(imageUrl)}')`
            : 'linear-gradient(135deg, #1F8F4D 0%, #6FCF5F 100%)';

        if (serviceDetailModal.parentElement !== document.body) {
            document.body.appendChild(serviceDetailModal);
        }

        serviceDetailModal.classList.add('open');
        serviceDetailModal.setAttribute('aria-hidden', 'false');
        lockServicesPageBackground();
    };

    document.addEventListener('click', (event) => {
        const serviceFavoriteBtn = event.target.closest('.service-wishlist-btn');
        if (serviceFavoriteBtn) {
            event.preventDefault();
            event.stopPropagation();
            toggleServiceFavorite(
                serviceFavoriteBtn.dataset.serviceName,
                serviceFavoriteBtn.dataset.serviceImage,
                serviceFavoriteBtn.dataset.servicePrice,
                serviceFavoriteBtn
            );
            return;
        }

        const closeTarget = event.target.closest('[data-modal-close="true"]');
        if (closeTarget) {
            closeServiceDetailModal();
            return;
        }

        const serviceCard = event.target.closest('.service-card');
        if (!serviceCard) return;
        if (event.target.closest('.service-booking-btn')) return;
        if (event.target.closest('.service-wishlist-btn')) return;

        openServiceDetailModal(serviceCard);
    });

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && serviceDetailModal?.classList.contains('open')) {
            closeServiceDetailModal();
        }
    });

    serviceDetailBookBtn?.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();

        closeServiceDetailModal();
        const serviceName = String(activeServiceDetail?.name || 'Dịch vụ thú cưng').trim() || 'Dịch vụ thú cưng';
        const servicePrice = String(activeServiceDetail?.price || 'Liên hệ').trim() || 'Liên hệ';

        localStorage.setItem('selectedServiceBooking', JSON.stringify({
            service: serviceName,
            price: servicePrice,
            source: 'services_detail_modal',
            timestamp: Date.now()
        }));

        if (typeof window.openDatLichPopup === 'function') {
            window.openDatLichPopup({ service: serviceName, price: servicePrice, source: 'services_detail_modal' });
            return;
        }

        if (typeof window.openServiceBookingPopup === 'function') {
            window.openServiceBookingPopup({ service: serviceName, price: servicePrice });
        }
    });

    document.getElementById('serviceDetailShareActions')?.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-service-share]');
        if (!button) return;
        event.preventDefault();
        event.stopPropagation();
        await shareServiceDetail(String(button.dataset.serviceShare || '').toLowerCase());
    });

    document.addEventListener('click', (event) => {
        const bookingBtn = event.target.closest('.service-booking-btn');
        if (!bookingBtn) return;

        event.preventDefault();
        event.stopPropagation();

        const serviceName = String(bookingBtn.dataset.serviceName || bookingBtn.closest('.service-card')?.querySelector('.card-title')?.textContent || 'Dịch vụ thú cưng').trim();
        const servicePrice = String(bookingBtn.dataset.servicePrice || bookingBtn.closest('.service-card')?.querySelector('.service-price')?.textContent || 'Liên hệ').trim();

        localStorage.setItem('selectedServiceBooking', JSON.stringify({
            service: serviceName,
            price: servicePrice,
            source: 'services_page',
            timestamp: Date.now()
        }));

        if (typeof window.openDatLichPopup === 'function') {
            window.openDatLichPopup({ service: serviceName, price: servicePrice, source: 'services_page' });
            return;
        }

        if (typeof window.openServiceBookingPopup === 'function') {
            window.openServiceBookingPopup({ service: serviceName, price: servicePrice });
        } else if (typeof window.routeToPage === 'function') {
            window.routeToPage('services');
            setTimeout(() => {
                if (typeof window.openServiceBookingPopup === 'function') {
                    window.openServiceBookingPopup({ service: serviceName, price: servicePrice });
                }
            }, 80);
        } else if (typeof window.loadPage === 'function') {
            window.loadPage('services');
            setTimeout(() => {
                if (typeof window.openServiceBookingPopup === 'function') {
                    window.openServiceBookingPopup({ service: serviceName, price: servicePrice });
                }
            }, 80);
        } else {
            const inPagesFolder = /\/pages\//i.test(String(window.location.pathname || '').replace(/\\/g, '/'));
            const homePath = inPagesFolder ? '../home.html' : './home.html';
            window.location.href = `${homePath}?page=services&openBooking=1`;
        }
    });

    const preferredCategory = String(localStorage.getItem('preferredServiceCategory') || '').trim();
    if (preferredCategory) {
        window.currentServiceCategory = preferredCategory;
        localStorage.removeItem('preferredServiceCategory');
    }

    applyCategory(window.currentServiceCategory);

    refreshServicesFromDatabase(true);
    startServicesRealtime();
    window.addEventListener('beforeunload', stopServicesRealtime);
})();
</script>
