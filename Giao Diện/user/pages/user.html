<section class="featured" style="padding-top: 50px; padding-bottom: 100px;">
  <div class="container-fluid px-5">
    <!-- Tiêu đề -->
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 40px;">
      <i data-feather="user-circle" style="width: 32px; height: 32px;"></i>
      <h1 style="font-size: 28px; margin: 0; font-weight: 700;">Tài khoản của tôi</h1>
    </div>

    <!-- Thông tin cá nhân + Lịch sử đơn hàng -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px;">
      <!-- Thông tin cá nhân -->
      <div style="background: #f8f9fa; padding: 30px; border-radius: 12px;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 25px;">
          <i data-feather="user" style="width: 20px; height: 20px;"></i>
          <h3 style="font-size: 18px; margin: 0; font-weight: 600;">Thông tin cá nhân</h3>
        </div>

        <div style="margin-bottom: 20px;">
          <p style="margin: 0 0 5px 0; color: #888; font-size: 12px; text-transform: uppercase; font-weight: 600;">Tên</p>
          <p style="margin: 0; font-size: 15px; color: #333;">Khách hàng</p>
        </div>

        <div style="margin-bottom: 20px;">
          <p style="margin: 0 0 5px 0; color: #888; font-size: 12px; text-transform: uppercase; font-weight: 600;">Email</p>
          <p style="margin: 0; font-size: 15px; color: #333;">customer@example.com</p>
        </div>

        <div style="margin-bottom: 20px;">
          <p style="margin: 0 0 5px 0; color: #888; font-size: 12px; text-transform: uppercase; font-weight: 600;">Số điện thoại</p>
          <p style="margin: 0; font-size: 15px; color: #333;">+84 123 456 789</p>
        </div>

        <div style="margin-bottom: 30px;">
          <p style="margin: 0 0 5px 0; color: #888; font-size: 12px; text-transform: uppercase; font-weight: 600;">Địa chỉ</p>
          <p style="margin: 0; font-size: 15px; color: #333;">123 đường chính, Thành phố, Quốc gia</p>
        </div>

        <button style="background: #000; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;">
          <i data-feather="edit-2" style="width: 16px; height: 16px;"></i>
          Chỉnh sửa thông tin
        </button>
      </div>

      <!-- Lịch sử đơn hàng -->
      <div style="background: #f8f9fa; padding: 30px; border-radius: 12px;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 25px;">
          <i data-feather="clock" style="width: 20px; height: 20px;"></i>
          <h3 style="font-size: 18px; margin: 0; font-weight: 600;">Lịch sử đơn hàng</h3>
        </div>

        <div style="text-align: center; padding: 60px 20px;">
          <i data-feather="shopping-bag" style="width: 48px; height: 48px; color: #ddd; margin-bottom: 15px;"></i>
          <p style="color: #999; font-size: 15px; margin: 0;">Chưa có đơn hàng nào</p>
        </div>
      </div>
    </div>

    <!-- Sản phẩm yêu thích -->
    <div style="background: #f8f9fa; padding: 30px; border-radius: 12px; margin-bottom: 40px;">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 25px;">
        <i data-feather="heart" style="width: 20px; height: 20px;"></i>
        <h3 style="font-size: 18px; margin: 0; font-weight: 600;">Sản phẩm yêu thích</h3>
      </div>

      <div id="favoriteProductsContainer" style="text-align: center; padding: 60px 20px;">
        <i data-feather="heart" style="width: 48px; height: 48px; color: #ddd; margin-bottom: 15px;"></i>
        <p style="color: #999; font-size: 15px; margin: 0;">Bạn chưa yêu thích sản phẩm nào</p>
      </div>

      <div id="favoriteProductsGrid" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 20px;"></div>
    </div>

    <!-- Giỏ hàng -->
    <div style="background: #f8f9fa; padding: 30px; border-radius: 12px;">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 25px;">
        <i data-feather="shopping-cart" style="width: 20px; height: 20px;"></i>
        <h3 style="font-size: 18px; margin: 0; font-weight: 600;">Giỏ hàng</h3>
      </div>

      <div style="text-align: center; padding: 60px 20px;">
        <i data-feather="shopping-cart" style="width: 48px; height: 48px; color: #ddd; margin-bottom: 15px;"></i>
        <p style="color: #999; font-size: 15px; margin: 0;">Giỏ hàng của bạn trống</p>
      </div>
    </div>
  </div>
</section>

<script>
  // Khởi tạo Feather Icons
  if (typeof feather !== 'undefined') {
    feather.replace();
  }

  // Hiển thị sản phẩm yêu thích
  function loadFavoriteProducts() {
    const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    const container = document.getElementById('favoriteProductsContainer');
    const grid = document.getElementById('favoriteProductsGrid');
      grid.style.display = 'grid';
      grid.style.gridTemplateColumns = 'repeat(3, 1fr)';
      grid.style.gap = '30px';

    if (wishlist.length === 0) {
      container.style.display = 'block';
      grid.style.display = 'none';
      return;
    }

    container.style.display = 'none';
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = 'repeat(3, 1fr)';
    grid.innerHTML = '';

    wishlist.forEach((product, index) => {
      const productCard = document.createElement('div');
      productCard.style.cssText = `
        background: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        transition: all 0.3s ease;
      `;
      
      productCard.innerHTML = `
        <div style="position: relative; height: 180px; overflow: hidden;">
          <img src="${product.image}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover;">
          <button onclick="removeFromWishlist(${index})" style="position: absolute; top: 8px; right: 8px; background: #ff6b6b; color: white; border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: all 0.3s ease;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
            <i data-feather="trash-2" style="width: 16px; height: 16px;"></i>
          </button>
        </div>
        <div style="padding: 15px;">
          <h4 style="font-size: 14px; font-weight: 600; color: #333; margin: 0 0 8px 0; line-height: 1.3;">${product.name}</h4>
          <p style="font-size: 16px; color: #ff6b35; font-weight: 700; margin: 0 0 12px 0;">${product.price}</p>
          <button onclick="addToCart('${product.name}', '${product.price}', '${product.image}')" style="width: 100%; background: #000; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='#000'">
            Thêm vào giỏ
          </button>
        </div>
      `;

      productCard.onmouseover = () => {
        productCard.style.boxShadow = '0 8px 16px rgba(0,0,0,0.1)';
        productCard.style.transform = 'translateY(-4px)';
      };
      productCard.onmouseout = () => {
        productCard.style.boxShadow = '0 2px 8px rgba(0,0,0,0.05)';
        productCard.style.transform = 'translateY(0)';
      };

      grid.appendChild(productCard);
    });

    if (typeof feather !== 'undefined') {
      feather.replace();
    }
  }

  // Xóa sản phẩm khỏi yêu thích
  function removeFromWishlist(index) {
    const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    wishlist.splice(index, 1);
    localStorage.setItem('wishlist', JSON.stringify(wishlist));
    loadFavoriteProducts();
  }

  // Thêm vào giỏ hàng
  function addToCart(productName, productPrice, productImage) {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const existingItem = cart.find(item => item.name === productName);
    
    if (existingItem) {
      existingItem.quantity += 1;
    } else {
      cart.push({
        name: productName,
        price: productPrice,
        image: productImage,
        quantity: 1
      });
    }
    
    localStorage.setItem('cart', JSON.stringify(cart));
    alert(`Đã thêm "${productName}" vào giỏ hàng!`);
    
    if (typeof updateCartBadge === 'function') {
      updateCartBadge();
    }
  }

  // Tải sản phẩm yêu thích khi trang load
  document.addEventListener('DOMContentLoaded', function() {
    loadFavoriteProducts();
  });
</script>
