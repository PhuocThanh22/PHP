// Hàm cập nhật nội dung bài viết
function updateArticleContent(articleId) {
  const article = articlesData[articleId];
  if (!article) return;

  // Cập nhật tiêu đề, ngày, và hình ảnh
  document.getElementById('article-title').textContent = article.title;
  document.getElementById('article-date').textContent = article.date;
  document.getElementById('article-image').src = article.image;
  
  // Cập nhật nội dung
  document.getElementById('article-body').innerHTML = article.body;

  // Cập nhật bài viết liên quan
  const relatedContainer = document.getElementById('related-articles');
  relatedContainer.innerHTML = '';
  
  article.related.forEach(relatedId => {
    const relatedArticle = articlesData[relatedId];
    const relatedHtml = `
      <div style="cursor: pointer;" onclick="updateArticleContent(${relatedId})">
        <img src="${relatedArticle.image.replace('w=800&h=400', 'w=300&h=200')}" alt="Bài viết" style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 10px;">
        <p style="color: #666; font-size: 13px; margin-bottom: 5px;">${relatedArticle.date}</p>
        <p style="font-weight: 600; line-height: 1.4;">${relatedArticle.title}</p>
      </div>
    `;
    relatedContainer.innerHTML += relatedHtml;
  });
}

// Khởi tạo khi trang load
document.addEventListener('DOMContentLoaded', function() {
  const contentDiv = document.getElementById('content');
  let articleId = 1; // Mặc định là bài viết 1

  // Kiểm tra nếu contentDiv có thuộc tính data-article-id
  if (contentDiv && contentDiv.getAttribute('data-article-id')) {
    articleId = parseInt(contentDiv.getAttribute('data-article-id'));
  }

  // Cập nhật nội dung
  updateArticleContent(articleId);
});

// Kiểm tra lại nếu component được insert từ loader
const observer = new MutationObserver(function(mutations) {
  mutations.forEach(function(mutation) {
    if (mutation.type === 'childList') {
      const contentDiv = document.getElementById('content');
      if (contentDiv && contentDiv.getAttribute('data-article-id')) {
        const articleId = parseInt(contentDiv.getAttribute('data-article-id'));
        updateArticleContent(articleId);
      }
    }
  });
});

// Quan sát thay đổi trong #content
setTimeout(() => {
  const contentDiv = document.getElementById('content');
  if (contentDiv) {
    observer.observe(contentDiv, { childList: true, subtree: true });
    // Cập nhật ngay lập tức nếu đã có data-article-id
    const articleId = contentDiv.getAttribute('data-article-id');
    if (articleId) {
      updateArticleContent(parseInt(articleId));
    }
  }
}, 100);
</script>
