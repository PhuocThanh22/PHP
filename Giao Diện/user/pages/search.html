<!-- Product Search Page -->
<section class="search-section" style="padding: 50px 0 100px; background: #f8f9fa;">
    <div class="container-fluid px-5">
        <!-- Header -->
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 50px;">
            <div style="width: 50px; height: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i data-feather="search" style="width: 28px; height: 28px; color: white;"></i>
            </div>
            <div>
                <h1 style="font-size: 32px; margin: 0; font-weight: 700;">Tìm Kiếm Sản Phẩm</h1>
                <p style="color: #999; margin: 5px 0 0 0; font-size: 14px;" id="searchResultCount">Nhập từ khóa để tìm kiếm</p>
            </div>
        </div>

        <!-- Search Box -->
        <div style="background: white; border-radius: 12px; padding: 25px; margin-bottom: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
            <div style="display: flex; gap: 10px;">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Nhập tên sản phẩm..." 
                    style="flex: 1; padding: 14px 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; transition: all 0.3s ease;" 
                    onkeyup="handleSearchKeyPress(event)"
                    onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                    onblur="this.style.borderColor='#ddd'; this.style.boxShadow='none'"
                >
                <button 
                    id="searchBtn" 
                    onclick="performSearch()"
                    style="padding: 14px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);"
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 16px rgba(102, 126, 234, 0.4)'"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(102, 126, 234, 0.3)'"
                >
                    <i data-feather="search" style="width: 18px; height: 18px; display: inline; margin-right: 8px; vertical-align: -3px;"></i>
                    Tìm Kiếm
                </button>
            </div>
        </div>

        <!-- Search Results -->
        <div id="searchResults" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;"></div>

        <!-- No Results Message -->
        <div id="noResultsMessage" style="display: none; text-align: center; padding: 80px 20px;">
            <i data-feather="inbox" style="width: 80px; height: 80px; color: #ddd; margin-bottom: 20px;"></i>
            <h2 style="font-size: 24px; color: #333; margin-bottom: 15px; font-weight: 600;">Không tìm thấy sản phẩm</h2>
            <p style="color: #999; font-size: 15px; margin-bottom: 30px;">Vui lòng thử từ khóa khác hoặc xem tất cả sản phẩm</p>
            <button onclick="clearSearch()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                Xóa Tìm Kiếm
            </button>
        </div>
    </div>
</section>

<script>
    /**
     * Sample Products Data
     * Thay đổi dữ liệu này theo sản phẩm thực tế của bạn
     */
    const allProducts = [
        {
            id: 1,
            name: 'Thức ăn cho chó Royal Canin',
            price: '450,000 đ',
            image: 'https://images.unsplash.com/photo-1568152949623-82d550a2a4fa?w=300&h=300&fit=crop',
            category: 'Thức ăn'
        },
        {
            id: 2,
            name: 'Thức ăn cho mèo Whiskas',
            price: '120,000 đ',
            image: 'https://images.unsplash.com/photo-1589941013453-ec89f33b5e95?w=300&h=300&fit=crop',
            category: 'Thức ăn'
        },
        {
            id: 3,
            name: 'Bát ăn cho chó inox',
            price: '85,000 đ',
            image: 'https://images.unsplash.com/photo-1585664811087-47f65abbad64?w=300&h=300&fit=crop',
            category: 'Phụ kiện'
        },
        {
            id: 4,
            name: 'Giường nằm cho chó',
            price: '350,000 đ',
            image: 'https://images.unsplash.com/photo-1544568100-847a948585b0?w=300&h=300&fit=crop',
            category: 'Nội thất'
        },
        {
            id: 5,
            name: 'Đồ chơi cho mèo có quả bóng',
            price: '75,000 đ',
            image: 'https://images.unsplash.com/photo-1535241749838-299277b6305f?w=300&h=300&fit=crop',
            category: 'Phụ kiện'
        },
        {
            id: 6,
            name: 'Nước uống cho chó',
            price: '95,000 đ',
            image: 'https://images.unsplash.com/photo-1587136372921-97158c993e77?w=300&h=300&fit=crop',
            category: 'Thức ăn'
        },
        {
            id: 7,
            name: 'Cây cồn cho mèo',
            price: '280,000 đ',
            image: 'https://images.unsplash.com/photo-1574158622682-e40e69881006?w=300&h=300&fit=crop',
            category: 'Nội thất'
        },
        {
            id: 8,
            name: 'Xích cho chó safety',
            price: '150,000 đ',
            image: 'https://images.unsplash.com/photo-1560656567-9a1a61c3ca80?w=300&h=300&fit=crop',
            category: 'Phụ kiện'
        },
        {
            id: 9,
            name: 'Thức ăn tươi cho chó',
            price: '200,000 đ',
            image: 'https://images.unsplash.com/photo-1585110396000-c9ffd4d4b35c?w=300&h=300&fit=crop',
            category: 'Thức ăn'
        }
    ];

    /**
     * Render sản phẩm
     * @param {Array} products - Danh sách sản phẩm cần render
     */
    const renderProducts = (products) => {
        const resultsContainer = document.getElementById('searchResults');
        const noResultsMsg = document.getElementById('noResultsMessage');

        if (products.length === 0) {
            resultsContainer.innerHTML = '';
            noResultsMsg.style.display = 'block';
            document.getElementById('searchResultCount').textContent = 'Không tìm thấy sản phẩm nào';
            return;
        }

        resultsContainer.innerHTML = products.map(product => `
            <div class="product-card" style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.3s ease; border: 1px solid #f0f0f0; display: flex; flex-direction: column;" onmouseover="this.style.boxShadow='0 12px 24px rgba(0,0,0,0.15)'; this.style.transform='translateY(-8px)'" onmouseout="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.08)'; this.style.transform='translateY(0)'">
                <!-- Product Image -->
                <div style="position: relative; overflow: hidden; height: 280px; background: #f8f9fa;">
                    <img src="${product.image}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                    <span style="position: absolute; top: 12px; right: 12px; background: #667eea; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;">${product.category}</span>
                </div>

                <!-- Product Info -->
                <div style="padding: 20px; flex-grow: 1; display: flex; flex-direction: column;">
                    <h3 class="product-name" style="font-size: 16px; font-weight: 600; margin: 0 0 10px 0; color: #333; line-height: 1.4;">${product.name}</h3>
                    
                    <!-- Price -->
                    <div style="margin-bottom: 15px; margin-top: auto;">
                        <p style="color: #667eea; font-size: 22px; font-weight: 700; margin: 0;">${product.price}</p>
                    </div>

                    <!-- Add to Cart Button -->
                    <button onclick="addToCart('${product.name}', '${product.price}', '${product.image}')" style="width: 100%; background: #000; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='#000'">
                        <i data-feather="shopping-cart" style="width: 16px; height: 16px;"></i>
                        Thêm vào giỏ
                    </button>
                </div>
            </div>
        `).join('');

        noResultsMsg.style.display = 'none';
        document.getElementById('searchResultCount').textContent = `Tìm thấy ${products.length} sản phẩm`;

        // Reinitialize Feather Icons
        if (typeof feather !== 'undefined') {
            feather.replace();
        }
    };

    /**
     * Hàm normalize text - loại bỏ dấu tiếng Việt
     */
    const normalizeText = (text) => {
        if (!text) return '';
        return text
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase();
    };

    /**
     * Thực hiện tìm kiếm
     */
    const performSearch = () => {
        const searchInput = document.getElementById('searchInput');
        const searchTerm = searchInput.value.trim();

        if (searchTerm === '') {
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('noResultsMessage').style.display = 'none';
            document.getElementById('searchResultCount').textContent = 'Nhập từ khóa để tìm kiếm';
            return;
        }

        const normalizedSearchTerm = normalizeText(searchTerm);

        // Lọc sản phẩm theo từ khóa (không phân biệt chữ hoa/thường và dấu)
        const filteredProducts = allProducts.filter(product => {
            const normalizedProductName = normalizeText(product.name);
            return normalizedProductName.includes(normalizedSearchTerm);
        });

        // Render kết quả
        renderProducts(filteredProducts);

        // Debug log
        console.log('Search term:', searchTerm);
        console.log('Normalized:', normalizedSearchTerm);
        console.log('Results:', filteredProducts.length);
    };

    /**
     * Xử lý sự kiện khi gõ trong input
     */
    const handleSearchKeyPress = (event) => {
        // Enter key hoặc Ctrl+Enter để tìm kiếm
        if (event.key === 'Enter' || (event.ctrlKey && event.key === 'Enter')) {
            event.preventDefault();
            performSearch();
        }
    };

    /**
     * Xóa tìm kiếm
     */
    const clearSearch = () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('noResultsMessage').style.display = 'none';
        document.getElementById('searchResultCount').textContent = 'Nhập từ khóa để tìm kiếm';
    };

    /**
     * Thêm sản phẩm vào giỏ hàng
     */
    const addToCart = (name, price, image) => {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        const existingProduct = cart.find(p => p.name === name);
        
        if (existingProduct) {
            existingProduct.quantity += 1;
        } else {
            cart.push({
                name: name,
                price: price,
                image: image,
                quantity: 1
            });
        }
        
        localStorage.setItem('cart', JSON.stringify(cart));
        alert(`Đã thêm "${name}" vào giỏ hàng!`);
        
        // Update cart badge nếu có
        if (typeof updateCartBadge === 'function') {
            updateCartBadge();
        }
    };

    /**
     * Đọc keyword từ URL
     */
    const getKeywordFromURL = () => {
        const params = new URLSearchParams(window.location.search);
        return params.get('keyword') || '';
    };

    /**
     * Khởi tạo trang
     */
    const initSearchPage = () => {
        const keyword = getKeywordFromURL();

        if (keyword) {
            // Gán keyword vào input
            document.getElementById('searchInput').value = decodeURIComponent(keyword);
            
            // Tự động tìm kiếm
            setTimeout(() => {
                performSearch();
            }, 100);
        } else {
            // Tập trung vào input
            setTimeout(() => {
                document.getElementById('searchInput').focus();
            }, 100);
        }
    };

    // Gọi hàm khởi tạo khi DOM sẵn sàng
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSearchPage);
    } else {
        initSearchPage();
    }
</script>
