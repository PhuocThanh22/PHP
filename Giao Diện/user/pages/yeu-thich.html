<script>
(function () {
    const styles = [
        { key: "bootstrap.min.css", href: "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" },
        { key: "giao-dien-nguoi-dung.css", href: "../giao-dien-nguoi-dung.css" }
    ];

    styles.forEach((style) => {
        if (!document.querySelector(`link[href*="${style.key}"]`)) {
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = style.href;
            document.head.appendChild(link);
        }
    });

    const renderIcons = () => {
        if (typeof window.feather !== "undefined") {
            window.feather.replace();
        }
    };

    if (typeof window.feather !== "undefined") {
        renderIcons();
    } else if (!document.querySelector('script[src*="feather-icons"]')) {
        const script = document.createElement("script");
        script.src = "https://unpkg.com/feather-icons";
        script.defer = true;
        script.onload = renderIcons;
        document.head.appendChild(script);
    }
})();
</script>

<!-- Wishlist / Favorites Page -->
<section class="favorites-section" style="padding-top: 50px; padding-bottom: 100px;">
    <div class="container-fluid px-5">
        <!-- Header -->
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 50px;">
            <div style="width: 50px; height: 50px; background: linear-gradient(135deg, #F87537 0%, #FBA81F 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i data-feather="heart" style="width: 28px; height: 28px; color: white; fill: white;"></i>
            </div>
            <div>
                <h1 style="font-size: 32px; margin: 0; font-weight: 700;">Danh sách yêu thích</h1>
                <p style="color: #999; margin: 5px 0 0 0; font-size: 14px;" id="wishlistCount">0 sản phẩm</p>
            </div>
        </div>

        <!-- Content -->
        <div id="favoriteContentArea"></div>
    </div>
</section>

<script>
    // Render favorites page
    const renderFavoritesPage = () => {
        const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        const contentArea = document.getElementById('favoriteContentArea');
        const countElement = document.getElementById('wishlistCount');

        // Update count
        countElement.textContent = `${wishlist.length} sản phẩm`;

        if (wishlist.length === 0) {
            // Empty state
            contentArea.innerHTML = `
                <div style="text-align: center; padding: 80px 20px;">
                    <div style="margin-bottom: 30px;">
                        <i data-feather="heart" style="width: 80px; height: 80px; color: #ddd; stroke-width: 1;"></i>
                    </div>
                    <h2 style="font-size: 24px; color: #333; margin-bottom: 15px; font-weight: 600;">Danh sách yêu thích trống</h2>
                    <p style="color: #999; font-size: 16px; margin-bottom: 40px; line-height: 1.6;">
                        Bạn chưa thêm sản phẩm nào vào danh sách yêu thích.<br>
                        Hãy khám phá các sản phẩm tuyệt vời của chúng tôi!
                    </p>
                    <button onclick="loadPage('shop')" style="background: linear-gradient(135deg, #F87537 0%, #FBA81F 100%); color: white; border: none; padding: 14px 40px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(248, 117, 55, 0.3);">
                        <i data-feather="shopping-bag" style="width: 18px; height: 18px; display: inline; margin-right: 8px; vertical-align: -3px;"></i>
                        Đi mua hàng
                    </button>
                </div>
            `;
        } else {
            // Grid of products
            contentArea.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;">
                    ${wishlist.map((product, index) => `
                        <div class="wishlist-card" style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.3s ease; border: 1px solid #f0f0f0; display: flex; flex-direction: column;" onmouseover="this.style.boxShadow='0 12px 24px rgba(0,0,0,0.15)'; this.style.transform='translateY(-8px)';" onmouseout="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.08)'; this.style.transform='translateY(0)';">
                            <!-- Product Image Container -->
                            <div style="position: relative; overflow: hidden; height: 280px; background: #f8f9fa;">
                                <img src="${product.image}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                                
                                <!-- Remove Button -->
                                <button onclick="removeFromWishlist('${product.name.replace(/'/g, "\\'")}')" style="position: absolute; top: 12px; right: 12px; width: 40px; height: 40px; background: #F87537; color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(248, 117, 55, 0.3); transition: all 0.3s ease; font-size: 20px;" onmouseover="this.style.background='#FBA81F'; this.style.transform='scale(1.1)'" onmouseout="this.style.background='#F87537'; this.style.transform='scale(1)';" title="Bỏ yêu thích">
                                    <i data-feather="x" style="width: 20px; height: 20px;"></i>
                                </button>
                            </div>

                            <!-- Product Info -->
                            <div style="padding: 20px; flex-grow: 1; display: flex; flex-direction: column;">
                                <h3 style="font-size: 16px; font-weight: 600; margin: 0 0 10px 0; color: #333; line-height: 1.4;">${product.name}</h3>
                                
                                <!-- Price -->
                                <div style="margin-bottom: 15px;">
                                    <p style="color: #F87537; font-size: 22px; font-weight: 700; margin: 0;">${product.price}</p>
                                </div>

                                <!-- Add to Cart Button -->
                                <button onclick="addToCartFromFavorites('${product.name.replace(/'/g, "\\'")}', '${product.price}', '${product.image.replace(/'/g, "\\'")}')" style="width: 100%; background: #000; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='#000'">
                                    <i data-feather="shopping-cart" style="width: 16px; height: 16px;"></i>
                                    Thêm vào giỏ
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Initialize feather icons
        if (typeof feather !== 'undefined') {
            feather.replace();
        }
    };

    // Remove from wishlist
    const removeFromWishlist = (productName) => {
        const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        const index = wishlist.findIndex(p => p.name === productName);
        
        if (index > -1) {
            wishlist.splice(index, 1);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            renderFavoritesPage();
            
            // Update wishlist icons on home page
            if (typeof updateWishlistIcons === 'function') {
                updateWishlistIcons();
            }
            
            alert(`Đã xóa "${productName}" khỏi danh sách yêu thích`);
        }
    };

    // Add to cart from favorites
    const addToCartFromFavorites = (productName, productPrice, productImage) => {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        // Check if product already in cart
        const existingProduct = cart.find(p => p.name === productName);
        
        if (existingProduct) {
            existingProduct.quantity += 1;
        } else {
            cart.push({
                name: productName,
                price: productPrice,
                image: productImage,
                quantity: 1
            });
        }
        
        localStorage.setItem('cart', JSON.stringify(cart));
        alert(`Đã thêm "${productName}" vào giỏ hàng!`);
        
        // Update cart badge
        if (typeof updateCartBadge === 'function') {
            updateCartBadge();
        }
    };

    // Initialize on page load
    renderFavoritesPage();
</script>
