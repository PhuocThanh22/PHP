﻿<script>
(function () {
    const styles = [
        { key: "bootstrap.min.css", href: "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" },
        { key: "giao-dien-nguoi-dung.css", href: "../giao-dien-nguoi-dung.css" }
    ];

    styles.forEach((style) => {
        if (!document.querySelector(`link[href*="${style.key}"]`)) {
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = style.href;
            document.head.appendChild(link);
        }
    });

    const renderIcons = () => {
        if (typeof window.feather !== "undefined") {
            window.feather.replace();
        }
    };

    if (typeof window.feather !== "undefined") {
        renderIcons();
    } else if (!document.querySelector('script[src*="feather-icons"]')) {
        const script = document.createElement("script");
        script.src = "https://unpkg.com/feather-icons";
        script.defer = true;
        script.onload = renderIcons;
        document.head.appendChild(script);
    }
})();
</script>

<script>
    const getUserAppBasePath = () => {
        const path = String(window.location.pathname || '');
        const marker = '/Giao';
        const markerIndex = path.lastIndexOf(marker);
        return markerIndex >= 0 ? path.slice(0, markerIndex) : '/phuocthanh/PHPCHINH';
    };

    const normalizeAssetUrl = (value) => {
        const raw = String(value || '').trim().replace(/\\/g, '/');
        if (!raw) return '';
        if (/^(https?:)?\/\//i.test(raw) || raw.startsWith('data:')) return raw;

        let cleaned = raw
            .replace(/Giao Diện\/user\/anhdata\//gi, 'anhdata/')
            .replace(/Giao%20Di%E1%BB%87n\/user\/anhdata\//gi, 'anhdata/')
            .replace(/Giao Diện\/admin\/anhdata\//gi, 'anhdata/')
            .replace(/Giao%20Di%E1%BB%87n\/admin\/anhdata\//gi, 'anhdata/');

        const appBase = getUserAppBasePath();

        if (cleaned.startsWith('/')) {
            if (cleaned.includes('/anhdata/')) return `${window.location.origin}${cleaned}`;
            return `${window.location.origin}${appBase}${cleaned}`;
        }

        const marker = 'anhdata/';
        const start = cleaned.toLowerCase().indexOf(marker);
        if (start >= 0) {
            cleaned = cleaned.slice(start).replace(/^\/+/, '');
            return `${window.location.origin}${appBase}/${cleaned}`;
        }

        return `${window.location.origin}${appBase}/${cleaned.replace(/^\/+/, '')}`;
    };

    const escapeHtml = (value) => String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    const formatMoneyLabel = (price) => {
        const raw = String(price || '').trim();
        const numeric = Number(raw.replace(/[^0-9]/g, ''));
        if (!Number.isFinite(numeric) || numeric <= 0) {
            return raw || 'Liên hệ';
        }
        return `${numeric.toLocaleString('vi-VN')}đ`;
    };

    const normalizeLookupKey = (value) => String(value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, ' ')
        .trim()
        .replace(/\s+/g, ' ');

    const SERVICE_WISHLIST_KEY = 'wishlistServices';
    const getServiceFavorites = () => {
        try {
            const parsed = JSON.parse(localStorage.getItem(SERVICE_WISHLIST_KEY) || '[]');
            return Array.isArray(parsed) ? parsed : [];
        } catch (_) {
            return [];
        }
    };

    const saveServiceFavorites = (items) => {
        localStorage.setItem(SERVICE_WISHLIST_KEY, JSON.stringify(Array.isArray(items) ? items : []));
    };

    const buildProductLookup = async () => {
        const lookup = new Map();
        const productRows = [];
        let fetched = false;
        const candidates = ['home_api.php?api=get_products', '../user/home_api.php?api=get_products', '../../index.php?api=get_products'];

        for (const candidate of candidates) {
            try {
                const connector = candidate.includes('?') ? '&' : '?';
                const response = await fetch(`${candidate}${connector}_t=${Date.now()}`, { cache: 'no-store' });
                if (!response.ok) continue;
                const payload = await response.json();
                if (!payload || payload.ok !== true || !Array.isArray(payload.data)) continue;
                fetched = true;

                payload.data.forEach((item) => {
                    const nameRaw = String(item?.tensanpham || item?.name || '').trim();
                    const name = normalizeLookupKey(nameRaw);
                    if (!name) return;

                    const row = {
                        name: nameRaw,
                        image: normalizeAssetUrl(item?.hinhanhsanpham || item?.image || ''),
                        price: String(item?.giasanpham || item?.price || '').trim(),
                        purchaseCount: Number(item?.soluotmuasanpham ?? item?.soluotmua ?? 0)
                    };

                    if (!lookup.has(name)) {
                        lookup.set(name, row);
                    }
                    productRows.push(row);
                });

                if (lookup.size > 0) {
                    return { lookup, productRows, fetched };
                }
            } catch (error) {
                // thử candidate tiếp theo
            }
        }

        return { lookup, productRows, fetched };
    };

    const findBestProductMatch = (productName, lookupData) => {
        const key = normalizeLookupKey(productName);
        if (!key) return null;

        const direct = lookupData.lookup.get(key);
        if (direct) return direct;

        const rows = Array.isArray(lookupData.productRows) ? lookupData.productRows : [];
        const compactKey = key.replace(/\s+/g, '');

        for (const row of rows) {
            const rowKey = normalizeLookupKey(row.name);
            if (!rowKey) continue;
            const compactRowKey = rowKey.replace(/\s+/g, '');

            if (rowKey.includes(key) || key.includes(rowKey) || compactRowKey === compactKey || compactRowKey.includes(compactKey) || compactKey.includes(compactRowKey)) {
                return row;
            }
        }

        return null;
    };

    const enrichWishlist = async (wishlist) => {
        const lookupData = await buildProductLookup();

        if (lookupData.fetched && lookupData.lookup.size === 0) {
            return [];
        }

        return wishlist.map((product) => {
            const fromDb = findBestProductMatch(product?.name || '', lookupData);
            if (lookupData.fetched && !fromDb) {
                return null;
            }
            const resolvedImage = fromDb?.image || normalizeAssetUrl(product?.image || '');
            const resolvedPrice = fromDb?.price || String(product?.price || '').trim();

            return {
                ...product,
                image: resolvedImage,
                price: resolvedPrice || product?.price || '',
                purchaseCount: Number(fromDb?.purchaseCount ?? product?.purchaseCount ?? 0)
            };
        }).filter(Boolean);
    };

    let favoriteItemsCache = [];

    const renderFavoriteCard = (item, index) => {
        const isService = item.kind === 'service';
        const safeName = escapeHtml(item.name || 'Mục yêu thích');
        const safePrice = escapeHtml(formatMoneyLabel(item.price));
        const safeImage = escapeHtml(item.image || 'https://via.placeholder.com/400x300?text=No+Image');
        const purchaseCountRaw = Number(item?.purchaseCount || 0);
        const purchaseCount = Number.isFinite(purchaseCountRaw) && purchaseCountRaw > 0 ? Math.round(purchaseCountRaw) : 0;
        const purchaseInfo = isService
            ? 'Lượt đặt: 0'
            : `${purchaseCount.toLocaleString('vi-VN')} lượt mua`;
        const safePurchaseInfo = escapeHtml(purchaseInfo);
        const badge = isService ? 'Dịch vụ' : 'Sản phẩm';
        const badgeClass = isService ? 'service' : 'product';

        return `
            <article class="product-card">
                <div class="product-image" data-action="open-detail" data-index="${index}">
                    <img src="${safeImage}" alt="${safeName}" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image';">
                    <span class="product-badge ${badgeClass}">${badge}</span>
                    <button class="product-heart-btn" data-action="remove-favorite" data-index="${index}" title="Bỏ yêu thích">
                        <i data-feather="x" style="width:18px;height:18px;"></i>
                    </button>
                </div>
                <div class="product-info">
                    <h3 class="product-name" data-action="open-detail" data-index="${index}">${safeName}</h3>
                    <p class="product-category" style="font-style:italic;">${safePurchaseInfo}</p>
                    <p class="product-price">${safePrice}</p>
                    <div class="product-corner-actions">
                        <button class="product-corner-btn buy" data-action="primary" data-index="${index}">${isService ? 'Đặt lịch' : 'Mua'}</button>
                        <button class="product-corner-btn detail" data-action="open-detail" data-index="${index}">Chi tiết</button>
                    </div>
                </div>
            </article>
        `;
    };

    const openFavoriteQuickView = (index) => {
        const item = favoriteItemsCache[index];
        if (!item) return;

        const modal = document.getElementById('favoriteQuickViewModal');
        const imageEl = document.getElementById('favoriteQuickViewImage');
        const badgeEl = document.getElementById('favoriteQuickViewBadge');
        const nameEl = document.getElementById('favoriteQuickViewName');
        const priceEl = document.getElementById('favoriteQuickViewPrice');
        const descEl = document.getElementById('favoriteQuickViewDesc');
        const primaryBtn = document.getElementById('favoriteQuickViewPrimaryBtn');
        const removeBtn = document.getElementById('favoriteQuickViewRemoveBtn');

        const isService = item.kind === 'service';
        imageEl.src = item.image || 'https://via.placeholder.com/400x300?text=No+Image';
        imageEl.alt = item.name || 'Chi tiết yêu thích';
        badgeEl.textContent = isService ? 'Dịch vụ' : 'Sản phẩm';
        badgeEl.style.background = isService ? 'linear-gradient(135deg, #0891b2 0%, #22d3ee 100%)' : 'linear-gradient(135deg, #1F8F4D 0%, #6FCF5F 100%)';
        badgeEl.style.color = '#fff';
        nameEl.textContent = item.name || 'Mục yêu thích';
        priceEl.textContent = formatMoneyLabel(item.price);
        descEl.textContent = String(item.description || (isService
            ? 'Dịch vụ chăm sóc thú cưng chất lượng cao với đội ngũ nhiều kinh nghiệm.'
            : 'Sản phẩm dành cho thú cưng, thông tin chi tiết đang được cập nhật.')).trim();

        primaryBtn.textContent = isService ? 'Đặt lịch ngay' : 'Thêm vào giỏ';
        primaryBtn.onclick = () => {
            if (isService) {
                bookServiceFromFavorites(item.name || '', item.price || '');
            } else {
                addToCartFromFavorites(item.name || '', item.price || '', item.image || '');
            }
        };

        removeBtn.onclick = () => {
            removeFavoriteItem(isService ? 'service' : 'product', item.name || '');
            closeFavoriteQuickView();
        };

        modal.style.display = 'flex';
    };

    const closeFavoriteQuickView = () => {
        const modal = document.getElementById('favoriteQuickViewModal');
        if (modal) modal.style.display = 'none';
    };

    const renderFavoritesPage = async () => {
        const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        const serviceWishlist = getServiceFavorites();
        const contentArea = document.getElementById('favoriteContentArea');
        const countElement = document.getElementById('wishlistCount');

        const totalFavorites = wishlist.length + serviceWishlist.length;
        countElement.textContent = `${totalFavorites} mục yêu thích`;

        if (totalFavorites === 0) {
            contentArea.innerHTML = `
                <div style="text-align: center; padding: 80px 20px;">
                    <div style="margin-bottom: 30px;">
                        <i data-feather="heart" style="width: 80px; height: 80px; color: #ddd; stroke-width: 1;"></i>
                    </div>
                    <h2 style="font-size: 24px; color: #333; margin-bottom: 15px; font-weight: 600;">Danh sách yêu thích trống</h2>
                    <p style="color: #999; font-size: 16px; margin-bottom: 40px; line-height: 1.6;">
                        Bạn chưa thêm sản phẩm nào vào danh sách yêu thích.<br>
                        Hãy khám phá các sản phẩm tuyệt vời của chúng tôi!
                    </p>
                    <button onclick="loadPage('shop')" style="background: linear-gradient(135deg, #1F8F4D 0%, #6FCF5F 100%); color: white; border: none; padding: 14px 40px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(31, 143, 77, 0.3);">
                        <i data-feather="shopping-bag" style="width: 18px; height: 18px; display: inline; margin-right: 8px; vertical-align: -3px;"></i>
                        Đi mua hàng
                    </button>
                </div>
            `;
        } else {
            const enrichedWishlist = await enrichWishlist(wishlist);
            localStorage.setItem('wishlist', JSON.stringify(enrichedWishlist));

            const unifiedItems = [
                ...enrichedWishlist.map((product) => ({
                    kind: 'product',
                    name: String(product?.name || '').trim(),
                    image: normalizeAssetUrl(product?.image || ''),
                    price: String(product?.price || '').trim() || 'Liên hệ',
                    purchaseCount: Number(product?.purchaseCount || 0),
                    description: String(product?.description || product?.mota || '').trim()
                })),
                ...serviceWishlist.map((service) => ({
                    kind: 'service',
                    name: String(service?.name || '').trim(),
                    image: normalizeAssetUrl(service?.image || ''),
                    price: String(service?.price || '').trim() || 'Liên hệ',
                    description: String(service?.description || '').trim()
                }))
            ].filter((item) => item.name !== '');

            favoriteItemsCache = unifiedItems;

            contentArea.innerHTML = `
                <div class="favorite-grid">
                    ${unifiedItems.map((item, index) => renderFavoriteCard(item, index)).join('')}
                </div>
            `;

            if (contentArea && contentArea.dataset.bound !== '1') {
                contentArea.addEventListener('click', (event) => {
                    const actionTarget = event.target.closest('[data-action]');
                    if (!actionTarget) return;

                    const action = String(actionTarget.dataset.action || '').trim();
                    const index = Number(actionTarget.dataset.index || -1);
                    const item = favoriteItemsCache[index];
                    if (!item) return;

                    if (action === 'open-detail') {
                        openFavoriteQuickView(index);
                        return;
                    }

                    if (action === 'primary') {
                        if (item.kind === 'service') {
                            bookServiceFromFavorites(item.name || '', item.price || '');
                        } else {
                            addToCartFromFavorites(item.name || '', item.price || '', item.image || '');
                        }
                        return;
                    }

                    if (action === 'remove-favorite') {
                        removeFavoriteItem(item.kind === 'service' ? 'service' : 'product', item.name || '');
                    }
                });
                contentArea.dataset.bound = '1';
            }
        }

        if (typeof feather !== 'undefined') {
            feather.replace();
        }
    };

    const removeFavoriteItem = (kind, itemName) => {
        const normalizedName = String(itemName || '').trim();
        if (normalizedName === '') return;

        if (kind === 'service') {
            const serviceFavorites = getServiceFavorites();
            const nextServices = serviceFavorites.filter((item) => String(item?.name || '').trim() !== normalizedName);
            saveServiceFavorites(nextServices);
        } else {
            const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            const nextWishlist = wishlist.filter((item) => String(item?.name || '').trim() !== normalizedName);
            localStorage.setItem('wishlist', JSON.stringify(nextWishlist));
        }

        renderFavoritesPage();
        if (typeof updateWishlistIcons === 'function') {
            updateWishlistIcons();
        }
        alert(`Đã xóa "${normalizedName}" khỏi danh sách yêu thích`);
    };

    window.removeFavoriteItem = removeFavoriteItem;

    // Add to cart from favorites
    const addToCartFromFavorites = (productName, productPrice, productImage) => {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        // Check if product already in cart
        const existingProduct = cart.find(p => p.name === productName);
        
        if (existingProduct) {
            existingProduct.quantity += 1;
        } else {
            cart.push({
                name: productName,
                price: productPrice,
                image: normalizeAssetUrl(productImage),
                quantity: 1
            });
        }
        
        localStorage.setItem('cart', JSON.stringify(cart));
        alert(`Đã thêm "${productName}" vào giỏ hàng!`);
        
        // Update cart badge
        if (typeof updateCartBadge === 'function') {
            updateCartBadge();
        }
    };

    window.addToCartFromFavorites = addToCartFromFavorites;

    const bookServiceFromFavorites = (serviceName, servicePrice) => {
        const payload = {
            service: String(serviceName || '').trim() || 'Dịch vụ thú cưng',
            price: String(servicePrice || 'Liên hệ').trim() || 'Liên hệ',
            source: 'favorites_page',
            timestamp: Date.now(),
        };

        localStorage.setItem('selectedServiceBooking', JSON.stringify(payload));
        if (typeof window.openDatLichPopup === 'function') {
            window.openDatLichPopup(payload);
            return;
        }

        if (typeof window.openServiceBookingPopup === 'function') {
            window.openServiceBookingPopup(payload);
            return;
        }

        if (typeof window.loadPage === 'function') {
            window.loadPage('services');
            return;
        }

        if (typeof window.routeToPage === 'function') {
            window.routeToPage('services');
        }
    };

    window.bookServiceFromFavorites = bookServiceFromFavorites;

    const favoriteModal = document.getElementById('favoriteQuickViewModal');
    document.getElementById('favoriteQuickViewClose')?.addEventListener('click', closeFavoriteQuickView);
    favoriteModal?.addEventListener('click', (event) => {
        if (event.target === favoriteModal) {
            closeFavoriteQuickView();
        }
    });

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
            closeFavoriteQuickView();
        }
    });

    // Initialize on page load
    renderFavoritesPage();
</script>
