<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="staff-style.css">
</head>
<body>
<div class="page-wrap">
    <div class="top-header d-flex justify-content-between align-items-center">
        <h2>Quản Lý Đơn Hàng</h2>
        <div class="service-toolbar">
            <div class="service-search">
                <i class="bi bi-search"></i>
                <input id="orderSearchInput" type="text" placeholder="Tìm theo mã đơn, khách hàng hoặc nhân viên..." aria-label="Tìm đơn hàng">
            </div>
            <div class="service-toolbar-actions">
                <button class="btn btn-outline-primary" type="button" id="exportOrderBtn"><i class="bi bi-download me-1"></i>Xuất danh sách</button>
            </div>
        </div>
    </div>
    <div class="module-grid">
        <div class="module-card"><div class="module-title"><i class="bi bi-receipt"></i><span>Tổng Đơn Bán</span></div><div class="module-value" id="orderSellTotal">0</div><div class="module-desc">Số hóa đơn trong danh sách</div></div>
        <div class="module-card"><div class="module-title"><i class="bi bi-cash-stack"></i><span>Doanh Thu</span></div><div class="module-value" id="orderSellRevenue">0 đ</div><div class="module-desc">Tổng tiền các đơn hiện có</div></div>
    </div>

    <div class="content-section">
        <div class="section-header"><h3><i class="bi bi-card-checklist text-success me-2"></i>Danh Sách Đơn Bán</h3></div>
        <div class="data-table">
            <table>
                <thead><tr><th>Mã Hóa Đơn</th><th>Khách Hàng</th><th>Nhân Viên</th><th>Ngày Bán</th><th>Tổng Tiền</th><th>Thanh Toán</th><th>Trạng Thái</th><th>Ghi Chú</th></tr></thead>
                <tbody id="orderTableBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
(function () {
    let allOrders = [];
    let searchKeyword = '';

    function formatVnd(value) {
        return Number(value || 0).toLocaleString('vi-VN') + ' đ';
    }

    function statusBadgeClass(status) {
        const s = String(status || '').toLowerCase();
        if (s === 'hoan_tat') return 'success';
        if (s === 'dang_xu_ly') return 'warning';
        if (s === 'da_huy') return 'danger';
        return 'info';
    }

    function statusText(status) {
        const s = String(status || '').toLowerCase();
        if (s === 'hoan_tat') return 'Hoàn tất';
        if (s === 'dang_xu_ly') return 'Đang xử lý';
        if (s === 'da_huy') return 'Đã hủy';
        return 'Mới';
    }

    function paymentText(method) {
        const m = String(method || '').toLowerCase();
        if (m === 'tien_mat') return 'Tiền mặt';
        if (m === 'chuyen_khoan') return 'Chuyển khoản';
        return 'Khác';
    }

    function htmlEscape(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function askExportFormat() {
        return new Promise((resolve) => {
            const backdrop = document.createElement('div');
            backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:12px;';

            const dialog = document.createElement('div');
            dialog.style.cssText = 'width:min(420px,96vw);background:#fff;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 20px 40px rgba(15,23,42,.25);padding:14px;';
            dialog.innerHTML = `
                <h4 style="margin:0 0 8px;font-size:18px;font-weight:700;color:#0f172a;">Chọn định dạng xuất</h4>
                <p style="margin:0 0 12px;font-size:14px;color:#475569;">Bạn muốn xuất danh sách dưới dạng nào?</p>
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                    <button type="button" data-format="cancel" class="btn btn-outline-secondary">Hủy</button>
                    <button type="button" data-format="pdf" class="btn btn-outline-primary">PDF</button>
                    <button type="button" data-format="excel" class="btn btn-success">Excel</button>
                </div>
            `;

            function close(value) {
                backdrop.remove();
                resolve(value || '');
            }

            dialog.querySelectorAll('button[data-format]').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const value = String(btn.getAttribute('data-format') || 'cancel');
                    close(value === 'cancel' ? '' : value);
                });
            });

            backdrop.addEventListener('click', (event) => {
                if (event.target === backdrop) close('');
            });

            backdrop.appendChild(dialog);
            document.body.appendChild(backdrop);
        });
    }

    function downloadExcelFile(fileName, title, headers, rows, totalRevenue) {
        const thead = `<tr>${headers.map((h) => `<th>${htmlEscape(h)}</th>`).join('')}</tr>`;
        const tbody = rows.map((row) => `<tr>${row.map((cell) => `<td>${htmlEscape(cell)}</td>`).join('')}</tr>`).join('');
        const totalRow = `<tr><td colspan="4"><b>Tổng doanh thu</b></td><td><b>${htmlEscape(toMoney(totalRevenue))}</b></td><td colspan="3"></td></tr>`;
        const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>table{border-collapse:collapse;width:100%;}th,td{border:1px solid #999;padding:6px;font-size:13px;}th{background:#f2f2f2;}h3{margin:0 0 10px;}</style></head><body><h3>${htmlEscape(title)}</h3><table><thead>${thead}</thead><tbody>${tbody}${totalRow}</tbody></table></body></html>`;
        const blob = new Blob(['\uFEFF' + html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
    }

    function openPdfPrint(title, headers, rows, totalRevenue) {
        const win = window.open('', '_blank', 'width=1000,height=700');
        if (!win) {
            alert('Không mở được cửa sổ in. Vui lòng tắt chặn popup.');
            return;
        }
        const thead = `<tr>${headers.map((h) => `<th>${htmlEscape(h)}</th>`).join('')}</tr>`;
        const tbody = rows.map((row) => `<tr>${row.map((cell) => `<td>${htmlEscape(cell)}</td>`).join('')}</tr>`).join('');
        win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${htmlEscape(title)}</title><style>body{font-family:Arial,sans-serif;padding:20px;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #ccc;padding:8px;font-size:13px;}th{background:#f5f5f5;}h3{margin:0 0 12px;} .sum{margin-top:10px;font-weight:700;text-align:right;}</style></head><body><h3>${htmlEscape(title)}</h3><table><thead>${thead}</thead><tbody>${tbody}</tbody></table><div class="sum">Tổng doanh thu: ${htmlEscape(toMoney(totalRevenue))}</div></body></html>`);
        win.document.close();
        win.focus();
        win.print();
    }

    async function exportOrders() {
        const rows = applyFilter(allOrders, searchKeyword);
        if (!rows.length) {
            alert('Không có dữ liệu đơn hàng để xuất.');
            return;
        }

        const format = await askExportFormat();
        if (!format) return;

        const dataRows = rows.map((item) => ([
            item.mahoadon || '',
            item.tenkhachhang || '',
            item.tennhanvien || '',
            item.ngayban || '',
            Number(item.tongtien || 0),
            paymentText(item.phuongthucthanhtoan || ''),
            statusText(item.trangthai || ''),
            item.ghichu || '',
        ]));

        const headers = ['Mã hóa đơn', 'Khách hàng', 'Nhân viên', 'Ngày bán', 'Tổng tiền', 'Thanh toán', 'Trạng thái', 'Ghi chú'];
        const totalRevenue = rows.reduce((sum, item) => sum + Number(item.tongtien || 0), 0);

        if (format === 'excel') {
            downloadExcelFile(`don-hang-${new Date().toISOString().slice(0, 10)}.xls`, 'Danh sách đơn hàng', headers, dataRows, totalRevenue);
        } else {
            openPdfPrint('Danh sách đơn hàng', headers, dataRows, totalRevenue);
        }
        alert(`Đã xuất ${rows.length} đơn hàng.`);
    }

    function getSalesApiCandidates() {
        const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
        return [
            `${protocol}//127.0.0.1/PHPCHINH/index.php?api=get_sales`,
            `${protocol}//localhost/PHPCHINH/index.php?api=get_sales`,
            new URL('../../index.php?api=get_sales', window.location.href).toString(),
            '/PHPCHINH/index.php?api=get_sales',
            '/index.php?api=get_sales'
        ];
    }

    function getOnlineApiCandidates() {
        const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
        return [
            `${protocol}//127.0.0.1/PHPCHINH/index.php?api=get_online_orders`,
            `${protocol}//localhost/PHPCHINH/index.php?api=get_online_orders`,
            new URL('../../index.php?api=get_online_orders', window.location.href).toString(),
            '/PHPCHINH/index.php?api=get_online_orders',
            '/index.php?api=get_online_orders'
        ];
    }

    async function fetchPayload(candidates, fallbackMessage) {
        let lastError = new Error('Không lấy được dữ liệu bán hàng');
        for (const candidate of candidates) {
            const sep = candidate.includes('?') ? '&' : '?';
            const url = `${candidate}${sep}_t=${Date.now()}`;
            try {
                const response = await fetch(url, { cache: 'no-store' });
                if (!response.ok) {
                    lastError = new Error('HTTP ' + response.status);
                    continue;
                }

                const payload = await response.json();
                if (!payload.ok) {
                    lastError = new Error(payload.message || 'API lỗi');
                    continue;
                }
                return payload;
            } catch (error) {
                lastError = error;
            }
        }

        throw new Error(lastError.message || fallbackMessage);
    }

    function toOnlineCompletedSales(rows) {
        const onlineRows = Array.isArray(rows) ? rows : [];
        return onlineRows
            .filter((row) => {
                const status = String(row?.trangthai || '').toLowerCase();
                return status === 'da_duyet' || status === 'hoan_tat' || status === 'hoanthanh';
            })
            .map((row) => ({
                mahoadon: String(row?.madonhang || ''),
                tenkhachhang: String(row?.tenkhachhang || 'Khách hàng online'),
                tennhanvien: 'Online',
                ngayban: String(row?.ngaycapnhat || row?.ngaytao || ''),
                tongtien: Number(row?.tongtien || 0),
                phuongthucthanhtoan: 'chuyen_khoan',
                trangthai: 'hoan_tat',
                ghichu: 'Online',
            }));
    }

    function applyFilter(list, keyword) {
        const key = String(keyword || '').trim().toLowerCase();
        if (!key) return list;
        return list.filter((item) => {
            const code = String(item.mahoadon || '').toLowerCase();
            const customer = String(item.tenkhachhang || '').toLowerCase();
            const staff = String(item.tennhanvien || '').toLowerCase();
            const note = String(item.ghichu || '').toLowerCase();
            return code.includes(key) || customer.includes(key) || staff.includes(key) || note.includes(key);
        });
    }

    function renderOrders() {
        const tbody = document.getElementById('orderTableBody');
        if (!tbody) return;

        const rows = applyFilter(allOrders, searchKeyword);
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="8">Không tìm thấy đơn bán phù hợp.</td></tr>';
            return;
        }

        tbody.innerHTML = rows.map((item) => `
            <tr>
                <td>${String(item.mahoadon || '')}</td>
                <td>${String(item.tenkhachhang || '')}</td>
                <td>${String(item.tennhanvien || '')}</td>
                <td>${String(item.ngayban || '')}</td>
                <td>${formatVnd(item.tongtien || 0)}</td>
                <td>${paymentText(item.phuongthucthanhtoan || '')}</td>
                <td><span class="status-badge ${statusBadgeClass(item.trangthai)}">${statusText(item.trangthai)}</span></td>
                <td>${String(item.ghichu || '')}</td>
            </tr>
        `).join('');
    }

    function refreshSummary() {
        const totalEl = document.getElementById('orderSellTotal');
        const revenueEl = document.getElementById('orderSellRevenue');
        if (!totalEl || !revenueEl) return;

        const revenue = allOrders.reduce((sum, item) => sum + Number(item.tongtien || 0), 0);
        totalEl.textContent = String(allOrders.length);
        revenueEl.textContent = formatVnd(revenue);
    }

    async function loadOrders() {
        const tbody = document.getElementById('orderTableBody');
        if (tbody) {
            tbody.innerHTML = '<tr><td colspan="8">Đang tải dữ liệu đơn hàng...</td></tr>';
        }

        try {
            const salesPayload = await fetchPayload(getSalesApiCandidates(), 'Không lấy được dữ liệu bán hàng');
            const onlinePayload = await fetchPayload(getOnlineApiCandidates(), 'Không lấy được dữ liệu đơn online');

            const salesRows = Array.isArray(salesPayload.data) ? salesPayload.data : [];
            const onlineCompletedRows = toOnlineCompletedSales(onlinePayload.data);

            const salesByCode = new Map();
            salesRows.forEach((row) => {
                const key = String(row?.mahoadon || '');
                if (key !== '') {
                    salesByCode.set(key, true);
                }
            });

            const mergedOnline = onlineCompletedRows.filter((row) => !salesByCode.has(String(row.mahoadon || '')));
            allOrders = [...salesRows, ...mergedOnline].sort((a, b) => {
                const ta = new Date(a?.ngayban || 0).getTime() || 0;
                const tb = new Date(b?.ngayban || 0).getTime() || 0;
                return tb - ta;
            });

            refreshSummary();
            renderOrders();
        } catch (error) {
            allOrders = [];
            refreshSummary();
            if (tbody) {
                tbody.innerHTML = `<tr><td colspan="8">Lỗi tải dữ liệu: ${String(error.message || error)}</td></tr>`;
            }
        }
    }

    const searchInput = document.getElementById('orderSearchInput');
    if (searchInput) {
        searchInput.addEventListener('input', (event) => {
            searchKeyword = String(event.target?.value || '');
            renderOrders();
        });
    }

    const exportBtn = document.getElementById('exportOrderBtn');
    if (exportBtn) {
        exportBtn.addEventListener('click', exportOrders);
    }

    loadOrders();
})();
</script>
</body>
</html>
