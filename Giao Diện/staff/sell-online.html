<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bán Hàng Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="staff-style.css">
    <style>
        .online-actions { display: flex; gap: 8px; }
        .online-actions .btn { padding: 4px 10px; font-size: 12px; }
        .status-pill {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }
        .status-cho_duyet { background: #fff7dd; color: #946200; }
        .status-da_duyet { background: #e8f8ef; color: #136f3a; }
        .status-tu_choi { background: #ffe9e9; color: #b42318; }

        .online-detail-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 3000;
        }

        .online-detail-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(92vw, 980px);
            max-height: 88vh;
            overflow: auto;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            padding: 16px;
            z-index: 3001;
            box-shadow: 0 24px 48px rgba(2, 6, 23, 0.2);
        }

        .online-detail-backdrop[hidden],
        .online-detail-modal[hidden] {
            display: none !important;
        }

        .online-detail-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .online-detail-close {
            border: 0;
            background: transparent;
            font-size: 28px;
            line-height: 1;
            color: #334155;
            cursor: pointer;
        }

        .online-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .online-detail-card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px;
            background: #f8fafc;
        }

        .online-detail-card h6 {
            margin: 0 0 8px;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
        }

        .online-detail-meta {
            margin: 0;
            font-size: 14px;
            color: #334155;
            line-height: 1.7;
        }

        .online-reject-reason {
            margin-top: 10px;
        }

        .online-reject-reason textarea {
            width: 100%;
            min-height: 70px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            resize: vertical;
        }

        .online-detail-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 12px;
        }

        @media (max-width: 900px) {
            .online-detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="top-header d-flex justify-content-between align-items-center">
        <h2 class="mb-0"><i class="bi bi-shop-window me-2"></i>Bán Hàng Online</h2>
    </div>

    <div class="module-grid mb-3">
        <div class="module-card"><div class="module-title"><i class="bi bi-hourglass-split"></i><span>Chờ Duyệt</span></div><div id="sumChoDuyet" class="module-value">0</div><div class="module-desc">Đơn online mới</div></div>
        <div class="module-card"><div class="module-title"><i class="bi bi-check2-circle"></i><span>Hoàn Thành</span></div><div id="sumDaDuyet" class="module-value">0</div><div class="module-desc">Đơn online đã duyệt</div></div>
        <div class="module-card"><div class="module-title"><i class="bi bi-x-circle"></i><span>Từ Chối</span></div><div id="sumTuChoi" class="module-value">0</div><div class="module-desc">Đơn bị từ chối</div></div>
    </div>

    <div class="content-section">
        <div class="section-header d-flex justify-content-between align-items-center">
            <h3 class="mb-0"><i class="bi bi-list-check text-success me-2"></i>Danh sách đơn online</h3>
            <div class="d-flex gap-2">
                <select id="statusFilter" class="form-select form-select-sm" style="width: 170px;">
                    <option value="">Tất cả trạng thái</option>
                    <option value="cho_duyet">Chờ duyệt</option>
                    <option value="da_duyet">Hoàn thành</option>
                    <option value="tu_choi">Từ chối</option>
                </select>
                <input id="keywordInput" class="form-control form-control-sm" style="width: 220px;" placeholder="Mã đơn / tên / SĐT">
                <button id="btnSearch" class="btn btn-primary btn-sm">Lọc</button>
            </div>
        </div>

        <div id="statusText" class="small text-muted mb-2"></div>
        <div class="data-table">
            <table>
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Khách hàng</th>
                        <th>SĐT</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Ngày tạo</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="ordersBody"></tbody>
            </table>
        </div>
    </div>

    <div id="onlineDetailBackdrop" class="online-detail-backdrop" hidden></div>
    <div id="onlineDetailModal" class="online-detail-modal" role="dialog" aria-modal="true" aria-labelledby="onlineDetailTitle" hidden>
        <div class="online-detail-head">
            <h5 id="onlineDetailTitle" class="mb-0">Chi tiết đơn online</h5>
            <button id="closeOnlineDetailBtn" type="button" class="online-detail-close" aria-label="Đóng">&times;</button>
        </div>

        <div class="online-detail-grid">
            <div class="online-detail-card">
                <h6>Thông tin đơn hàng</h6>
                <p class="online-detail-meta" id="detailOrderMeta"></p>
            </div>
            <div class="online-detail-card">
                <h6>Thông tin khách hàng</h6>
                <p class="online-detail-meta" id="detailCustomerMeta"></p>
            </div>
        </div>

        <div class="online-detail-card">
            <h6>Sản phẩm đã đặt</h6>
            <div class="data-table">
                <table>
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>SL</th>
                            <th>Đơn giá</th>
                            <th>Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody id="detailItemsBody"></tbody>
                </table>
            </div>
            <div class="online-reject-reason">
                <label for="rejectReasonInput" class="form-label mb-1">Lý do hủy đơn (khi bấm Hủy)</label>
                <textarea id="rejectReasonInput" placeholder="Nhập lý do hủy đơn online..."></textarea>
            </div>
            <div class="online-detail-actions">
                <button id="closeOnlineDetailFooterBtn" type="button" class="btn btn-outline-secondary">Đóng</button>
                <button id="detailApproveBtn" type="button" class="btn btn-success">Duyệt</button>
                <button id="detailRejectBtn" type="button" class="btn btn-danger">Hủy đơn</button>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    const statusText = document.getElementById('statusText');
    const ordersBody = document.getElementById('ordersBody');
    const sumChoDuyet = document.getElementById('sumChoDuyet');
    const sumDaDuyet = document.getElementById('sumDaDuyet');
    const sumTuChoi = document.getElementById('sumTuChoi');
    const statusFilter = document.getElementById('statusFilter');
    const keywordInput = document.getElementById('keywordInput');
    const btnSearch = document.getElementById('btnSearch');
    const onlineDetailBackdrop = document.getElementById('onlineDetailBackdrop');
    const onlineDetailModal = document.getElementById('onlineDetailModal');
    const closeOnlineDetailBtn = document.getElementById('closeOnlineDetailBtn');
    const closeOnlineDetailFooterBtn = document.getElementById('closeOnlineDetailFooterBtn');
    const detailOrderMeta = document.getElementById('detailOrderMeta');
    const detailCustomerMeta = document.getElementById('detailCustomerMeta');
    const detailItemsBody = document.getElementById('detailItemsBody');
    const detailApproveBtn = document.getElementById('detailApproveBtn');
    const detailRejectBtn = document.getElementById('detailRejectBtn');
    const rejectReasonInput = document.getElementById('rejectReasonInput');
    const ONLINE_ORDER_SYNC_KEY = 'onlineOrderSyncSignal';
    const realtimeApi = window.AppSessionRealtime || (window.parent && window.parent.AppSessionRealtime);
    let cachedOrders = [];
    let activeOrder = null;

    const emitOrderStatusSyncSignal = (payload) => {
        const signal = {
            time: Date.now(),
            source: 'staff',
            ...payload
        };

        try {
            localStorage.setItem(ONLINE_ORDER_SYNC_KEY, JSON.stringify(signal));
        } catch (e) {
            // ignore storage errors
        }

        if ('BroadcastChannel' in window) {
            try {
                const channel = new BroadcastChannel('online-order-sync');
                channel.postMessage(signal);
                channel.close();
            } catch (e) {
                // ignore channel errors
            }
        }

        if (realtimeApi && typeof realtimeApi.publish === 'function') {
            realtimeApi.publish('order_status_changed', signal);
            realtimeApi.publish('entity_changed', signal);
        }
    };

    let realtimeLoadTimer = null;
    const scheduleRealtimeLoad = () => {
        if (realtimeLoadTimer) window.clearTimeout(realtimeLoadTimer);
        realtimeLoadTimer = window.setTimeout(() => {
            realtimeLoadTimer = null;
            loadOrders();
        }, 160);
    };

    const bindRealtimeUpdates = () => {
        window.addEventListener('storage', (event) => {
            if (event.key !== ONLINE_ORDER_SYNC_KEY || !event.newValue) return;
            scheduleRealtimeLoad();
        });

        if ('BroadcastChannel' in window) {
            try {
                const channel = new BroadcastChannel('online-order-sync');
                channel.addEventListener('message', () => {
                    scheduleRealtimeLoad();
                });
            } catch (e) {
                // ignore channel errors
            }
        }

        if (realtimeApi && typeof realtimeApi.subscribe === 'function') {
            realtimeApi.subscribe((event) => {
                if (!event || !event.type) return;
                if (event.type === 'entity_changed' || event.type === 'order_status_changed' || event.type === 'manual_refresh') {
                    scheduleRealtimeLoad();
                }
            });
        }
    };

    const toMoney = (value) => Number(value || 0).toLocaleString('vi-VN') + ' đ';

    const esc = (value) => String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    const statusLabelMap = {
        cho_duyet: 'Chờ duyệt',
        da_duyet: 'Hoàn thành',
        tu_choi: 'Đã hủy'
    };

    const getCandidates = (apiName, params = '') => {
        const suffix = params ? '&' + params : '';
        return [
            new URL('../../index.php?api=' + apiName + suffix, window.location.href).toString(),
            '/phuocthanh/PHPCHINH/index.php?api=' + apiName + suffix,
            '/PHPCHINH/index.php?api=' + apiName + suffix,
            '/index.php?api=' + apiName + suffix
        ];
    };

    const getSalesCandidates = () => {
        const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
        return [
            `${protocol}//127.0.0.1/PHPCHINH/index.php?api=get_sales`,
            `${protocol}//localhost/PHPCHINH/index.php?api=get_sales`,
            new URL('../../index.php?api=get_sales', window.location.href).toString(),
            '/PHPCHINH/index.php?api=get_sales',
            '/index.php?api=get_sales'
        ];
    };

    async function callGet(apiName, params = '') {
        let lastError = new Error('Không gọi được API');
        for (const url of getCandidates(apiName, params)) {
            try {
                const sep = url.includes('?') ? '&' : '?';
                const res = await fetch(url + sep + '_t=' + Date.now(), { cache: 'no-store' });
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    lastError = new Error(data.message || ('HTTP ' + res.status));
                    continue;
                }
                return data;
            } catch (err) {
                lastError = err;
            }
        }
        throw lastError;
    }

    async function callPost(apiName, payload) {
        let lastError = new Error('Không gọi được API');
        for (const url of getCandidates(apiName)) {
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    lastError = new Error(data.message || ('HTTP ' + res.status));
                    continue;
                }
                return data;
            } catch (err) {
                lastError = err;
            }
        }
        throw lastError;
    }

    function closeOrderDetailModal() {
        if (onlineDetailBackdrop) onlineDetailBackdrop.hidden = true;
        if (onlineDetailModal) onlineDetailModal.hidden = true;
        activeOrder = null;
    }

    function setDetailActionState(status) {
        const s = String(status || '').toLowerCase();
        const locked = s === 'da_duyet' || s === 'tu_choi';
        if (detailApproveBtn) detailApproveBtn.disabled = locked;
        if (detailRejectBtn) detailRejectBtn.disabled = locked;
        if (rejectReasonInput) rejectReasonInput.disabled = (s === 'da_duyet');
    }

    function renderOrderItems(items) {
        if (!detailItemsBody) return;

        const rows = Array.isArray(items) ? items : [];
        if (!rows.length) {
            detailItemsBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Không có chi tiết sản phẩm.</td></tr>';
            return;
        }

        detailItemsBody.innerHTML = rows.map((item) => {
            const qty = Number(item.quantity || item.qty || item.soluong || 0);
            const price = Number(item.price || item.dongia || 0);
            const line = qty * price;
            const name = String(item.name || item.tensanpham || 'Sản phẩm');
            return `
                <tr>
                    <td>${esc(name)}</td>
                    <td>${qty}</td>
                    <td>${esc(toMoney(price))}</td>
                    <td>${esc(toMoney(line))}</td>
                </tr>
            `;
        }).join('');
    }

    function openOrderDetailModal(order) {
        if (!order || !onlineDetailBackdrop || !onlineDetailModal) return;

        activeOrder = order;
        const statusLabel = statusLabelMap[String(order.trangthai || '').toLowerCase()] || String(order.trangthai || '');
        const rejectReason = String(order.ldotuchoi || '').trim();

        if (detailOrderMeta) {
            detailOrderMeta.innerHTML = [
                `Mã đơn: <b>${esc(order.madonhang || '')}</b>`,
                `Trạng thái: <b>${esc(statusLabel)}</b>`,
                `Tổng tiền: <b>${esc(toMoney(order.tongtien || 0))}</b>`,
                `Ngày tạo: ${esc(order.ngaytao || '')}`,
                rejectReason ? `Lý do hủy: ${esc(rejectReason)}` : ''
            ].filter(Boolean).join('<br>');
        }

        if (detailCustomerMeta) {
            detailCustomerMeta.innerHTML = [
                `Khách hàng: <b>${esc(order.tenkhachhang || '')}</b>`,
                `SĐT: ${esc(order.sodienthoai || '')}`,
                `Email: ${esc(order.email || '')}`,
                `Địa chỉ: ${esc(order.diachi || '')}`,
                `Ghi chú: ${esc(order.ghichu || '')}`
            ].join('<br>');
        }

        if (rejectReasonInput) {
            rejectReasonInput.value = rejectReason;
        }

        renderOrderItems(order.items || []);
        setDetailActionState(order.trangthai || 'cho_duyet');

        onlineDetailBackdrop.hidden = false;
        onlineDetailModal.hidden = false;
    }

    async function updateActiveOrderStatus(nextStatus) {
        if (!activeOrder || !activeOrder.id) return;
        const id = Number(activeOrder.id || 0);
        if (id <= 0) return;

        if (nextStatus === 'tu_choi') {
            const reason = String(rejectReasonInput?.value || '').trim();
            if (!reason) {
                alert('Vui lòng nhập lý do hủy đơn trước khi xác nhận.');
                return;
            }

            await callPost('update_online_order_status', {
                id,
                status: 'tu_choi',
                reviewer: 'staff',
                reject_reason: reason
            });
            emitOrderStatusSyncSignal({ id, status: 'tu_choi' });
        } else {
            await callPost('update_online_order_status', {
                id,
                status: 'da_duyet',
                reviewer: 'staff'
            });
            // Trạng thái da_duyet được hiển thị với nhãn "Hoàn thành".
            emitOrderStatusSyncSignal({ id, status: 'da_duyet' });
        }

        closeOrderDetailModal();
        await loadOrders();
    }

    function renderRows(rows) {
        if (!Array.isArray(rows) || rows.length === 0) {
            ordersBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-3">Chưa có đơn online.</td></tr>';
            return;
        }

        cachedOrders = rows.slice();

        ordersBody.innerHTML = rows.map((item) => {
            const status = String(item.trangthai || 'cho_duyet');
            const statusLabel = statusLabelMap[status] || status;
            const rejectReason = item.ldotuchoi ? ('<div class="small text-danger">Lý do: ' + item.ldotuchoi + '</div>') : '';

            return `
                <tr>
                    <td><strong>${esc(item.madonhang || '')}</strong></td>
                    <td>${esc(item.tenkhachhang || '')}</td>
                    <td>${esc(item.sodienthoai || '')}</td>
                    <td>${toMoney(item.tongtien)}</td>
                    <td>
                        <span class="status-pill status-${status}">${statusLabel}</span>
                        ${rejectReason}
                    </td>
                    <td>${esc(item.ngaytao || '')}</td>
                    <td>
                        <div class="online-actions">
                            <button class="btn btn-primary" data-action="view" data-id="${item.id}">Xem</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    async function loadOrders() {
        const params = new URLSearchParams();
        const status = statusFilter.value.trim();
        const keyword = keywordInput.value.trim();
        if (status) params.set('status', status);
        if (keyword) params.set('keyword', keyword);

        statusText.textContent = 'Đang tải đơn online...';
        try {
            const payload = await callGet('get_online_orders', params.toString());
            sumChoDuyet.textContent = String(payload.summary?.cho_duyet || 0);
            sumDaDuyet.textContent = String(payload.summary?.da_duyet || 0);
            sumTuChoi.textContent = String(payload.summary?.tu_choi || 0);
            renderRows(payload.data || []);
            statusText.textContent = 'Đã tải ' + (payload.count || 0) + ' đơn online.';
        } catch (err) {
            ordersBody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-3">Lỗi tải dữ liệu: ' + String(err.message || err) + '</td></tr>';
            statusText.textContent = 'Không thể tải dữ liệu.';
        }
    }

    ordersBody.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;

        const id = Number(button.getAttribute('data-id') || 0);
        const action = button.getAttribute('data-action');
        if (id <= 0 || !action) return;

        if (action !== 'view') return;

        const target = cachedOrders.find((row) => Number(row.id || 0) === id);
        if (!target) return;
        openOrderDetailModal(target);
    });

    detailApproveBtn.addEventListener('click', async () => {
        try {
            await updateActiveOrderStatus('da_duyet');
        } catch (err) {
            alert('Duyệt đơn thất bại: ' + String(err.message || err));
        }
    });

    detailRejectBtn.addEventListener('click', async () => {
        try {
            await updateActiveOrderStatus('tu_choi');
        } catch (err) {
            alert('Hủy đơn thất bại: ' + String(err.message || err));
        }
    });

    closeOnlineDetailBtn.addEventListener('click', closeOrderDetailModal);
    closeOnlineDetailFooterBtn.addEventListener('click', closeOrderDetailModal);
    onlineDetailBackdrop.addEventListener('click', closeOrderDetailModal);

    btnSearch.addEventListener('click', loadOrders);
    keywordInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            event.preventDefault();
            loadOrders();
        }
    });

    bindRealtimeUpdates();
    loadOrders();
    loadCompletedSalesCount();
})();
</script>
</body>
</html>
